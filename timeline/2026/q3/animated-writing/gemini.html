<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Animated Pen Input</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Caveat for handwriting feel -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Handwriting font */
        .font-vintage {
            font-family: 'Caveat', cursive;
        }

        /* Vintage paper texture & look */
        .vintage-paper {
            background-color: #fdf6e3;
            /* Subtle texture overlay */
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            box-shadow: 
                inset 0 0 40px rgba(139, 90, 43, 0.15), 
                inset 0 0 10px rgba(139, 90, 43, 0.05),
                3px 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(139, 90, 43, 0.2);
        }

        /* The Scribble Animation */
        @keyframes scribble {
            0%   { transform: rotate(0deg) translateY(0) translateX(0); }
            25%  { transform: rotate(-5deg) translateY(-3px) translateX(-2px); }
            50%  { transform: rotate(4deg) translateY(1px) translateX(2px); }
            75%  { transform: rotate(-3deg) translateY(-1px) translateX(-1px); }
            100% { transform: rotate(0deg) translateY(0) translateX(0); }
        }

        /* Applied via JavaScript when keys are pressed */
        .is-writing {
            animation: scribble 0.12s infinite;
        }

        /* Pen Styling: setting transform origin so it pivots at the pen tip (bottom left) */
        .pen-icon {
            transform-origin: bottom left;
            filter: drop-shadow(4px 4px 3px rgba(0,0,0,0.3));
        }
        
        /* Smooth horizontal tracking when typing */
        .pen-tracker {
            transition: transform 0.08s ease-out, opacity 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-stone-900 min-h-screen flex items-center justify-center p-6">

    <!-- Container -->
    <div class="relative w-full max-w-2xl">
        
        <!-- 
            HIDDEN MEASURER: 
            Since we can't directly track the cursor coordinates inside an <input>,
            we copy the text to an invisible span. 
            IMPORTANT: Font-size, padding (px-6 = 24px), and font-family MUST perfectly match the input.
        -->
        <span id="measurer" class="absolute invisible whitespace-pre font-vintage text-4xl px-6 tracking-normal"></span>

        <!-- The Vintage Input Field -->
        <input type="text" id="vintage-input" 
            class="w-full vintage-paper font-vintage text-4xl text-amber-950 rounded-sm py-4 px-6 outline-none placeholder-amber-900/40 border-b-2 border-b-amber-900/20 focus:border-b-amber-800/60 transition-colors"
            placeholder="Write your story..." 
            spellcheck="false" 
            autocomplete="off">

        <!-- The Animated Pen Container -->
        <div id="pen-container" class="pen-tracker absolute bottom-4 left-0 pointer-events-none opacity-0 z-10">
            <!-- Feather Quill SVG -->
            <svg class="pen-icon w-14 h-14 text-stone-800 -translate-x-1 translate-y-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <!-- Feather shape -->
                <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z" fill="currentColor" fill-opacity="0.15"/>
                <!-- Quill stem down to the nib -->
                <line x1="16" y1="8" x2="2" y2="22" stroke-width="1.5"/>
                <!-- Feather detail lines -->
                <line x1="17.5" y1="15" x2="9" y2="15"/>
                <line x1="14" y1="11" x2="7" y2="11"/>
            </svg>
        </div>

    </div>

    <!-- Logic -->
    <script>
        const input = document.getElementById('vintage-input');
        const measurer = document.getElementById('measurer');
        const penContainer = document.getElementById('pen-container');
        const penIcon = document.querySelector('.pen-icon');
        
        let typingTimer;

        // Function to move the pen to the exact end of the typed text
        function updatePenPosition() {
            // 1. Get typed text up to the cursor's current position
            const text = input.value.substring(0, input.selectionStart);
            
            // 2. Put it in the hidden span
            measurer.textContent = text;
            
            // 3. Measure the width of the text. 
            // We subtract the 24px base padding (Tailwind 'px-6') so the pen starts at the text start.
            const paddingLeft = 24; 
            const textWidth = measurer.offsetWidth - paddingLeft;
            
            // 4. Adjust for scrolling (if the user types a very long string)
            const scrollOffset = input.scrollLeft;
            
            // 5. Calculate final X position
            let finalPos = textWidth - scrollOffset + paddingLeft;
            
            // Cap the pen's position so it doesn't leave the right edge of the input
            const maxPos = input.offsetWidth - 30;
            if (finalPos > maxPos) finalPos = maxPos;
            if (finalPos < paddingLeft) finalPos = paddingLeft;

            // Apply horizontal shift
            penContainer.style.transform = `translateX(${finalPos}px)`;
        }

        // --- Event Listeners ---

        // Show pen when the input is focused
        input.addEventListener('focus', () => {
            penContainer.style.opacity = '1';
            updatePenPosition();
        });

        // Hide pen when focus is lost
        input.addEventListener('blur', () => {
            penContainer.style.opacity = '0';
        });

        // Track text changes, mouse clicks (cursor moves), and arrow key navigation
        input.addEventListener('input', updatePenPosition);
        input.addEventListener('click', updatePenPosition);
        input.addEventListener('keyup', updatePenPosition);

        // Animate the pen while typing
        input.addEventListener('keydown', (e) => {
            // Ignore arrow keys so it doesn't "scribble" when just navigating the text
            if(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) return;

            // Add the writing animation class
            penIcon.classList.add('is-writing');
            
            // Clear any existing timeouts to keep animating on rapid typing
            clearTimeout(typingTimer);
            
            // Stop the animation a fraction of a second after typing stops
            typingTimer = setTimeout(() => {
                penIcon.classList.remove('is-writing');
            }, 120); // 120ms delay gives a nice fluid pause feeling
        });
    </script>
</body>
</html>
