<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Theme Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for all themes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Nunito:wght@400;600;700&family=Playfair+Display:wght@400;700&family=Rajdhani:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           THEME DEFINITIONS (CSS VARIABLES)
           ========================================= */

        /* 1. GLASSMORPHISM (Default) */
        :root, [data-theme="glass"] {
            --bg-body: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.3);
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --card-backdrop: blur(16px);
            --card-radius: 1.5rem;
            
            --text-main: #ffffff;
            --text-accent: #e0f2fe;
            
            --input-bg: rgba(255, 255, 255, 0.05);
            --input-border: rgba(255, 255, 255, 0.2);
            --input-shadow: none;
            --input-focus-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5);
            --input-radius: 0.75rem;
            
            --btn-bg: rgba(255, 255, 255, 0.2);
            --btn-text: #ffffff;
            --btn-border: rgba(255, 255, 255, 0.4);
            --btn-shadow: none;
            --btn-hover-bg: rgba(255, 255, 255, 0.35);
            --btn-hover-shadow: 0 4px 15px rgba(0,0,0,0.2);
            
            --font-family: 'Inter', sans-serif;
            --border-width: 1px;
            --btn-transform: none;
            --btn-tracking: normal;
        }

        /* 2. NEOMORPHISM */
        [data-theme="neomorphism"] {
            --bg-body: #e0e5ec;
            --card-bg: #e0e5ec;
            --card-border: transparent;
            --card-shadow: 12px 12px 24px rgb(163,177,198,0.7), -12px -12px 24px rgba(255,255,255, 0.8);
            --card-backdrop: blur(0px);
            --card-radius: 1.5rem;
            
            --text-main: #4a5568;
            --text-accent: #718096;
            
            --input-bg: #e0e5ec;
            --input-border: transparent;
            --input-shadow: inset 6px 6px 12px 0 rgba(163,177,198, 0.6), inset -6px -6px 12px 0 rgba(255,255,255, 0.8);
            --input-focus-shadow: inset 8px 8px 14px 0 rgba(163,177,198, 0.8), inset -8px -8px 14px 0 rgba(255,255,255, 0.9);
            --input-radius: 1rem;
            
            --btn-bg: #e0e5ec;
            --btn-text: #4a5568;
            --btn-border: transparent;
            --btn-shadow: 6px 6px 12px 0 rgba(163,177,198, 0.6), -6px -6px 12px 0 rgba(255,255,255, 0.8);
            --btn-hover-bg: #e0e5ec;
            --btn-hover-shadow: inset 4px 4px 8px 0 rgba(163,177,198, 0.5), inset -4px -4px 8px 0 rgba(255,255,255, 0.6);
            
            --font-family: 'Nunito', sans-serif;
            --border-width: 0px;
            --btn-transform: none;
            --btn-tracking: normal;
        }

        /* 3. CYBERPUNK */
        [data-theme="cyberpunk"] {
            --bg-body: #fcee09;
            --card-bg: #0b0b0b;
            --card-border: #00f0ff;
            --card-shadow: 12px 12px 0px 0px #ff003c;
            --card-backdrop: blur(0px);
            --card-radius: 0px;
            
            --text-main: #00f0ff;
            --text-accent: #ff003c;
            
            --input-bg: #1a1a1a;
            --input-border: #ff003c;
            --input-shadow: none;
            --input-focus-shadow: 0 0 10px 2px #ff003c;
            --input-radius: 0px;
            
            --btn-bg: #00f0ff;
            --btn-text: #0b0b0b;
            --btn-border: #00f0ff;
            --btn-shadow: 6px 6px 0px 0px #ff003c;
            --btn-hover-bg: #ff003c;
            --btn-hover-shadow: 6px 6px 0px 0px #00f0ff;
            
            --font-family: 'Rajdhani', sans-serif;
            --border-width: 2px;
            --btn-transform: uppercase;
            --btn-tracking: 2px;
        }

        /* 4. VAPORWAVE */
        [data-theme="vaporwave"] {
            --bg-body: linear-gradient(135deg, #ff71ce 0%, #01cdfe 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-border: #b967ff;
            --card-shadow: 10px 10px 0px 0px #05ffa1;
            --card-backdrop: blur(0px);
            --card-radius: 0px;
            
            --text-main: #b967ff;
            --text-accent: #ff71ce;
            
            --input-bg: #f4f4f4;
            --input-border: #01cdfe;
            --input-shadow: inset 4px 4px 0px #ffb48f;
            --input-focus-shadow: inset 4px 4px 0px #01cdfe, 0 0 0 2px #b967ff;
            --input-radius: 0px;
            
            --btn-bg: #05ffa1;
            --btn-text: #b967ff;
            --btn-border: #05ffa1;
            --btn-shadow: 6px 6px 0px #ff71ce;
            --btn-hover-bg: #01cdfe;
            --btn-hover-shadow: 6px 6px 0px #b967ff;
            
            --font-family: 'Space Mono', monospace;
            --border-width: 3px;
            --btn-transform: uppercase;
            --btn-tracking: 1px;
        }

        /* 5. VINTAGE */
        [data-theme="vintage"] {
            --bg-body: #e6d5c3 radial-gradient(circle, #e6d5c3 0%, #c4aa88 100%);
            --card-bg: #f5eee6;
            --card-border: #8b5a2b;
            --card-shadow: 6px 6px 20px rgba(92, 64, 51, 0.3);
            --card-backdrop: blur(0px);
            --card-radius: 4px;
            
            --text-main: #3e2723;
            --text-accent: #6d4c41;
            
            --input-bg: #ffffff;
            --input-border: #a1887f;
            --input-shadow: none;
            --input-focus-shadow: 0 0 0 1px #8b5a2b;
            --input-radius: 2px;
            
            --btn-bg: #3e2723;
            --btn-text: #f5eee6;
            --btn-border: #3e2723;
            --btn-shadow: 3px 3px 0px #8b5a2b;
            --btn-hover-bg: #5d4037;
            --btn-hover-shadow: 1px 1px 0px #8b5a2b;
            
            --font-family: 'Playfair Display', serif;
            --border-width: 1px;
            --btn-transform: none;
            --btn-tracking: normal;
        }

        /* =========================================
           DYNAMIC THEME CLASSES
           ========================================= */
        
        body {
            background: var(--bg-body);
            font-family: var(--font-family);
            color: var(--text-main);
            transition: background 0.5s ease, color 0.3s ease;
        }

        .theme-card {
            background: var(--card-bg);
            border: var(--border-width) solid var(--card-border);
            box-shadow: var(--card-shadow);
            backdrop-filter: var(--card-backdrop);
            -webkit-backdrop-filter: var(--card-backdrop);
            border-radius: var(--card-radius);
            transition: all 0.4s ease;
        }

        .theme-text-accent {
            color: var(--text-accent);
            transition: color 0.3s ease;
        }

        .theme-input {
            background: var(--input-bg);
            border: var(--border-width) solid var(--input-border);
            box-shadow: var(--input-shadow);
            border-radius: var(--input-radius);
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        
        .theme-input::placeholder {
            color: var(--text-accent);
            opacity: 0.7;
        }

        .theme-input:focus {
            outline: none;
            box-shadow: var(--input-focus-shadow);
            border-color: var(--text-main);
        }

        .theme-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: var(--border-width) solid var(--btn-border);
            box-shadow: var(--btn-shadow);
            border-radius: var(--input-radius);
            text-transform: var(--btn-transform);
            letter-spacing: var(--btn-tracking);
            transition: all 0.2s ease;
        }

        .theme-btn:hover {
            background: var(--btn-hover-bg);
            box-shadow: var(--btn-hover-shadow);
            transform: translateY(-2px);
        }

        .theme-btn:active {
            transform: translateY(1px);
        }

        .theme-btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: var(--border-width) solid var(--card-border);
            border-radius: var(--input-radius);
            transition: all 0.2s ease;
        }

        .theme-btn-secondary:hover {
            background: var(--input-bg);
            border-color: var(--text-main);
        }

        /* Theme Selector Buttons */
        .theme-selector-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid transparent;
            opacity: 0.6;
            transition: all 0.3s ease;
        }
        
        .theme-selector-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .theme-selector-btn.active {
            border: 1px solid var(--text-main);
            opacity: 1;
            font-weight: 600;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-center p-4 sm:p-8">

    <!-- THEME SELECTOR -->
    <div class="mb-10 w-full max-w-2xl flex flex-wrap justify-center gap-3">
        <button class="theme-selector-btn px-5 py-2 rounded-full text-sm backdrop-blur-md" data-set-theme="glass">Glass</button>
        <button class="theme-selector-btn px-5 py-2 rounded-full text-sm backdrop-blur-md" data-set-theme="neomorphism">Neomorphism</button>
        <button class="theme-selector-btn px-5 py-2 rounded-full text-sm backdrop-blur-md" data-set-theme="cyberpunk">Cyberpunk</button>
        <button class="theme-selector-btn px-5 py-2 rounded-full text-sm backdrop-blur-md" data-set-theme="vaporwave">Vaporwave</button>
        <button class="theme-selector-btn px-5 py-2 rounded-full text-sm backdrop-blur-md" data-set-theme="vintage">Vintage</button>
    </div>

    <!-- LOGIN CARD -->
    <div class="theme-card w-full max-w-md p-8 sm:p-10 relative">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2 tracking-tight">Welcome Back</h1>
            <p class="theme-text-accent text-sm">Enter your credentials to access your account.</p>
        </div>

        <!-- Form -->
        <form class="space-y-6" onsubmit="event.preventDefault();">
            <!-- Username -->
            <div>
                <label class="block text-sm font-semibold mb-2">Username or Email</label>
                <input type="text" class="theme-input w-full px-4 py-3.5" placeholder="Enter your username">
            </div>
            
            <!-- Password -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm font-semibold">Password</label>
                    <a href="#" class="theme-text-accent text-xs font-semibold hover:underline">Forgot Password?</a>
                </div>
                <input type="password" class="theme-input w-full px-4 py-3.5" placeholder="••••••••">
            </div>

            <!-- Remember Me -->
            <div class="flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 mr-3 cursor-pointer rounded">
                <label for="remember" class="text-sm cursor-pointer theme-text-accent">Remember me for 30 days</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="theme-btn w-full py-3.5 text-base font-bold mt-2 flex items-center justify-center gap-2">
                Sign In
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <!-- Social Login Divider -->
        <div class="mt-8 pt-8 border-t border-[color:var(--card-border)]">
            <p class="text-center text-sm theme-text-accent mb-5">Or continue with</p>
            <div class="flex gap-4">
                <button class="theme-btn-secondary w-full py-2.5 flex items-center justify-center gap-3 font-semibold text-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.761H12.545z"/></svg>
                    Google
                </button>
                <button class="theme-btn-secondary w-full py-2.5 flex items-center justify-center gap-3 font-semibold text-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12,2C6.477,2,2,6.477,2,12c0,4.419,2.865,8.166,6.839,9.489c0.5,0.09,0.682-0.218,0.682-0.484c0-0.236-0.009-0.866-0.014-1.699c-2.782,0.602-3.369-1.34-3.369-1.34c-0.454-1.156-1.11-1.462-1.11-1.462c-0.908-0.62,0.069-0.608,0.069-0.608c1.004,0.071,1.532,1.03,1.532,1.03c0.892,1.529,2.341,1.089,2.91,0.833c0.091-0.647,0.349-1.089,0.635-1.34c-2.22-0.253-4.555-1.11-4.555-4.943c0-1.091,0.39-1.984,1.03-2.682C6.546,8.54,6.202,7.524,6.746,6.148c0,0,0.84-0.269,2.75,1.025C10.295,6.95,11.15,6.84,12,6.836c0.85,0.004,1.705,0.114,2.504,0.337c1.909-1.294,2.747-1.025,2.747-1.025c0.546,1.376,0.202,2.392,0.1,2.646c0.64,0.699,1.026,1.591,1.026,2.682c0,3.841-2.337,4.687-4.565,4.935c0.359,0.307,0.679,0.915,0.679,1.846c0,1.335-0.012,2.415-0.012,2.741c0,0.269,0.18,0.579,0.688,0.481C19.138,20.161,22,16.416,22,12C22,6.477,17.521,2,12,2z"/></svg>
                    GitHub
                </button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT FOR THEME SWITCHING -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.theme-selector-btn');
            
            // Function to apply a theme
            const setTheme = (themeName) => {
                // Set Data Attribute on HTML tag
                document.documentElement.setAttribute('data-theme', themeName);
                // Save preference locally
                localStorage.setItem('preferred-ui-theme', themeName);

                // Update active state on buttons
                buttons.forEach(btn => {
                    if (btn.getAttribute('data-set-theme') === themeName) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            };

            // Add click listeners to all buttons
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    setTheme(btn.getAttribute('data-set-theme'));
                });
            });

            // Load saved theme or default to 'glass'
            const savedTheme = localStorage.getItem('preferred-ui-theme') || 'glass';
            setTheme(savedTheme);
        });
    </script>
</body>
</html>
