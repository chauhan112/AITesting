<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghibli Inspired Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Quicksand Font for that soft, whimsical Ghibli typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           GHIBLI AESTHETIC CUSTOM CSS
           ========================================= */
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            /* Soft, painted sky gradient */
            background: linear-gradient(180deg, #74b9ff 0%, #a4dbf5 60%, #d4f1f9 100%);
            min-height: 100vh;
            overflow: hidden; /* Hide overflow from hills and clouds */
            color: #3e2723; /* Earthy warm brown instead of black */
        }

        /* --- Scenery: CSS Rolling Hills --- */
        .hill {
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }

        .hill-back {
            width: 150vw;
            height: 100vh;
            background: #81c784; /* Soft distant green */
            bottom: -60vh;
            left: -20vw;
            box-shadow: inset 0px 20px 30px rgba(255,255,255,0.2);
        }

        .hill-middle {
            width: 120vw;
            height: 80vh;
            background: #66bb6a; /* Mid-ground green */
            bottom: -45vh;
            right: -20vw;
            box-shadow: inset 0px 20px 30px rgba(255,255,255,0.1);
        }

        .hill-front {
            width: 140vw;
            height: 70vh;
            background: #4caf50; /* Vibrant foreground green */
            bottom: -40vh;
            left: -15vw;
        }

        /* --- Scenery: Animated Clouds --- */
        .clouds-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: #ffffff;
            border-radius: 50px;
            opacity: 0.8;
            animation: float-cloud linear infinite;
        }

        /* Cloud shapes using pseudo-elements */
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }

        /* Specific Cloud Sizes & Positions */
        .cloud-1 {
            width: 120px; height: 40px; top: 10%; left: -150px; animation-duration: 45s;
        }
        .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        .cloud-1::after { width: 45px; height: 45px; top: -20px; right: 15px; }

        .cloud-2 {
            width: 180px; height: 50px; top: 25%; left: -200px; animation-duration: 60s; animation-delay: 15s; opacity: 0.6; transform: scale(0.8);
        }
        .cloud-2::before { width: 80px; height: 80px; top: -40px; left: 25px; }
        .cloud-2::after { width: 60px; height: 60px; top: -30px; right: 25px; }

        .cloud-3 {
            width: 100px; height: 35px; top: 5%; left: -100px; animation-duration: 35s; animation-delay: 5s; transform: scale(0.6);
        }
        .cloud-3::before { width: 50px; height: 50px; top: -25px; left: 10px; }
        .cloud-3::after { width: 40px; height: 40px; top: -15px; right: 10px; }

        @keyframes float-cloud {
            0% { transform: translateX(-10vw); }
            100% { transform: translateX(110vw); }
        }

        /* --- UI Elements --- */
        .ghibli-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(56, 107, 72, 0.15), 
                        inset 0 0 0 1px rgba(255, 255, 255, 1);
            animation: gentle-bob 6s ease-in-out infinite;
        }

        @keyframes gentle-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .ghibli-input {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #c8e6c9;
            color: #5d4037;
            transition: all 0.3s ease;
        }

        .ghibli-input:focus {
            outline: none;
            border-color: #66bb6a;
            box-shadow: 0 0 0 4px rgba(102, 187, 106, 0.15);
        }

        .ghibli-input::placeholder {
            color: #a1887f;
        }

        .ghibli-btn {
            background: #66bb6a;
            color: white;
            border: 2px solid #4caf50;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
            transition: all 0.2s ease;
        }

        .ghibli-btn:hover {
            background: #558b2f;
            border-color: #33691e;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(51, 105, 30, 0.3);
        }

        .ghibli-btn:active {
            transform: translateY(1px);
        }

        .ghibli-social-btn {
            background: white;
            color: #5d4037;
            border: 2px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .ghibli-social-btn:hover {
            background: #f1f8e9;
            border-color: #c8e6c9;
            color: #33691e;
        }

        .leaf-icon {
            fill: #66bb6a;
            animation: sway 3s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }
    </style>
</head>
<body class="w-full flex items-center justify-center p-4 sm:p-8 relative">

    <!-- CSS SCENERY -->
    <div class="clouds-container">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
    </div>
    <div class="hill hill-back"></div>
    <div class="hill hill-middle"></div>
    <div class="hill hill-front"></div>

    <!-- LOGIN CARD -->
    <div class="ghibli-card w-full max-w-[420px] rounded-[2rem] p-8 sm:p-10 relative z-10">
        
        <!-- Header -->
        <div class="text-center mb-8 flex flex-col items-center">
            <!-- Leaf SVG Icon -->
            <svg class="w-10 h-10 mb-3 leaf-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.03,4.03C15.82,2.83 13.91,2.05 11.55,2.44C8.42,2.95 5.5,5.1 4.27,8.08C3.04,11.06 3.65,14.54 5.92,16.82L5.22,17.53L6.63,18.94L7.34,18.23C9.62,20.5 13.1,21.1 16.08,19.88C19.05,18.65 21.2,15.73 21.71,12.6C22.1,10.24 21.32,8.33 20.12,7.12C19.16,6.16 17.97,5.93 17.03,6.2C16.82,5.27 16.59,4.08 17.03,4.03M18.7,8.54C19.46,9.3 20.03,10.66 19.74,12.31C19.34,14.77 17.65,17.06 15.35,18C13.06,18.97 10.37,18.47 8.65,16.75L15.42,9.97L14,8.56L7.23,15.33C5.5,13.61 5,10.92 5.97,8.63C6.94,6.33 9.23,4.64 11.69,4.24C13.34,3.95 14.7,4.53 15.46,5.28C16.5,6.33 16.63,8.04 16.29,9.36L14.61,11.03L16.03,12.45L17.7,10.77C18.03,10.43 18.27,9.5 18.7,8.54Z"/>
            </svg>
            <h1 class="text-[28px] font-bold tracking-tight text-[#3e2723]">Welcome Back</h1>
            <p class="text-[#8d6e63] font-medium mt-1">Step into your magic space.</p>
        </div>

        <!-- Form -->
        <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
            <!-- Email -->
            <div>
                <label class="block text-[15px] font-bold text-[#5d4037] mb-2 ml-1">Email Address</label>
                <input type="email" required class="ghibli-input w-full px-5 py-3.5 rounded-2xl text-[15px]" placeholder="haku@spiritrealm.com">
            </div>
            
            <!-- Password -->
            <div>
                <div class="flex justify-between items-center mb-2 ml-1 mr-1">
                    <label class="block text-[15px] font-bold text-[#5d4037]">Password</label>
                    <a href="#" class="text-[#66bb6a] text-sm font-bold hover:text-[#33691e] hover:underline transition-colors">Forgot?</a>
                </div>
                <input type="password" required class="ghibli-input w-full px-5 py-3.5 rounded-2xl text-[15px]" placeholder="••••••••">
            </div>

            <!-- Remember Me -->
            <div class="flex items-center ml-1 pt-1">
                <input type="checkbox" id="remember" class="w-4 h-4 cursor-pointer accent-[#66bb6a] border-[#c8e6c9] rounded">
                <label for="remember" class="text-sm font-semibold cursor-pointer text-[#8d6e63] ml-3">Remember me</label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="ghibli-btn w-full py-4 text-[16px] font-bold rounded-2xl mt-4 flex items-center justify-center gap-2">
                Continue Journey
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>

        <!-- Social Login Divider -->
        <div class="mt-8 pt-6 relative border-t-2 border-[#e2e8f0]">
            <div class="absolute -top-[13px] left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-md px-4 rounded-full border-2 border-[#e2e8f0]">
                <p class="text-xs font-bold text-[#a1887f]">OR</p>
            </div>
            
            <div class="flex gap-4 mt-6">
                <button class="ghibli-social-btn w-full py-3 rounded-2xl flex items-center justify-center gap-2 font-bold text-[14px]">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.761H12.545z"/></svg>
                    Google
                </button>
                <button class="ghibli-social-btn w-full py-3 rounded-2xl flex items-center justify-center gap-2 font-bold text-[14px]">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12,2C6.477,2,2,6.477,2,12c0,4.419,2.865,8.166,6.839,9.489c0.5,0.09,0.682-0.218,0.682-0.484c0-0.236-0.009-0.866-0.014-1.699c-2.782,0.602-3.369-1.34-3.369-1.34c-0.454-1.156-1.11-1.462-1.11-1.462c-0.908-0.62,0.069-0.608,0.069-0.608c1.004,0.071,1.532,1.03,1.532,1.03c0.892,1.529,2.341,1.089,2.91,0.833c0.091-0.647,0.349-1.089,0.635-1.34c-2.22-0.253-4.555-1.11-4.555-4.943c0-1.091,0.39-1.984,1.03-2.682C6.546,8.54,6.202,7.524,6.746,6.148c0,0,0.84-0.269,2.75,1.025C10.295,6.95,11.15,6.84,12,6.836c0.85,0.004,1.705,0.114,2.504,0.337c1.909-1.294,2.747-1.025,2.747-1.025c0.546,1.376,0.202,2.392,0.1,2.646c0.64,0.699,1.026,1.591,1.026,2.682c0,3.841-2.337,4.687-4.565,4.935c0.359,0.307,0.679,0.915,0.679,1.846c0,1.335-0.012,2.415-0.012,2.741c0,0.269,0.18,0.579,0.688,0.481C19.138,20.161,22,16.416,22,12C22,6.477,17.521,2,12,2z"/></svg>
                    GitHub
                </button>
            </div>
        </div>
    </div>

    <!-- Simple JS to handle form submit without refreshing -->
    <script>
        function handleLogin(event) {
            event.preventDefault();
            const btn = event.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            // Show a simple loading state
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Journeying...`;
            
            // Reset after 2 seconds to simulate network request
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        }
    </script>
</body>
</html>
