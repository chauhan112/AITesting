<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compact & Collapsible Groups UI</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Utility to hide standard scrollbars while keeping swipe actions functional */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">

    <!-- HEADER -->
    <header class="mb-4">
      <h1 class="text-xl font-bold text-slate-900 md:text-2xl">Dashboard Groups</h1>
      <p class="text-xs text-slate-500">Compact horizontal formats designed for dense information displays.</p>
    </header>


    <!-- SECTION 1: "RECENTLY USED" COLLAPSIBLE ACCORDION -->
    <div class="border border-slate-200 rounded-2xl bg-white overflow-hidden shadow-sm">
      
      <!-- Accordion Header Button -->
      <button onclick="toggleAccordion('recently-used-accordion', 'accordion-chevron')" 
              class="w-full flex items-center justify-between p-4 bg-white hover:bg-slate-50 transition duration-150 focus:outline-none">
        <div class="flex items-center space-x-2.5">
          <span class="flex h-7 w-7 items-center justify-center rounded-lg bg-indigo-50 text-indigo-600 text-sm font-semibold">⏱️</span>
          <div class="text-left">
            <span class="block font-bold text-slate-800 text-sm md:text-base leading-none">Recently Used</span>
            <span class="text-[11px] text-slate-400">Quick launch recent rooms</span>
          </div>
        </div>
        <svg id="accordion-chevron" class="w-5 h-5 text-slate-400 transform transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <!-- Accordion Collapsible Wrapper -->
      <div id="recently-used-accordion" class="transition-all duration-300 ease-in-out max-h-[500px] overflow-hidden">
        <div class="px-4 pb-5 border-t border-slate-100 pt-4">
          
          <!-- IDEA A: ULTRA-COMPACT ICON PILLS (Horizontal Scroll) -->
          <div class="flex gap-3 overflow-x-auto pb-2 snap-x scrollbar-hide">
            
            <!-- Micro-Card 1 -->
            <button class="flex-none w-20 snap-start flex flex-col items-center group focus:outline-none">
              <div class="relative w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-lg border border-slate-200 shadow-sm group-hover:border-indigo-400 transition">
                🚀
                <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-green-500 ring-2 ring-white"></span>
              </div>
              <span class="mt-2 text-[11px] font-semibold text-slate-700 text-center truncate w-full group-hover:text-indigo-600">Product</span>
            </button>

            <!-- Micro-Card 2 -->
            <button class="flex-none w-20 snap-start flex flex-col items-center group focus:outline-none">
              <div class="relative w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-lg border border-slate-200 shadow-sm group-hover:border-indigo-400 transition">
                📣
              </div>
              <span class="mt-2 text-[11px] font-semibold text-slate-700 text-center truncate w-full group-hover:text-indigo-600">Announcements</span>
            </button>

            <!-- Micro-Card 3 -->
            <button class="flex-none w-20 snap-start flex flex-col items-center group focus:outline-none">
              <div class="relative w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-lg border border-slate-200 shadow-sm group-hover:border-indigo-400 transition">
                🛠️
                <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-green-500 ring-2 ring-white"></span>
              </div>
              <span class="mt-2 text-[11px] font-semibold text-slate-700 text-center truncate w-full group-hover:text-indigo-600">Dev Support</span>
            </button>

            <!-- Micro-Card 4 -->
            <button class="flex-none w-20 snap-start flex flex-col items-center group focus:outline-none">
              <div class="relative w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-lg border border-slate-200 shadow-sm group-hover:border-indigo-400 transition">
                🍿
              </div>
              <span class="mt-2 text-[11px] font-semibold text-slate-700 text-center truncate w-full group-hover:text-indigo-600">Watercooler</span>
            </button>

            <!-- Micro-Card 5 -->
            <button class="flex-none w-20 snap-start flex flex-col items-center group focus:outline-none">
              <div class="relative w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-lg border border-slate-200 shadow-sm group-hover:border-indigo-400 transition">
                📚
              </div>
              <span class="mt-2 text-[11px] font-semibold text-slate-700 text-center truncate w-full group-hover:text-indigo-600">Resources</span>
            </button>

            <!-- Micro-Card 6 -->
            <button class="flex-none w-20 snap-start flex flex-col items-center group focus:outline-none">
              <div class="relative w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-lg border border-slate-200 shadow-sm group-hover:border-indigo-400 transition">
                🎨
              </div>
              <span class="mt-2 text-[11px] font-semibold text-slate-700 text-center truncate w-full group-hover:text-indigo-600">Design Team</span>
            </button>

          </div>

        </div>
      </div>

    </div>


    <!-- SECTION 2: IDEA B: COMPACT LANDSCAPE CARDS (Horizontal Scroll) -->
    <div class="space-y-3">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider">Suggested for you</h2>
          <p class="text-[11px] text-slate-400">Discover new communities around your interests</p>
        </div>
        <!-- Scroll Indicators / Controls -->
        <div class="flex space-x-1.5">
          <button onclick="scrollSection('suggested-container', -200)" class="p-1 rounded-md border border-slate-200 bg-white hover:bg-slate-50 text-slate-500 transition shadow-sm">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
          </button>
          <button onclick="scrollSection('suggested-container', 200)" class="p-1 rounded-md border border-slate-200 bg-white hover:bg-slate-50 text-slate-500 transition shadow-sm">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>

      <!-- Landscape Scroll Container -->
      <div id="suggested-container" class="flex gap-3 overflow-x-auto pb-2 snap-x scroll-smooth scrollbar-hide">
        
        <!-- Landscape Card 1 -->
        <div class="flex-none w-60 snap-start bg-white border border-slate-200 rounded-xl p-3 flex items-center justify-between hover:border-slate-300 hover:shadow-sm transition">
          <div class="flex items-center space-x-3 overflow-hidden">
            <div class="w-10 h-10 rounded-lg bg-teal-50 flex-none flex items-center justify-center text-teal-600 font-bold text-sm">
              UX
            </div>
            <div class="overflow-hidden">
              <h4 class="text-xs font-bold text-slate-800 truncate">Figma UI Systems</h4>
              <p class="text-[10px] text-slate-400 truncate">312 online</p>
            </div>
          </div>
          <button class="flex-none text-[10px] font-bold bg-slate-900 hover:bg-slate-800 text-white px-2.5 py-1 rounded-md transition ml-2">
            Join
          </button>
        </div>

        <!-- Landscape Card 2 -->
        <div class="flex-none w-60 snap-start bg-white border border-slate-200 rounded-xl p-3 flex items-center justify-between hover:border-slate-300 hover:shadow-sm transition">
          <div class="flex items-center space-x-3 overflow-hidden">
            <div class="w-10 h-10 rounded-lg bg-orange-50 flex-none flex items-center justify-center text-orange-600 font-bold text-sm">
              PY
            </div>
            <div class="overflow-hidden">
              <h4 class="text-xs font-bold text-slate-800 truncate">Python AI Models</h4>
              <p class="text-[10px] text-slate-400 truncate">1.1k online</p>
            </div>
          </div>
          <button class="flex-none text-[10px] font-bold bg-slate-900 hover:bg-slate-800 text-white px-2.5 py-1 rounded-md transition ml-2">
            Join
          </button>
        </div>

        <!-- Landscape Card 3 -->
        <div class="flex-none w-60 snap-start bg-white border border-slate-200 rounded-xl p-3 flex items-center justify-between hover:border-slate-300 hover:shadow-sm transition">
          <div class="flex items-center space-x-3 overflow-hidden">
            <div class="w-10 h-10 rounded-lg bg-purple-50 flex-none flex items-center justify-center text-purple-600 font-bold text-sm">
              MT
            </div>
            <div class="overflow-hidden">
              <h4 class="text-xs font-bold text-slate-800 truncate">Marketing Talk</h4>
              <p class="text-[10px] text-slate-400 truncate">92 online</p>
            </div>
          </div>
          <button class="flex-none text-[10px] font-bold bg-slate-900 hover:bg-slate-800 text-white px-2.5 py-1 rounded-md transition ml-2">
            Join
          </button>
        </div>

        <!-- Landscape Card 4 -->
        <div class="flex-none w-60 snap-start bg-white border border-slate-200 rounded-xl p-3 flex items-center justify-between hover:border-slate-300 hover:shadow-sm transition">
          <div class="flex items-center space-x-3 overflow-hidden">
            <div class="w-10 h-10 rounded-lg bg-sky-50 flex-none flex items-center justify-center text-sky-600 font-bold text-sm">
              CS
            </div>
            <div class="overflow-hidden">
              <h4 class="text-xs font-bold text-slate-800 truncate">Cybersecurity</h4>
              <p class="text-[10px] text-slate-400 truncate">540 online</p>
            </div>
          </div>
          <button class="flex-none text-[10px] font-bold bg-slate-900 hover:bg-slate-800 text-white px-2.5 py-1 rounded-md transition ml-2">
            Join
          </button>
        </div>

      </div>
    </div>

  </div>

  <!-- JAVASCRIPT FOR ACCORDION TOGGLE & SLIDER ACTIONS -->
  <script>
    /**
     * Toggles visibility of the collapsible accordion section
     */
    function toggleAccordion(contentId, chevronId) {
      const content = document.getElementById(contentId);
      const chevron = document.getElementById(chevronId);
      
      // Toggle transition states
      if (content.classList.contains('max-h-0')) {
        content.classList.remove('max-h-0');
        content.classList.add('max-h-[500px]');
        chevron.classList.remove('rotate-180');
      } else {
        content.classList.remove('max-h-[500px]');
        content.classList.add('max-h-0');
        chevron.classList.add('rotate-180');
      }
    }

    /**
     * Handles manual scroll buttons for landscape cards section
     */
    function scrollSection(containerId, amount) {
      const container = document.getElementById(containerId);
      container.scrollBy({ left: amount, behavior: 'smooth' });
    }
  </script>

</body>
</html>
