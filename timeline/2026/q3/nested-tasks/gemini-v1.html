<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraTask - Nordic Light Editorial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #fbf9f6; /* Serene warm cream paper */
      color: #2b2b2a;
    }
    .serif-header {
      font-family: 'Lora', serif;
    }
    .custom-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.08);
      border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen relative pb-16">

  <!-- Core Layout wrapper -->
  <div class="max-w-4xl mx-auto px-8 pt-12">
    
    <!-- Header -->
    <header class="flex justify-between items-center border-b border-stone-200 pb-6 mb-8">
      <div>
        <h1 class="serif-header text-2xl font-semibold tracking-tight text-stone-900">AuraTask Workspace</h1>
        <p class="text-[11px] text-stone-500 uppercase tracking-widest font-medium mt-0.5">Warm Nordic Edition</p>
      </div>

      <!-- Logs Counter and Button Link -->
      <button onclick="toggleLogsPane(true)" class="flex items-center gap-2 border border-stone-300 hover:border-stone-500 py-1.5 px-4 rounded-full text-xs font-semibold text-stone-700 hover:text-stone-900 transition-all">
        <span>Logs / Comments</span>
        <span id="log-badge" class="bg-stone-800 text-stone-100 text-[9px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
      </button>
    </header>

    <!-- Simulated breadcrumbs location -->
    <nav id="breadcrumbs" class="flex items-center gap-1 text-xs text-stone-500 mb-8 flex-wrap">
      <!-- Generated Dynamically -->
    </nav>

    <!-- Main Active Workspace Split -->
    <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
      
      <!-- Left side Workspace (Main focus space - 7 columns) -->
      <main class="md:col-span-8 space-y-8">
        
        <!-- Active Node properties header -->
        <section class="space-y-4">
          <div class="flex justify-between items-start gap-3">
            <div class="flex-1 space-y-2">
              <input type="text" id="task-title" class="serif-header w-full bg-transparent text-3xl font-semibold tracking-tight text-stone-900 border-b border-transparent focus:border-stone-300 focus:outline-none transition-all py-1" onchange="updateTaskTitle(this.value)">
              
              <!-- Clean edit toggled description wrapper -->
              <div id="desc-wrapper">
                <p id="desc-text" class="text-sm text-stone-600 leading-relaxed">Describe this nested element.</p>
                <button onclick="toggleEditDesc(true)" id="desc-edit-btn" class="text-xs text-stone-500 hover:text-stone-800 underline decoration-stone-300 font-medium mt-1 block">
                  Edit scope
                </button>
              </div>
              <div id="desc-input-wrapper" class="hidden space-y-2">
                <textarea id="desc-input" class="w-full bg-stone-100 border border-stone-200 text-xs p-3 rounded-md text-stone-800 focus:outline-none focus:border-stone-400" rows="3"></textarea>
                <div class="flex gap-2">
                  <button onclick="saveDescription()" class="text-xs bg-stone-800 text-white px-3 py-1 rounded">Save</button>
                  <button onclick="toggleEditDesc(false)" class="text-xs text-stone-500 hover:text-stone-800 px-3 py-1">Cancel</button>
                </div>
              </div>
            </div>

            <!-- Done status simple checkbox toggle -->
            <button onclick="toggleActiveTaskDone()" class="flex items-center gap-1.5 border border-stone-300 px-3 py-1.5 rounded-md hover:bg-stone-50 transition-all text-xs" id="active-done-btn">
              <span id="active-done-indicator" class="w-2 h-2 rounded-full bg-stone-400"></span>
              <span id="active-done-label" class="font-semibold text-stone-700">Pending</span>
            </button>
          </div>

          <!-- Tags manager block -->
          <div class="pt-3 border-t border-stone-200/60 flex flex-wrap items-center gap-1.5 text-[11px] text-stone-600">
            <span class="font-semibold opacity-60 uppercase">Tags:</span>
            <div id="tags-wrapper" class="flex flex-wrap gap-1">
              <!-- Render tags dynamically -->
            </div>
            <input type="text" id="new-tag" placeholder="+ add tag" class="bg-transparent border-b border-transparent focus:border-stone-300 focus:outline-none px-1 text-stone-700 w-16 text-[10px]" onkeydown="if(event.key==='Enter') addTag(this.value)">
          </div>
        </section>

        <!-- Sub-objectives Space -->
        <section class="space-y-4 pt-6 border-t border-stone-200">
          <div class="flex justify-between items-center">
            <h3 class="serif-header font-semibold text-stone-800">Objectives</h3>
            
            <!-- Done filters button -->
            <button id="filter-btn" onclick="toggleFilterCompleted()" class="text-xs text-stone-500 hover:text-stone-800 flex items-center gap-1">
              <span id="filter-indicator" class="w-1.5 h-1.5 bg-stone-500 rounded-full"></span>
              <span id="filter-text">Showing All</span>
            </button>
          </div>

          <!-- Quick Title-only Subtask creator -->
          <div class="relative">
            <input type="text" id="new-subtask" placeholder="Add custom subtask..." class="w-full bg-stone-50 border border-stone-300 focus:border-stone-600 focus:outline-none p-3.5 pr-12 rounded-md text-xs transition-all" onkeydown="if(event.key==='Enter') addSubtask()">
            <button onclick="addSubtask()" class="absolute right-3.5 top-3.5 text-stone-500 hover:text-stone-800">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
            </button>
          </div>

          <!-- List box container -->
          <div id="subtasks-list" class="space-y-2">
            <!-- Dynamic elements load -->
          </div>
        </section>

      </main>

      <!-- Right side collapsed Logs pane (collapses visually on mobile - 5 columns) -->
      <section id="logs-panel" class="md:col-span-4 bg-stone-100 border border-stone-200 p-6 rounded-lg space-y-4 md:block hidden">
        <div class="flex justify-between items-center pb-2 border-b border-stone-200">
          <h3 class="serif-header text-sm font-semibold text-stone-800">Comments & Logs</h3>
          <button onclick="toggleLogsPane(false)" class="text-stone-500 hover:text-stone-800 text-xs md:hidden">✕</button>
        </div>

        <div id="logs-timeline" class="space-y-3 max-h-[300px] overflow-y-auto pr-1 custom-scroll">
          <!-- Render logs -->
        </div>

        <div class="space-y-2 pt-2">
          <textarea id="log-input" class="w-full bg-white border border-stone-300 text-xs p-3 rounded focus:outline-none focus:border-stone-600 resize-none h-16" placeholder="Add comments / workspace logs..."></textarea>
          <button onclick="saveLog()" class="w-full bg-stone-800 hover:bg-stone-700 text-stone-100 text-xs py-2 rounded font-semibold transition-all">
            Log Comment
          </button>
        </div>
      </section>

    </div>

  </div>

  <!-- Notification toast alert -->
  <div id="toast" class="fixed bottom-6 right-6 bg-stone-900 text-stone-100 px-4 py-2.5 text-xs rounded shadow-lg opacity-0 transition-opacity duration-300 z-50 pointer-events-none"></div>

  <!-- Dev clean trigger footer -->
  <footer class="fixed bottom-0 left-0 w-full bg-stone-100 border-t border-stone-200 py-2.5 px-8 flex justify-between items-center text-[10px] text-stone-500">
    <span>LocalStorage Database Sandbox</span>
    <button onclick="resetDefaults()" class="underline hover:text-stone-800">Reset default templates</button>
  </footer>

  <script>
    let state = {
      tasks: {},
      keyValues: {},
      logs: {}
    };

    let currentTaskId = 'root';
    let hideCompleted = false;

    function saveState() {
      localStorage.setItem('nordic_minimalist_task_db', JSON.stringify(state));
    }

    function seedData() {
      if (localStorage.getItem('nordic_minimalist_task_db')) {
        state = JSON.parse(localStorage.getItem('nordic_minimalist_task_db'));
        return;
      }

      state.tasks['root'] = {
        id: 'root',
        title: "Main Project Hub",
        description: "Editorial workspace context mapping design deliverables.",
        parent_id: null,
        sub_tasks: ['item-1', 'item-2'],
        tags: "launch, visual"
      };

      state.tasks['item-1'] = {
        id: 'item-1',
        title: "Establish elegant typography variables",
        description: "Focus on serene font pairings and whitespace sizes.",
        parent_id: 'root',
        sub_tasks: [],
        tags: "nordic"
      };

      state.tasks['item-2'] = {
        id: 'item-2',
        title: "Build light paper template design",
        description: "Implement warmth into borders and backgrounds.",
        parent_id: 'root',
        sub_tasks: [],
        tags: "css"
      };

      state.keyValues['root'] = [{ key: 'done', type: 'boolean', value: 'false' }];
      state.keyValues['item-1'] = [{ key: 'done', type: 'boolean', value: 'true' }];
      state.keyValues['item-2'] = [{ key: 'done', type: 'boolean', value: 'false' }];

      state.logs['root'] = [
        { id: 'l1', content: "Began template setup. Warm theme variables established.", timestamp: new Date().toLocaleTimeString() }
      ];

      saveState();
    }

    function isTaskDone(taskId) {
      const kvs = state.keyValues[taskId] || [];
      const doneKv = kvs.find(k => k.key === 'done');
      return doneKv ? doneKv.value === 'true' : false;
    }

    async function render() {
      const activeTask = state.tasks[currentTaskId];
      if (!activeTask) {
        currentTaskId = 'root';
        render();
        return;
      }

      // Render Titles & Core details
      document.getElementById('task-title').value = activeTask.title;
      
      const descText = document.getElementById('desc-text');
      const descInput = document.getElementById('desc-input');
      if (activeTask.description) {
        descText.innerText = activeTask.description;
        descText.classList.remove('italic', 'opacity-50');
      } else {
        descText.innerText = "No detailed description added.";
        descText.classList.add('italic', 'opacity-50');
      }
      descInput.value = activeTask.description || '';

      // Active Done Toggle Render
      const done = isTaskDone(currentTaskId);
      const doneIndicator = document.getElementById('active-done-indicator');
      const doneLabel = document.getElementById('active-done-label');
      if (done) {
        doneIndicator.className = "w-2 h-2 rounded-full bg-emerald-600";
        doneLabel.innerText = "Done";
      } else {
        doneIndicator.className = "w-2 h-2 rounded-full bg-amber-500";
        doneLabel.innerText = "Pending";
      }

      // Breadcrumbs Sim path resolution
      const breadContainer = document.getElementById('breadcrumbs');
      breadContainer.innerHTML = '';
      
      const path = [];
      let temp = activeTask;
      while(temp) {
        path.unshift(temp);
        temp = temp.parent_id ? state.tasks[temp.parent_id] : null;
      }

      path.forEach((pTask, index) => {
        const isLast = index === path.length - 1;
        const btn = document.createElement('button');
        btn.innerText = pTask.title;
        btn.className = isLast ? "font-bold text-stone-900 pointer-events-none cursor-default" : "hover:text-stone-900 transition-colors underline underline-offset-4 decoration-stone-200";
        if (!isLast) {
          btn.onclick = () => selectTask(pTask.id);
        }
        breadContainer.appendChild(btn);

        if (!isLast) {
          const arrow = document.createElement('span');
          arrow.innerText = "➔";
          arrow.className = "text-stone-300 text-[10px] px-1.5";
          breadContainer.appendChild(arrow);
        }
      });

      // Tags Render
      const tagsWrapper = document.getElementById('tags-wrapper');
      tagsWrapper.innerHTML = '';
      const tags = activeTask.tags ? activeTask.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
      tags.forEach(t => {
        const span = document.createElement('span');
        span.className = "bg-stone-200 text-stone-700 py-0.5 px-2 rounded-full flex items-center gap-1";
        span.innerHTML = `
          <span>${t}</span>
          <button onclick="removeTag('${t}')" class="text-stone-400 hover:text-stone-950 ml-1">✕</button>
        `;
        tagsWrapper.appendChild(span);
      });

      // Filter Toggle UI render
      const filterText = document.getElementById('filter-text');
      const filterIndicator = document.getElementById('filter-indicator');
      if (hideCompleted) {
        filterText.innerText = "Showing Pending";
        filterIndicator.className = "w-1.5 h-1.5 bg-amber-500 rounded-full";
      } else {
        filterText.innerText = "Showing All";
        filterIndicator.className = "w-1.5 h-1.5 bg-stone-500 rounded-full";
      }

      // Sub-tasks Render loop
      const subtasksList = document.getElementById('subtasks-list');
      subtasksList.innerHTML = '';

      const children = activeTask.sub_tasks.map(id => state.tasks[id]).filter(Boolean);
      const filtered = hideCompleted ? children.filter(c => !isTaskDone(c.id)) : children;

      if (filtered.length === 0) {
        subtasksList.innerHTML = `<p class="text-xs text-stone-400 text-center py-6">No subtasks found.</p>`;
      } else {
        filtered.forEach(child => {
          const d = isTaskDone(child.id);
          const div = document.createElement('div');
          div.className = "bg-white border border-stone-200 hover:border-stone-400 p-4 rounded flex justify-between items-center transition-all";

          div.innerHTML = `
            <div class="flex items-center gap-3 flex-1 min-w-0" onclick="selectTask('${child.id}')">
              <button onclick="event.stopPropagation(); toggleSubtaskDone('${child.id}')" class="w-4 h-4 rounded border ${d ? 'bg-stone-800 border-stone-800 text-stone-100' : 'border-stone-300'} flex items-center justify-center text-[10px]">
                ${d ? '✓' : ''}
              </button>
              <span class="text-xs font-semibold block truncate cursor-pointer flex-1 ${d ? 'line-through text-stone-400' : 'text-stone-800'}">${child.title}</span>
            </div>
            <button onclick="deleteSubtask('${child.id}')" class="text-stone-400 hover:text-stone-800 p-1 text-xs">
              Remove
            </button>
          `;
          subtasksList.appendChild(div);
        });
      }

      // Render Logs pane details
      const logsTimeline = document.getElementById('logs-timeline');
      logsTimeline.innerHTML = '';
      const logs = state.logs[currentTaskId] || [];
      document.getElementById('log-badge').innerText = logs.length;

      if (logs.length === 0) {
        logsTimeline.innerHTML = `<p class="text-[11px] text-stone-400 italic text-center py-6">No workspace logs comments.</p>`;
      } else {
        logs.forEach(l => {
          const box = document.createElement('div');
          box.className = "p-2.5 bg-white border border-stone-200 rounded text-[11px]";
          box.innerHTML = `
            <div class="flex justify-between text-[9px] text-stone-400 mb-1">
              <span>Timeline Entry</span>
              <span>${l.timestamp}</span>
            </div>
            <p class="text-stone-700">${l.content}</p>
          `;
          logsTimeline.appendChild(box);
        });
      }
    }

    // Interactive Workspace controller functions
    function selectTask(id) {
      currentTaskId = id;
      render();
    }

    function toggleFilterCompleted() {
      hideCompleted = !hideCompleted;
      render();
    }

    function toggleSubtaskDone(id) {
      if (!state.keyValues[id]) state.keyValues[id] = [];
      const idx = state.keyValues[id].findIndex(k => k.key === 'done');
      if (idx > -1) {
        state.keyValues[id][idx].value = state.keyValues[id][idx].value === 'true' ? 'false' : 'true';
      } else {
        state.keyValues[id].push({ key: 'done', type: 'boolean', value: 'true' });
      }
      saveState();
      render();
    }

    function toggleActiveTaskDone() {
      toggleSubtaskDone(currentTaskId);
    }

    function addSubtask() {
      const input = document.getElementById('new-subtask');
      const title = input.value.trim();
      if (!title) return;

      const newId = 'task_' + Math.random().toString(36).substr(2, 9);
      state.tasks[newId] = {
        id: newId,
        title,
        description: "",
        parent_id: currentTaskId,
        sub_tasks: [],
        tags: ""
      };
      state.keyValues[newId] = [{ key: 'done', type: 'boolean', value: 'false' }];

      state.tasks[currentTaskId].sub_tasks.push(newId);

      input.value = '';
      saveState();
      showToast("Subtask created.");
      render();
    }

    function deleteSubtask(id) {
      state.tasks[currentTaskId].sub_tasks = state.tasks[currentTaskId].sub_tasks.filter(sid => sid !== id);
      delete state.tasks[id];
      delete state.keyValues[id];
      delete state.logs[id];
      saveState();
      showToast("Task removed.");
      render();
    }

    function updateTaskTitle(val) {
      const title = val.trim();
      if (!title) return;
      state.tasks[currentTaskId].title = title;
      saveState();
      render();
    }

    function toggleEditDesc(show) {
      if (show) {
        document.getElementById('desc-wrapper').classList.add('hidden');
        document.getElementById('desc-input-wrapper').classList.remove('hidden');
      } else {
        document.getElementById('desc-wrapper').classList.remove('hidden');
        document.getElementById('desc-input-wrapper').classList.add('hidden');
      }
    }

    function saveDescription() {
      const val = document.getElementById('desc-input').value.trim();
      state.tasks[currentTaskId].description = val;
      saveState();
      toggleEditDesc(false);
      render();
    }

    function addTag(val) {
      const clean = val.trim().replace(/,/g, '');
      if (!clean) return;

      const activeTask = state.tasks[currentTaskId];
      const tags = activeTask.tags ? activeTask.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
      if (!tags.includes(clean)) {
        tags.push(clean);
        activeTask.tags = tags.join(', ');
        saveState();
      }
      document.getElementById('new-tag').value = '';
      render();
    }

    function removeTag(tag) {
      const activeTask = state.tasks[currentTaskId];
      let tags = activeTask.tags ? activeTask.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
      tags = tags.filter(t => t !== tag);
      activeTask.tags = tags.join(', ');
      saveState();
      render();
    }

    // Toggle Pane Drawer (Slide or Overlay drawer)
    function toggleLogsPane(show) {
      const pane = document.getElementById('logs-panel');
      if (show) {
        pane.classList.remove('hidden');
        pane.scrollIntoView({ behavior: 'smooth' });
      } else {
        pane.classList.add('hidden');
      }
    }

    function saveLog() {
      const input = document.getElementById('log-input');
      const text = input.value.trim();
      if (!text) return;

      if (!state.logs[currentTaskId]) state.logs[currentTaskId] = [];
      state.logs[currentTaskId].push({
        id: 'log_' + Math.random().toString(36).substr(2, 9),
        content: text,
        timestamp: new Date().toLocaleTimeString()
      });

      input.value = '';
      saveState();
      render();
    }

    function resetDefaults() {
      localStorage.removeItem('nordic_minimalist_task_db');
      state = { tasks: {}, keyValues: {}, logs: {} };
      seedData();
      render();
      showToast("Restored template defaults.");
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.classList.remove('opacity-0');
      setTimeout(() => toast.classList.add('opacity-0'), 2000);
    }

    seedData();
    render();
  </script>
</body>
</html>
