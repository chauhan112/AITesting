<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threadline — Task tracking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { display: ['Georgia', 'serif'], ui: ['Inter', 'ui-sans-serif', 'system-ui'] } } } }
  </script>
  <style>
    :root { --ink:#18231d; --paper:#f7f4ed; --leaf:#2f5b44; --moss:#d6e0c8; --line:#dcd8ce; --muted:#6e766e; --card:#fffdf8; --accent:#db624b; --accent-soft:#f9e3dc; }
    body { background:var(--paper); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,sans-serif; }
    .theme-studio { --ink:#edf0ec; --paper:#131713; --leaf:#a9d8a7; --moss:#253129; --line:#364038; --muted:#98a39a; --card:#1d241e; --accent:#f2b84b; --accent-soft:#44391f; }
    .theme-studio body { background:var(--paper); }
    .card { background:var(--card); border-color:var(--line); }
    .ink { color:var(--ink); } .muted { color:var(--muted); } .leaf { color:var(--leaf); } .bg-leaf { background:var(--leaf); } .border-line { border-color:var(--line); }
    .task-row { transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; }
    .task-row:hover { transform:translateX(3px); border-color:var(--leaf); box-shadow:0 10px 25px rgba(20,30,21,.06); }
    .theme-studio .task-row:hover { box-shadow:0 10px 25px rgba(0,0,0,.25); }
    .leaf-ring { box-shadow: inset 0 0 0 1px var(--line); }
    .grain { background-image:radial-gradient(rgba(24,35,29,.08) .7px,transparent .7px); background-size:8px 8px; }
    .theme-studio .grain { background-image:radial-gradient(rgba(255,255,255,.07) .7px,transparent .7px); }
    .modal-backdrop { background:rgba(13,19,14,.46); backdrop-filter: blur(4px); }
    input, textarea, select { color:var(--ink); background:var(--card); border-color:var(--line); }
    input:focus, textarea:focus, select:focus { outline:2px solid var(--accent); outline-offset:1px; }
    @media (prefers-reduced-motion: reduce) { *,*:before,*:after { transition:none!important; scroll-behavior:auto!important; } }
  </style>
</head>
<body class="min-h-screen">
  <div id="app" class="min-h-screen">
    <header class="sticky top-0 z-20 border-b border-line" style="background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(16px)">
      <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6">
        <button onclick="goHome()" class="flex items-center gap-3 text-left" aria-label="Go to all workspaces">
          <span class="grid h-9 w-9 place-items-center rounded-full bg-leaf font-display text-lg italic" style="color:var(--paper)">T</span>
          <span><span class="block font-display text-lg leading-none ink">Threadline</span><span class="mt-1 block text-[10px] font-semibold uppercase tracking-[.18em] muted">work, in context</span></span>
        </button>
        <div class="flex items-center gap-2">
          <button onclick="toggleTheme()" id="themeButton" class="rounded-full border border-line px-3 py-2 text-xs font-semibold muted hover:leaf" aria-label="Switch design">Studio design</button>
          <button onclick="newRoot()" class="grid h-9 w-9 place-items-center rounded-full bg-leaf text-xl" style="color:var(--paper)" aria-label="New root task">+</button>
        </div>
      </div>
    </header>
    <main class="mx-auto max-w-7xl px-4 py-7 sm:px-6 lg:py-10">
      <div id="view"></div>
    </main>
  </div>

  <div id="modal" class="fixed inset-0 z-50 hidden items-end justify-center p-0 sm:items-center sm:p-6">
    <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
    <div class="card relative w-full max-w-xl rounded-t-3xl border p-5 shadow-2xl sm:rounded-3xl sm:p-7">
      <div class="mb-6 flex items-center justify-between"><div><p id="modalEyebrow" class="text-[11px] font-bold uppercase tracking-[.2em] leaf">New thread</p><h2 id="modalTitle" class="mt-1 font-display text-3xl ink">Capture a task</h2></div><button onclick="closeModal()" class="grid h-9 w-9 place-items-center rounded-full border border-line muted" aria-label="Close">×</button></div>
      <form onsubmit="saveTask(event)" class="space-y-4">
        <input id="editingId" type="hidden" />
        <input id="parentId" type="hidden" />
        <label class="block"><span class="mb-1.5 block text-sm font-semibold ink">Name</span><input id="taskTitle" required maxlength="100" class="w-full rounded-xl border px-3.5 py-3 text-sm" placeholder="What needs your attention?" /></label>
        <label class="block"><span class="mb-1.5 block text-sm font-semibold ink">Intent</span><textarea id="taskDescription" rows="3" maxlength="500" class="w-full resize-none rounded-xl border px-3.5 py-3 text-sm" placeholder="A little context helps future you." ></textarea></label>
        <div class="flex items-center justify-end gap-3 pt-2"><button type="button" onclick="closeModal()" class="px-3 py-2 text-sm font-semibold muted">Cancel</button><button class="rounded-full bg-leaf px-5 py-2.5 text-sm font-semibold" style="color:var(--paper)">Save task</button></div>
      </form>
    </div>
  </div>

<script>
const KEY='threadline-tasks-v1';
let memoryStore=null;
let currentId=null;
let studio=false;
function uid(){return 't_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function seed(){const project={id:uid(),title:'Launch the BEM knowledge hub',description:'A calm, useful space for practical BEM guidance.',parentId:null,createdAt:Date.now()-86400000};const research={id:uid(),title:'Shape the first content map',description:'Decide what a new reader needs in their first five minutes.',parentId:project.id,createdAt:Date.now()-76000000};const interview={id:uid(),title:'Interview two BEM advisors',description:'Collect real questions, not assumed ones.',parentId:research.id,createdAt:Date.now()-73000000};const prototype={id:uid(),title:'Sketch the landing page',description:'Turn the map into a focused first impression.',parentId:project.id,createdAt:Date.now()-42000000};const ops={id:uid(),title:'Build a kinder weekly rhythm',description:'Small systems to make team work less noisy.',parentId:null,createdAt:Date.now()-3600000};return {tasks:[project,research,interview,prototype,ops],logs:{[project.id]:[{id:uid(),content:'The hub should answer one question quickly: “What is the next helpful step?”',createdAt:Date.now()-83000000}], [research.id]:[{id:uid(),content:'Done: reviewed the existing materials. Next: collect wording from the people who advise cases every day.',createdAt:Date.now()-70000000}], [prototype.id]:[{id:uid(),content:'Next: make one mobile-first wireframe before adding visual polish.',createdAt:Date.now()-39000000}]},kv:{}}}
function load(){try{const v=localStorage.getItem(KEY);if(v)return JSON.parse(v)}catch(e){} if(!memoryStore){memoryStore=seed()}return memoryStore}
function persist(d){memoryStore=d;try{localStorage.setItem(KEY,JSON.stringify(d))}catch(e){}}
function getTask(id){return load().tasks.find(t=>t.id===id)}
function children(id){return load().tasks.filter(t=>t.parentId===id).sort((a,b)=>a.createdAt-b.createdAt)}
function roots(){return load().tasks.filter(t=>!t.parentId).sort((a,b)=>b.createdAt-a.createdAt)}
function esc(s=''){return s.replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function taskPath(id){let path=[];let t=getTask(id);while(t){path.unshift(t);t=t.parentId?getTask(t.parentId):null}return path}
function time(ts){const d=Math.max(1,Math.round((Date.now()-ts)/86400000));return d===1?'today':d+'d ago'}
function openTaskModal(parent=null,edit=null){document.getElementById('modal').classList.replace('hidden','flex');document.getElementById('editingId').value=edit?.id||'';document.getElementById('parentId').value=parent||edit?.parentId||'';document.getElementById('taskTitle').value=edit?.title||'';document.getElementById('taskDescription').value=edit?.description||'';document.getElementById('modalEyebrow').textContent=edit?'Refine thread':parent?'A next step':'New thread';document.getElementById('modalTitle').textContent=edit?'Edit this task':parent?'Add a sub-task':'Capture a task';setTimeout(()=>document.getElementById('taskTitle').focus(),100)}
function closeModal(){document.getElementById('modal').classList.replace('flex','hidden')}
function saveTask(e){e.preventDefault();let d=load(),id=document.getElementById('editingId').value,title=document.getElementById('taskTitle').value.trim(),description=document.getElementById('taskDescription').value.trim(),parentId=document.getElementById('parentId').value||null;if(id){let t=getTask(id);t.title=title;t.description=description}else{id=uid();d.tasks.push({id,title,description,parentId,createdAt:Date.now()})}persist(d);closeModal();currentId=id;render()}
function deleteTask(id){if(!confirm('Delete this task and everything nested inside it?'))return;let d=load(),dead=new Set([id]),changed=true;while(changed){changed=false;d.tasks.forEach(t=>{if(t.parentId&&dead.has(t.parentId)&&!dead.has(t.id)){dead.add(t.id);changed=true}})}d.tasks=d.tasks.filter(t=>!dead.has(t.id));Object.keys(d.logs).forEach(k=>{if(dead.has(k))delete d.logs[k]});persist(d);currentId=null;render()}
function addLog(e,id){e.preventDefault();let input=document.getElementById('logInput'),content=input.value.trim();if(!content)return;let d=load();d.logs[id]=d.logs[id]||[];d.logs[id].unshift({id:uid(),content,createdAt:Date.now()});persist(d);input.value='';render()}
function toggleTheme(){studio=!studio;document.documentElement.classList.toggle('theme-studio',studio);document.getElementById('themeButton').textContent=studio?'Field notes design':'Studio design'}
function goHome(){currentId=null;render()}
function taskCard(t){let count=children(t.id).length, logs=(load().logs[t.id]||[]).length;return `<button onclick="openTask('${t.id}')" class="task-row card w-full rounded-2xl border p-4 text-left sm:p-5"><div class="flex gap-3"><span class="mt-1 h-2.5 w-2.5 flex-none rounded-full" style="background:var(--accent)"></span><div class="min-w-0 flex-1"><div class="flex items-start justify-between gap-3"><h3 class="font-display text-xl leading-tight ink">${esc(t.title)}</h3><span class="whitespace-nowrap text-[11px] muted">${time(t.createdAt)}</span></div><p class="mt-2 line-clamp-2 text-sm leading-6 muted">${esc(t.description||'No intent recorded yet.')}</p><div class="mt-4 flex gap-4 text-xs font-semibold muted"><span>${count} next ${count===1?'step':'steps'}</span><span>${logs} ${logs===1?'note':'notes'}</span></div></div></div></button>`}
function home(){const allRoots=roots(), all=load().tasks;return `<section class="grid gap-8 lg:grid-cols-[1fr_320px] lg:gap-14"><div><p class="text-[11px] font-bold uppercase tracking-[.2em] leaf">Your work table</p><div class="mt-3 flex flex-wrap items-end justify-between gap-4"><div><h1 class="font-display text-4xl leading-none sm:text-5xl ink">Keep the thread.</h1><p class="mt-3 max-w-xl text-base leading-7 muted">Write what moved. Let the next action become a task. Nothing gets lost in a status update again.</p></div><button onclick="openTaskModal()" class="rounded-full border border-line px-4 py-2.5 text-sm font-semibold ink hover:border-current">New root task</button></div><div class="mt-8 grid gap-3">${allRoots.length?allRoots.map(taskCard).join(''):`<div class="card rounded-2xl border border-dashed p-10 text-center"><p class="font-display text-2xl ink">The table is clear.</p><p class="mt-2 text-sm muted">Start a thread for the work you want to hold onto.</p></div>`}</div></div><aside class="grain card h-fit rounded-3xl border p-6"><p class="text-[11px] font-bold uppercase tracking-[.2em] leaf">A small ritual</p><h2 class="mt-3 font-display text-3xl leading-tight ink">Logs are evidence of progress.</h2><p class="mt-3 text-sm leading-6 muted">Use a task note for what happened. Turn each “next” into a child task. The hierarchy becomes your plan.</p><div class="mt-7 border-t border-line pt-5"><div class="flex items-baseline gap-2"><span class="font-display text-4xl ink">${all.length}</span><span class="text-xs font-semibold uppercase tracking-wider muted">active tasks</span></div></div></aside></section>`}
function detail(id){const t=getTask(id);if(!t){goHome();return ''}const path=taskPath(id), kids=children(id), logs=(load().logs[id]||[]);return `<section><nav class="mb-7 flex flex-wrap items-center gap-1.5 text-xs font-semibold muted">${path.map((p,i)=>`${i?'<span class="px-1">/</span>':''}<button onclick="openTask('${p.id}')" class="hover:leaf ${i===path.length-1?'leaf':''}">${esc(p.title)}</button>`).join('')}</nav><div class="grid gap-8 lg:grid-cols-[minmax(0,1fr)_360px] lg:gap-14"><div><div class="flex items-start gap-3"><span class="mt-3 h-3 w-3 flex-none rounded-full" style="background:var(--accent)"></span><div class="min-w-0 flex-1"><div class="flex flex-wrap items-start justify-between gap-4"><div><p class="text-[11px] font-bold uppercase tracking-[.2em] leaf">${t.parentId?'sub-task':'root task'}</p><h1 class="mt-2 font-display text-4xl leading-tight sm:text-5xl ink">${esc(t.title)}</h1></div><div class="flex gap-2"><button onclick="openTaskModal(null,getTask('${id}'))" class="rounded-full border border-line px-3 py-2 text-xs font-semibold muted">Edit</button><button onclick="deleteTask('${id}')" class="rounded-full border border-line px-3 py-2 text-xs font-semibold" style="color:var(--accent)">Delete</button></div></div><p class="mt-4 max-w-2xl text-base leading-7 muted">${esc(t.description||'No intent recorded. Add a few words so this thread stays legible.')}</p></div></div><section class="mt-10"><div class="mb-4 flex items-end justify-between"><div><p class="text-[11px] font-bold uppercase tracking-[.2em] leaf">Next moves</p><h2 class="mt-1 font-display text-3xl ink">What happens from here</h2></div><button onclick="openTaskModal('${id}')" class="rounded-full bg-leaf px-4 py-2 text-sm font-semibold" style="color:var(--paper)">+ Add next step</button></div><div class="grid gap-3">${kids.length?kids.map(taskCard).join(''):`<div class="card rounded-2xl border border-dashed px-5 py-8 text-center"><p class="font-display text-xl ink">No next steps yet.</p><p class="mt-1 text-sm muted">Read your latest note, then give the next action its own thread.</p></div>`}</div></section></div><aside class="lg:pt-2"><div class="card rounded-3xl border p-5 sm:p-6"><p class="text-[11px] font-bold uppercase tracking-[.2em] leaf">Work log</p><h2 class="mt-1 font-display text-3xl ink">What changed?</h2><form onsubmit="addLog(event,'${id}')" class="mt-4"><textarea id="logInput" required rows="4" class="w-full resize-none rounded-xl border p-3 text-sm leading-6" placeholder="Done: …&#10;Next: …"></textarea><button class="mt-3 w-full rounded-full px-4 py-2.5 text-sm font-semibold" style="background:var(--accent);color:#fff">Add note</button></form><div class="mt-6 space-y-4">${logs.length?logs.map(l=>`<article class="border-t border-line pt-4"><p class="text-sm leading-6 ink">${esc(l.content)}</p><p class="mt-2 text-[11px] font-semibold uppercase tracking-wider muted">${time(l.createdAt)}</p></article>`).join(''):`<p class="border-t border-line pt-5 text-sm leading-6 muted">No notes yet. Leave a trace of what you completed — and turn the next step into a task.</p>`}</div></div></aside></div></section>`}
function openTask(id){currentId=id;render();window.scrollTo({top:0,behavior:'smooth'})}
function render(){document.getElementById('view').innerHTML=currentId?detail(currentId):home()}
render();
</script>
<style>
  /* Compact v2: designed around the log, not decorative empty space */
  .theme-ghibli { --ink:#26342d; --paper:#e9efd9; --leaf:#52734d; --moss:#c9ddaf; --line:#b8c8aa; --muted:#667365; --card:#f7f5df; --accent:#d8754b; }
  .theme-cyberpunk { --ink:#f1efff; --paper:#10101b; --leaf:#64f4d2; --moss:#20213a; --line:#3c3e65; --muted:#a9a8c3; --card:#18182a; --accent:#ff4f9a; }
  .theme-cyberpunk .card { box-shadow:0 0 0 1px rgba(100,244,210,.04),0 10px 32px rgba(0,0,0,.2); }
  .compact-card { background:var(--card); border-color:var(--line); }
</style>
<script>
/* Threadline v2 — localStorage schema: tasks, logs, kv (key/value properties) */
let screen='home', editingTaskId=null, showAll=false, childView='immediate', themeIndex=0;
const themes=['field','studio','ghibli','cyberpunk'];
function props(id){const d=load(); return (d.kv&&d.kv[id])||[]}
function prop(id,key){const p=props(id).find(x=>x.key===key); return p?p.value:null}
function isDone(id){return prop(id,'done')===true || prop(id,'done')==='true'}
function setProp(id,key,value,type=typeof value){let d=load();d.kv=d.kv||{};d.kv[id]=d.kv[id]||[];let p=d.kv[id].find(x=>x.key===key);if(p){p.value=value;p.type=type}else d.kv[id].push({id:uid(),task_id:id,key,type,value});persist(d)}
function allDescendants(id){let out=[];const walk=x=>children(x).forEach(c=>{out.push(c);walk(c.id)});walk(id);return out}
function visible(list){return showAll?list:list.filter(t=>!isDone(t.id))}
function toggleDone(e,id){e.stopPropagation();setProp(id,'done',!isDone(id),'boolean');render()}
function cycleTheme(){themeIndex=(themeIndex+1)%themes.length;const theme=themes[themeIndex];document.documentElement.classList.remove('theme-studio','theme-ghibli','theme-cyberpunk');if(theme!=='field')document.documentElement.classList.add('theme-'+theme);document.getElementById('themeButton').textContent=({field:'Field',studio:'Studio',ghibli:'Ghibli',cyberpunk:'Cyberpunk'})[theme]}
function toggleTheme(){cycleTheme()}
function goHome(){screen='home';editingTaskId=null;currentId=null;render()}
function back(){if(screen==='edit'||screen==='newroot'){screen=currentId?'task':'home';editingTaskId=null}else {const t=getTask(currentId);if(t&&t.parentId){currentId=t.parentId;screen='task'}else goHome()}render()}
function taskLine(t,depth=0){const done=isDone(t.id);return `<article onclick="openTask('${t.id}')" class="compact-card flex cursor-pointer items-center gap-2.5 border-b px-3 py-2.5 last:border-b-0 hover:opacity-90" style="padding-left:${12+depth*18}px"><button onclick="toggleDone(event,'${t.id}')" aria-label="Mark ${done?'not done':'done'}" class="grid h-5 w-5 flex-none place-items-center rounded-full border text-[11px] font-bold ${done?'':'muted'}" style="border-color:${done?'var(--leaf)':'var(--line)'};background:${done?'var(--leaf)':'transparent'};color:var(--paper)">${done?'✓':''}</button><div class="min-w-0 flex-1"><p class="truncate text-sm font-semibold ${done?'line-through muted':'ink'}">${esc(t.title)}</p>${t.description?`<p class="mt-0.5 truncate text-xs muted">${esc(t.description)}</p>`:''}</div><span class="text-[11px] muted">${children(t.id).length?children(t.id).length+' ›':''}</span></article>`}
function inlineAdd(e,parentId){e.preventDefault();const input=e.target.querySelector('input'),title=input.value.trim();if(!title)return;const d=load(),id=uid();d.tasks.push({id,title,description:'',parentId,createdAt:Date.now()});persist(d);input.value='';render()}
function quickAdd(parentId,label='Add next step'){return `<form onsubmit="inlineAdd(event,${parentId?`'${parentId}'`:'null'})" class="mt-2 flex gap-2"><input required maxlength="100" class="min-w-0 flex-1 border-b border-line bg-transparent px-1.5 py-2 text-sm" placeholder="${label}" /><button aria-label="Add task" class="grid h-9 w-9 flex-none place-items-center rounded-full bg-leaf text-xl" style="color:var(--paper)">+</button></form>`}
function home(){const root=visible(roots());return `<section class="mx-auto max-w-3xl"><div class="mb-4 flex items-center justify-between"><div><p class="text-[10px] font-bold uppercase tracking-[.18em] leaf">Threadline</p><h1 class="font-display text-3xl ink">Tasks in context</h1></div><button onclick="newRoot()" class="grid h-9 w-9 place-items-center rounded-full bg-leaf text-xl" style="color:var(--paper)" aria-label="New root task">+</button></div><div class="compact-card overflow-hidden rounded-xl border">${root.length?root.map(t=>taskLine(t)).join(''):`<p class="p-4 text-sm muted">No open root tasks.</p>`}</div>${quickAdd(null,'Quickly add a root task')}<p class="mt-5 text-xs muted">${showAll?'Showing all tasks':'Showing open tasks only'} · <button onclick="showAll=!showAll;render()" class="font-semibold leaf">${showAll?'Hide completed':'Show completed'}</button></p></section>`}
function task(){const t=getTask(currentId);if(!t){goHome();return ''}const immediate=visible(children(t.id)), flat=visible(allDescendants(t.id)), list=childView==='flat'?flat:immediate;return `<section class="mx-auto max-w-4xl"><div class="mb-3 flex items-center justify-between"><button onclick="back()" class="text-sm font-semibold leaf">← Back</button><div class="flex gap-2"><button onclick="showAll=!showAll;render()" class="rounded-full border border-line px-2.5 py-1 text-xs muted">${showAll?'All':'Open'}</button><button onclick="editTask('${t.id}')" class="rounded-full border border-line px-2.5 py-1 text-xs ink">Edit</button></div></div><nav class="mb-3 truncate text-xs muted">${taskPath(t.id).map((p,i)=>`<button onclick="openTask('${p.id}')" class="${i===taskPath(t.id).length-1?'leaf font-semibold':''}">${esc(p.title)}</button>`).join(' <span class="px-1">/</span> ')}</nav><div class="flex gap-2"><button onclick="toggleDone(event,'${t.id}')" class="mt-1 grid h-6 w-6 flex-none place-items-center rounded-full border text-xs" style="border-color:${isDone(t.id)?'var(--leaf)':'var(--line)'};background:${isDone(t.id)?'var(--leaf)':'transparent'};color:var(--paper)">${isDone(t.id)?'✓':''}</button><div><h1 class="font-display text-3xl leading-tight ink">${esc(t.title)}</h1>${t.description?`<p class="mt-1 text-sm leading-5 muted">${esc(t.description)}</p>`:`<button onclick="editTask('${t.id}')" class="mt-1 text-xs leaf">Add a description</button>`}</div></div><div class="mt-5 grid gap-4 lg:grid-cols-[1fr_360px]"><div><div class="mb-2 flex items-center justify-between"><h2 class="font-display text-xl ink">${childView==='flat'?'All nested tasks':'Next steps'}</h2><div class="rounded-lg border border-line p-0.5 text-[11px]"><button onclick="childView='immediate';render()" class="rounded px-2 py-1 ${childView==='immediate'?'bg-leaf text-white':''}">Direct</button><button onclick="childView='flat';render()" class="rounded px-2 py-1 ${childView==='flat'?'bg-leaf text-white':''}">All</button></div></div><div class="compact-card overflow-hidden rounded-xl border">${list.length?list.map(x=>taskLine(x,childView==='flat'?taskPath(x.id).length-taskPath(t.id).length-1:0)).join(''):`<p class="p-3 text-sm muted">No ${childView==='flat'?'nested tasks':'next steps'}.</p>`}</div>${quickAdd(t.id,'Add a next step')}</div><aside class="compact-card h-fit rounded-xl border p-3"><div class="flex items-center justify-between"><h2 class="font-display text-xl ink">Log</h2><span class="text-[11px] muted">${(load().logs[t.id]||[]).length}</span></div><form onsubmit="addLog(event,'${t.id}')" class="mt-2"><textarea id="logInput" required rows="3" class="w-full resize-none rounded-lg border p-2 text-sm" placeholder="Done: …&#10;Next: …"></textarea><button class="mt-1.5 rounded-lg px-3 py-1.5 text-xs font-semibold" style="background:var(--accent);color:#fff">Add note</button></form><div class="mt-3 space-y-3">${(load().logs[t.id]||[]).map(l=>`<article class="border-t border-line pt-2"><p class="text-sm leading-5 ink">${esc(l.content)}</p><p class="mt-1 text-[10px] muted">${time(l.createdAt)}</p></article>`).join('')||'<p class="text-sm muted">No notes yet.</p>'}</div></aside></div></section>`}
function newRoot(){screen='newroot';editingTaskId=null;currentId=null;render()}
function editTask(id){screen='edit';editingTaskId=id;currentId=id;render()}
function saveEditor(e){e.preventDefault();const f=e.target,d=load(),id=editingTaskId,title=f.title.value.trim(),description=f.description.value.trim();if(screen==='newroot'){const newId=uid();d.tasks.push({id:newId,title,description,parentId:null,createdAt:Date.now()});currentId=newId}else{const t=getTask(id);t.title=title;t.description=description}persist(d);screen='task';render()}
function addProperty(e,id){e.preventDefault();const f=e.target,key=f.key.value.trim(),value=f.value.value.trim(),type=f.type.value;if(!key)return;let val=type==='boolean'?value==='true':value;setProp(id,key,val,type);f.reset();render()}
function removeProperty(id,key){let d=load();d.kv[id]=(d.kv[id]||[]).filter(p=>p.key!==key);persist(d);render()}
function editor(){const t=editingTaskId?getTask(editingTaskId):null;const propertyList=t?props(t.id):[];return `<section class="mx-auto max-w-2xl"><button onclick="back()" class="mb-4 text-sm font-semibold leaf">← Back</button><p class="text-[10px] font-bold uppercase tracking-[.18em] leaf">${t?'Task details':'New root task'}</p><h1 class="mt-1 font-display text-3xl ink">${t?'Edit task':'Start a new thread'}</h1><form onsubmit="saveEditor(event)" class="mt-4 space-y-3"><input name="title" required maxlength="100" value="${esc(t?.title||'')}" class="w-full rounded-lg border p-2.5 text-sm" placeholder="Task title" autofocus><textarea name="description" rows="5" class="w-full rounded-lg border p-2.5 text-sm" placeholder="Description / context">${esc(t?.description||'')}</textarea><button class="rounded-lg bg-leaf px-4 py-2 text-sm font-semibold" style="color:var(--paper)">Save changes</button></form>${t?`<section class="mt-6 border-t border-line pt-4"><h2 class="font-display text-2xl ink">Properties</h2><p class="mt-1 text-xs muted">Add structured fields such as links, owners, or labels.</p><div class="mt-3 divide-y divide-[var(--line)]">${propertyList.map(p=>`<div class="flex items-center gap-2 py-2 text-sm"><code class="rounded bg-[var(--moss)] px-1.5 py-0.5 text-xs ink">${esc(p.key)}</code><span class="min-w-0 flex-1 truncate ink">${esc(String(p.value))}</span><span class="text-[10px] muted">${esc(p.type)}</span>${p.key!=='done'?`<button onclick="removeProperty('${t.id}','${esc(p.key)}')" class="text-xs" style="color:var(--accent)">×</button>`:''}</div>`).join('')||'<p class="py-2 text-sm muted">No extra properties.</p>'}</div><form onsubmit="addProperty(event,'${t.id}')" class="mt-3 grid grid-cols-[1fr_90px_1fr_auto] gap-1.5"><input name="key" required class="min-w-0 rounded-lg border p-2 text-xs" placeholder="key"><select name="type" class="rounded-lg border p-2 text-xs"><option>text</option><option>url</option><option>number</option><option>boolean</option></select><input name="value" required class="min-w-0 rounded-lg border p-2 text-xs" placeholder="value"><button class="rounded-lg bg-leaf px-2 text-sm" style="color:var(--paper)">+</button></form></section><button onclick="deleteTask('${t.id}')" class="mt-7 text-sm" style="color:var(--accent)">Delete task</button>`:''}</section>`}
function openTask(id){currentId=id;screen='task';editingTaskId=null;render();window.scrollTo({top:0,behavior:'smooth'})}
function render(){document.getElementById('view').innerHTML=screen==='home'?home():screen==='task'?task():editor()}
render();
</script>
<script>
/* Compact navigation pass: root-only tree controls, global search, dedicated notes and fields pages. */
let query='';
function searchTasks(value){query=value.trim().toLowerCase();render()}
function matches(t){return !query || (t.title+' '+(t.description||'')).toLowerCase().includes(query)}
function iconButton(action,label,icon){return `<button onclick="${action}" aria-label="${label}" title="${label}" class="grid h-8 w-8 place-items-center rounded-full border border-line text-sm ink hover:leaf">${icon}</button>`}
function taskLine(t){const done=isDone(t.id);return `<article onclick="openTask('${t.id}')" class="compact-card flex cursor-pointer items-center gap-2.5 border-b px-3 py-2.5 last:border-b-0 hover:opacity-90"><button onclick="toggleDone(event,'${t.id}')" aria-label="Mark ${done?'not done':'done'}" class="grid h-5 w-5 flex-none place-items-center rounded-full border text-[11px] font-bold ${done?'':'muted'}" style="border-color:${done?'var(--leaf)':'var(--line)'};background:${done?'var(--leaf)':'transparent'};color:var(--paper)">${done?'✓':''}</button><div class="min-w-0 flex-1"><p class="truncate text-sm font-semibold ${done?'line-through muted':'ink'}">${esc(t.title)}</p>${t.description?`<p class="mt-0.5 truncate text-xs muted">${esc(t.description)}</p>`:''}</div><span class="text-[11px] muted">${children(t.id).length?children(t.id).length+' ›':''}</span></article>`}
function home(){const list=visible(roots().filter(matches));const searched=visible(load().tasks.filter(matches));const content=query?`<p class="mb-2 text-xs muted">${searched.length} matching task${searched.length===1?'':'s'}</p><div class="compact-card overflow-hidden rounded-xl border">${searched.length?searched.map(taskLine).join(''):'<p class="p-3 text-sm muted">No tasks match this search.</p>'}</div>`:`<div class="compact-card overflow-hidden rounded-xl border">${list.length?list.map(taskLine).join(''):'<p class="p-4 text-sm muted">No open root tasks.</p>'}</div>${quickAdd(null,'Quickly add a root task')}`;return `<section class="mx-auto max-w-3xl"><div class="mb-3 flex items-center justify-between"><div><p class="text-[10px] font-bold uppercase tracking-[.18em] leaf">Threadline</p><h1 class="font-display text-3xl ink">Tasks in context</h1></div>${iconButton('newRoot()','New root task','＋')}</div><label class="mb-3 flex items-center gap-2 rounded-lg border border-line px-2.5 py-2"><span class="muted">⌕</span><input oninput="searchTasks(this.value)" value="${esc(query)}" class="min-w-0 flex-1 border-0 bg-transparent p-0 text-sm outline-none" placeholder="Search every task" /></label>${content}<p class="mt-4 text-xs muted">${showAll?'Showing all tasks':'Showing open tasks only'} · <button onclick="showAll=!showAll;render()" class="font-semibold leaf">${showAll?'Hide completed':'Show completed'}</button></p></section>`}
function task(){const t=getTask(currentId);if(!t){goHome();return ''}const root=!t.parentId;const list=visible((root&&childView==='flat'?allDescendants(t.id):children(t.id)));return `<section class="mx-auto max-w-3xl"><div class="mb-3 flex items-center justify-between"><button onclick="back()" class="text-sm font-semibold leaf">← Back</button><div class="flex gap-1.5">${iconButton('openLog()','Open work log','▤')}${iconButton('openProperties()','Manage properties','⋯')}${iconButton('editTask(currentId)','Edit task','✎')}</div></div><nav class="mb-2 truncate text-xs muted">${taskPath(t.id).map((p,i)=>`<button onclick="openTask('${p.id}')" class="${i===taskPath(t.id).length-1?'leaf font-semibold':''}">${esc(p.title)}</button>`).join(' <span class="px-1">/</span> ')}</nav><div class="flex gap-2"><button onclick="toggleDone(event,'${t.id}')" class="mt-1 grid h-6 w-6 flex-none place-items-center rounded-full border text-xs" style="border-color:${isDone(t.id)?'var(--leaf)':'var(--line)'};background:${isDone(t.id)?'var(--leaf)':'transparent'};color:var(--paper)">${isDone(t.id)?'✓':''}</button><div><h1 class="font-display text-3xl leading-tight ink">${esc(t.title)}</h1>${t.description?`<p class="mt-1 text-sm leading-5 muted">${esc(t.description)}</p>`:`<button onclick="editTask('${t.id}')" class="mt-1 text-xs leaf">Add a description</button>`}</div></div><section class="mt-5"><div class="mb-2 flex items-center justify-between"><h2 class="font-display text-xl ink">${root&&childView==='flat'?'All tasks in this thread':'Next steps'}</h2><div class="flex items-center gap-1.5">${root?`<div class="rounded-lg border border-line p-0.5 text-[11px]"><button onclick="childView='immediate';render()" class="rounded px-2 py-1 ${childView==='immediate'?'bg-leaf text-white':''}">Direct</button><button onclick="childView='flat';render()" class="rounded px-2 py-1 ${childView==='flat'?'bg-leaf text-white':''}">All</button></div>`:''}<button onclick="showAll=!showAll;render()" class="rounded-full border border-line px-2.5 py-1 text-xs muted">${showAll?'All':'Open'}</button></div></div><div class="compact-card overflow-hidden rounded-xl border">${list.length?list.map(taskLine).join(''):`<p class="p-3 text-sm muted">No ${root&&childView==='flat'?'nested tasks':'next steps'}.</p>`}</div>${quickAdd(t.id,'Add a next step')}</section></section>`}
function openLog(id=currentId){currentId=id;screen='log';render()}
function logPage(){const t=getTask(currentId),logs=(load().logs[currentId]||[]);return `<section class="mx-auto max-w-2xl"><div class="mb-4 flex items-center justify-between"><button onclick="screen='task';render()" class="text-sm font-semibold leaf">← Back to task</button><span class="text-xs muted">Work log</span></div><h1 class="font-display text-3xl ink">${esc(t.title)}</h1><form onsubmit="addLog(event,'${t.id}')" class="mt-4"><textarea id="logInput" required rows="5" class="w-full resize-none rounded-lg border p-2.5 text-sm" placeholder="Done: …&#10;Next: …"></textarea><button class="mt-2 rounded-lg px-3 py-2 text-sm font-semibold" style="background:var(--accent);color:#fff">Add note</button></form><div class="mt-5 space-y-3">${logs.length?logs.map(l=>`<article class="border-t border-line pt-3"><p class="text-sm leading-6 ink">${esc(l.content)}</p><p class="mt-1 text-[10px] muted">${time(l.createdAt)}</p></article>`).join(''):'<p class="text-sm muted">No notes yet.</p>'}</div></section>`}
function openProperties(id=currentId){currentId=id;screen='properties';render()}
function propertiesPage(){const t=getTask(currentId),list=props(t.id);return `<section class="mx-auto max-w-2xl"><div class="mb-4 flex items-center justify-between"><button onclick="screen='task';render()" class="text-sm font-semibold leaf">← Back to task</button><span class="text-xs muted">Task fields</span></div><h1 class="font-display text-3xl ink">Properties</h1><p class="mt-1 text-sm muted">${esc(t.title)}</p><div class="compact-card mt-4 overflow-hidden rounded-xl border">${list.length?`<div class="grid grid-cols-[1fr_1fr_70px_28px] gap-2 border-b border-line px-3 py-2 text-[10px] font-bold uppercase tracking-wider muted"><span>Key</span><span>Value</span><span>Type</span><span></span></div>${list.map(p=>`<div class="grid grid-cols-[1fr_1fr_70px_28px] items-center gap-2 border-b border-line px-3 py-2 text-sm last:border-b-0"><code class="truncate ink">${esc(p.key)}</code><span class="truncate ink">${esc(String(p.value))}</span><span class="text-xs muted">${esc(p.type)}</span>${p.key==='done'?'<span></span>':`<button onclick="removeProperty('${t.id}','${esc(p.key)}')" aria-label="Remove ${esc(p.key)}" style="color:var(--accent)">×</button>`}</div>`).join('')}`:'<p class="p-3 text-sm muted">No extra fields.</p>'}</div><form onsubmit="addProperty(event,'${t.id}')" class="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-[1fr_100px_1fr_auto]"><input name="key" required class="min-w-0 rounded-lg border p-2 text-sm" placeholder="Key"><select name="type" class="rounded-lg border p-2 text-sm"><option>text</option><option>url</option><option>number</option><option>boolean</option></select><input name="value" required class="min-w-0 rounded-lg border p-2 text-sm" placeholder="Value"><button class="rounded-lg bg-leaf px-3 py-2 text-sm" style="color:var(--paper)">Add</button></form></section>`}
function render(){document.getElementById('view').innerHTML=screen==='home'?home():screen==='task'?task():screen==='log'?logPage():screen==='properties'?propertiesPage():editor()}
render();
</script>
</body>
</html>
