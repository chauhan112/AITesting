<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hello World VR</title>
    <!-- We load A-Frame, which handles all the WebXR boilerplate -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script>
      // A simple component to change the box's color when clicked
      AFRAME.registerComponent('change-color-on-click', {
        init: function () {
          var el = this.el;
          el.addEventListener('click', function () {
            // Generate a random hex color
            var randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
            el.setAttribute('color', randomColor);
          });
        }
      });
    </script>
  </head>
  <body>
    <!-- <a-scene> is the container for our entire VR world -->
    <a-scene>
      <!-- A dark grey sky/background -->
      <a-sky color="#242424"></a-sky>

      <!-- The "Hello World" text positioned in front of the camera -->
      <a-text value="Hello World in VR!" position="0 2.5 -3" width="6" color="#FFFFFF" align="center"></a-text>

      <!-- An interactive 3D box. If clicked, it triggers the custom component -->
      <a-box position="0 1 -3" 
             rotation="0 45 0" 
             color="#4CC3D9" 
             change-color-on-click>
      </a-box>

      <!-- A simple flat green floor -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>

      <!-- Player rig, camera, and controllers -->
      <a-entity id="rig" position="0 0 0">
        <a-camera>
          <!-- A visual cursor in the center of your view (fallback for non-VR devices) -->
          <a-cursor color="#FF0000" fuse="false"></a-cursor>
        </a-camera>
        
        <!-- Support for Meta Quest Touch controllers (laser pointers) -->
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
