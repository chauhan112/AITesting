        // ==========================================
        // 1. CORE FRAMEWORK UTILITIES (Tools)
        // ==========================================
        class Tools {
            /**
             * Generates a standard HTMLElement and wraps it inside an IComponent object.
             */
            static make_comp(tag, opts) {
                const el = document.createElement(tag);
                if (!opts) return { get_comp: () => el };

                if (opts.textContent) el.textContent = opts.textContent;
                if (opts.className) el.className = opts.className;

                if (opts.attrs) {
                    for (const [key, val] of Object.entries(opts.attrs)) {
                        el.setAttribute(key, val);
                    }
                }

                if (opts.events) {
                    for (const [event, handler] of Object.entries(opts.events)) {
                        el.addEventListener(event, handler);
                    }
                }

                if (opts.children) {
                    opts.children.forEach((child) => {
                        if (child && typeof child.get_comp === 'function') {
                            el.appendChild(child.get_comp());
                        } else if (child) {
                            el.appendChild(child);
                        }
                    });
                }

                return { get_comp: () => el };
            }

            /**
             * Formats Vite-compatible AST nodes to construct inline SVG components.
             */
            static make_icon(iconNode, className) {
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
                svg.setAttribute("width", "24");
                svg.setAttribute("height", "24");
                svg.setAttribute("viewBox", "0 0 24 24");
                svg.setAttribute("fill", "none");
                svg.setAttribute("stroke", "currentColor");
                svg.setAttribute("stroke-width", "2");
                svg.setAttribute("stroke-linecap", "round");
                svg.setAttribute("stroke-linejoin", "round");
                if (className) {
                    svg.setAttribute("class", className);
                }

                if (Array.isArray(iconNode)) {
                    iconNode.forEach(([tag, attrs]) => {
                        const childEl = document.createElementNS("http://www.w3.org/2000/svg", tag);
                        for (const [key, value] of Object.entries(attrs || {})) {
                            childEl.setAttribute(key, value);
                        }
                        svg.appendChild(childEl);
                    });
                }
                return {
                    get_comp: () => svg,
                };
            }
        }

        // Helper string encoder to avoid HTML injection
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // ==========================================
        // 2. DATA MODEL PERSISTENCE LAYER (IDatamodel)
        // ==========================================
        class ChatModel {
            constructor() {
                this.key = "chat_app_sessions_v3";
            }

            async _load() {
                const data = localStorage.getItem(this.key);
                return data ? JSON.parse(data) : [];
            }

            async _save(chats) {
                localStorage.setItem(this.key, JSON.stringify(chats));
            }

            async read_all() {
                return this._load();
            }

            async read(id) {
                const chats = await this._load();
                return chats.find(c => c.id === id);
            }

            async create(data) {
                const chats = await this._load();
                const newChat = {
                    id: data.id || Date.now().toString(),
                    title: data.title || "New Chat",
                    sessions: data.sessions || []
                };
                chats.unshift(newChat);
                await this._save(chats);
                return newChat;
            }

            async update(id, data) {
                const chats = await this._load();
                const index = chats.findIndex(c => c.id === id.toString());
                if (index === -1) throw new Error("Chat session not found");
                chats[index] = { ...chats[index], ...data };
                await this._save(chats);
                return chats[index];
            }

            async deleteIt(id) {
                const chats = await this._load();
                const filtered = chats.filter(c => c.id !== id);
                await this._save(filtered);
            }
        }

        class ChatMessageModel {
            constructor(chatModel) {
                this.chatModel = chatModel;
            }

            async read_all() {
                const chats = await this.chatModel.read_all();
                const messages = [];
                chats.forEach(c => messages.push(...c.sessions));
                return messages;
            }

            async read(id) {
                const messages = await this.read_all();
                return messages.find(m => m.id === id);
            }

            async create(data) {
                if (!data.chat || !data.chat.id) throw new Error("Parent chat context id is required");
                const chat = await this.chatModel.read(data.chat.id);
                if (!chat) throw new Error("Specified chat session not found");

                const newMessage = {
                    id: data.id || Date.now().toString(),
                    content: data.content || "",
                    role: data.role || "user",
                    chat: { id: chat.id, title: chat.title, sessions: [] }
                };

                chat.sessions.push(newMessage);
                await this.chatModel.update(chat.id, { sessions: chat.sessions });
                return newMessage;
            }

            async update(id, data) {
                const chats = await this.chatModel.read_all();
                let foundChat = null;
                let foundMsg = null;

                for (const c of chats) {
                    const msg = c.sessions.find(m => m.id === id.toString());
                    if (msg) {
                        foundChat = c;
                        foundMsg = msg;
                        break;
                    }
                }

                if (!foundChat || !foundMsg) throw new Error("Message entry not found");

                Object.assign(foundMsg, data);
                await this.chatModel.update(foundChat.id, { sessions: foundChat.sessions });
                return foundMsg;
            }

            async deleteIt(id) {
                const chats = await this.chatModel.read_all();
                for (const c of chats) {
                    const index = c.sessions.findIndex(m => m.id === id);
                    if (index !== -1) {
                        c.sessions.splice(index, 1);
                        await this.chatModel.update(c.id, { sessions: c.sessions });
                        break;
                    }
                }
            }
        }

        // ==========================================
        // 4. CONCRETE APPLICATION CONTROLLER
        // ==========================================
        class GenericController {
            constructor() {
                this.ops_map = {};
            }
            add_ops(op_name, op) {
                this.ops_map[op_name] = op;
            }
            get_ops(op_name) {
                return this.ops_map[op_name];
            }
        }

        class ChatAppController extends GenericController {
            constructor(comp, chatModel, messageModel) {
                super();
                this.comp = comp;
                this.chatModel = chatModel;
                this.messageModel = messageModel;
                this.activeChatId = null;
                this.settings = {
                    openaiUrl: 'https://api.openai.com/v1',
                    openaiKey: '',
                    openaiModels: 'gpt-4o, gpt-3.5-turbo',
                    ollamaUrl: 'http://localhost:11434',
                    ollamaModels: 'llama3, mistral'
                };
                this.setup();
            }

            async setup() {
                this.load_settings();
                this.populate_models();

                this.comp.btn_new_chat.get_comp().addEventListener("click", () => this.execute_new_chat());
                this.comp.btn_send_message.get_comp().addEventListener("click", () => this.execute_send_message());
                this.comp.btn_settings_trigger.get_comp().addEventListener("click", () => this.show_settings());
                this.comp.btn_cancel_settings.get_comp().addEventListener("click", () => this.hide_settings());
                this.comp.btn_close_settings_cross.get_comp().addEventListener("click", () => this.hide_settings());
                this.comp.btn_save_settings.get_comp().addEventListener("click", () => this.save_settings());

                this.comp.textarea_message_input.get_comp().addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        this.execute_send_message();
                    }
                });

                const chats = await this.chatModel.read_all();
                if (chats.length === 0) {
                    await this.execute_new_chat();
                } else {
                    await this.select_chat(chats[0].id);
                }
            }

            load_settings() {
                const saved = localStorage.getItem('chat_app_settings');
                if (saved) {
                    this.settings = JSON.parse(saved);
                }
            }

            populate_models() {
                const selectEl = this.comp.select_model_dropdown.get_comp();
                selectEl.innerHTML = '';

                if (this.settings.openaiModels) {
                    const list = this.settings.openaiModels.split(',').map(m => m.trim()).filter(Boolean);
                    list.forEach(model => {
                        const opt = document.createElement('option');
                        opt.value = `openai|${model}`;
                        opt.textContent = `${model} (OpenAI)`;
                        selectEl.appendChild(opt);
                    });
                }

                if (this.settings.ollamaModels) {
                    const list = this.settings.ollamaModels.split(',').map(m => m.trim()).filter(Boolean);
                    list.forEach(model => {
                        const opt = document.createElement('option');
                        opt.value = `ollama|${model}`;
                        opt.textContent = `${model} (Ollama)`;
                        selectEl.appendChild(opt);
                    });
                }
            }

            async render_history() {
                const listEl = this.comp.list_history_container.get_comp();
                listEl.innerHTML = '';

                const chats = await this.chatModel.read_all();
                const recent = chats.slice(0, 5); // History bounded exactly to last 5 chats [25]

                recent.forEach(chat => {
                    const item = new HistoryItemComp(
                        (id) => this.select_chat(id),
                        (id) => this.delete_chat(id)
                    );
                    item.set_data(chat);
                    item.set_active(chat.id === this.activeChatId);
                    listEl.appendChild(item.get_comp());
                });
            }

            async select_chat(id) {
                this.activeChatId = id;
                const chat = await this.chatModel.read(id);
                if (chat) {
                    this.comp.label_active_chat_title.get_comp().textContent = chat.title;
                    this.render_messages(chat.sessions);
                }
                await this.render_history();
            }

            render_messages(messages) {
                const container = this.comp.messages_viewport.get_comp();
                container.innerHTML = '';

                if (messages.length === 0) {
                    const empty_view = Tools.make_comp("div", {
                        className: "text-center text-zinc-500 mt-20 select-none",
                        children: [
                            Tools.make_comp("p", { textContent: "This is a new workspace session.", className: "text-md" }),
                            Tools.make_comp("p", { textContent: "Type your query below to launch models.", className: "text-xs mt-2 text-zinc-600" })
                        ]
                    });
                    container.appendChild(empty_view.get_comp());
                    return;
                }

                messages.forEach(msg => {
                    const bubble = new ChatMessageComp();
                    bubble.set_data(msg);
                    container.appendChild(bubble.get_comp());
                });

                container.scrollTop = container.scrollHeight;
            }

            async execute_new_chat() {
                const newChat = await this.chatModel.create({
                    title: "New Workspace",
                    sessions: []
                });
                await this.select_chat(newChat.id);
            }

            async delete_chat(id) {
                await this.chatModel.deleteIt(id);
                const chats = await this.chatModel.read_all();
                if (this.activeChatId === id) {
                    if (chats.length > 0) {
                        await this.select_chat(chats[0].id);
                    } else {
                        await this.execute_new_chat();
                    }
                } else {
                    await this.render_history();
                }
            }

            async execute_send_message() {
                const inputEl = this.comp.textarea_message_input.get_comp();
                const text = inputEl.value.trim();
                if (!text || !this.activeChatId) return;

                inputEl.value = '';

                const chat = await this.chatModel.read(this.activeChatId);
                if (!chat) return;

                if (chat.sessions.length === 0) {
                    const title_segments = text.split(' ').slice(0, 5).join(' ');
                    chat.title = title_segments.length > 30 ? title_segments.substring(0, 30) + '...' : title_segments;
                    await this.chatModel.update(chat.id, { title: chat.title });
                    this.comp.label_active_chat_title.get_comp().textContent = chat.title;
                }

                const userMsg = await this.messageModel.create({
                    content: text,
                    role: 'user',
                    chat: { id: chat.id, title: chat.title, sessions: [] }
                });

                chat.sessions.push(userMsg);
                this.render_messages(chat.sessions);

                const typingMsg = await this.messageModel.create({
                    content: "Typing...",
                    role: 'assistant',
                    chat: { id: chat.id, title: chat.title, sessions: [] }
                });
                chat.sessions.push(typingMsg);
                this.render_messages(chat.sessions);

                const selectEl = this.comp.select_model_dropdown.get_comp();
                const activeModelVal = selectEl.value;

                if (activeModelVal) {
                    const [provider, modelName] = activeModelVal.split('|');
                    const historyPayload = chat.sessions.slice(0, -1).map(m => ({ role: m.role, content: m.content }));

                    try {
                        let reply = "";
                        if (provider === "openai") {
                            reply = await this.query_openai(modelName, historyPayload);
                        } else if (provider === "ollama") {
                            reply = await this.query_ollama(modelName, historyPayload);
                        }
                        typingMsg.content = reply;
                    } catch (err) {
                        typingMsg.content = `Error connecting to API: ${err.message}`;
                    }

                    await this.messageModel.update(typingMsg.id, { content: typingMsg.content });
                }

                this.render_messages(chat.sessions);
                await this.render_history();
            }

            async query_openai(modelName, messages) {
                const url = `${this.settings.openaiUrl.replace(/\/+$/, '')}/chat/completions`;
                const headers = { 'Content-Type': 'application/json' };
                if (this.settings.openaiKey) {
                    headers['Authorization'] = `Bearer ${this.settings.openaiKey}`;
                }

                const res = await fetch(url, {
                    method: "POST",
                    headers,
                    body: JSON.stringify({ model: modelName, messages })
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `API error code ${res.status}`);
                }

                const data = await res.json();
                return data.choices[0].message.content;
            }

            async query_ollama(modelName, messages) {
                const url = `${this.settings.ollamaUrl.replace(/\/+$/, '')}/api/chat`;
                
                const res = await fetch(url, {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: modelName, messages, stream: false })
                });

                if (!res.ok) {
                    throw new Error(`Ollama API error code ${res.status}`);
                }

                const data = await res.json();
                return data.message.content;
            }

            show_settings() {
                const modal = this.comp.modal_overlay.get_comp();
                modal.classList.remove('hidden');

                this.comp.field_openai_url.get_comp().value = this.settings.openaiUrl;
                this.comp.field_openai_key.get_comp().value = this.settings.openaiKey;
                this.comp.field_openai_models.get_comp().value = this.settings.openaiModels;
                this.comp.field_ollama_url.get_comp().value = this.settings.ollamaUrl;
                this.comp.field_ollama_models.get_comp().value = this.settings.ollamaModels;
            }

            hide_settings() {
                const modal = this.comp.modal_overlay.get_comp();
                modal.classList.add('hidden');
            }

            save_settings() {
                this.settings.openaiUrl = this.comp.field_openai_url.get_comp().value.trim();
                this.settings.openaiKey = this.comp.field_openai_key.get_comp().value.trim();
                this.settings.openaiModels = this.comp.field_openai_models.get_comp().value.trim();
                this.settings.ollamaUrl = this.comp.field_ollama_url.get_comp().value.trim();
                this.settings.ollamaModels = this.comp.field_ollama_models.get_comp().value.trim();

                localStorage.setItem('chat_app_settings', JSON.stringify(this.settings));
                this.populate_models();
                this.hide_settings();
            }
        }

        // ==========================================
        // 5. BOOTSTRAP INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            const chatModel = new ChatModel();
            const messageModel = new ChatMessageModel(chatModel);
            const scaffold = ChatAppCompScaffold();
            
            // Connect bindings through the controller layer
            new ChatAppController(scaffold, chatModel, messageModel);

            // Mount the declarative tree directly onto the DOM root
            const appRoot = document.getElementById("app");
            if (appRoot) {
                appRoot.appendChild(scaffold.view_scaffold.get_comp());
            }
        });
    </script>
</body>
</html>
