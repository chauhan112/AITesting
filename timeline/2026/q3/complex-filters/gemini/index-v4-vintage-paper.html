<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DataSift | Archives Edition</title>
    
    <!-- Vintage Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        typewriter: ['"Special Elite"', 'monospace'],
                    },
                    colors: {
                        paper: {
                            light: '#fdfbf7',
                            DEFAULT: '#f4ebd8',
                            dark: '#e8dcc4',
                            border: '#d4c4b7'
                        },
                        ink: {
                            light: '#5c5246',
                            DEFAULT: '#2c241b',
                            dark: '#1a1611',
                            red: '#8b2500'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Base / Environment with Vintage Paper Noise & Vignette */
        body { 
            overscroll-behavior-y: none; 
            background-color: #eaddcf;
            background-image: 
                radial-gradient(circle at center, transparent 20%, #c4a98a 150%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            color: #2c241b;
        }
        
        /* Custom Typewriter Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { border-left: 1px solid #d4c4b7; background: #f4ebd8; }
        ::-webkit-scrollbar-thumb { background: #8c7b66; border: 1px solid #f4ebd8; }
        ::-webkit-scrollbar-thumb:hover { background: #5c5246; }

        /* Paper Sheet Component */
        .paper-sheet {
            background-color: #f8f3eb;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.04'/%3E%3C/svg%3E");
            box-shadow: 2px 5px 15px rgba(60, 45, 30, 0.15), inset 0 0 40px rgba(200, 180, 150, 0.1);
            border: 1px solid #d4c4b7;
        }

        /* Ledger Lines for Tables */
        .ledger-row {
            border-bottom: 1px solid #dcd1c4;
            transition: background-color 0.2s;
        }
        .ledger-row:hover { background-color: rgba(212, 196, 183, 0.2); }

        /* Vintage Inputs */
        .vintage-input {
            background: transparent;
            border: none;
            border-bottom: 2px dotted #a89a8a;
            font-family: 'Special Elite', monospace;
            color: #1a1611;
            transition: border-color 0.2s;
        }
        .vintage-input:focus {
            outline: none;
            border-bottom: 2px solid #2c241b;
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* Typewriter Buttons */
        .btn-vintage {
            font-family: 'Special Elite', monospace;
            background: #fdfbf7;
            border: 2px solid #2c241b;
            color: #2c241b;
            box-shadow: 2px 2px 0px #2c241b;
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-vintage:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #2c241b;
        }
        .btn-vintage.active-nav {
            background: #2c241b;
            color: #fdfbf7;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
            transform: translate(1px, 1px);
        }

        /* Ink Stamps */
        .ink-stamp {
            border: 2px solid;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            font-weight: 900;
            display: inline-block;
            padding: 2px 8px;
            opacity: 0.85;
            mix-blend-mode: multiply;
            background: transparent;
        }
        .stamp-approved { color: #165b33; border-color: #165b33; }
        .stamp-rejected { color: #8b0000; border-color: #8b0000; }
        .stamp-pending { color: #9c6f19; border-color: #9c6f19; }

        /* Double Border Container */
        .double-border {
            border: 3px double #2c241b;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        select option { background: #f8f3eb; color: #2c241b; font-family: 'Special Elite', monospace; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden relative">

    <!-- Classic Newspaper / Ledger Header -->
    <div class="p-3 sm:p-5 pb-0 shrink-0 z-10">
        <header class="paper-sheet double-border p-3 sm:p-4 flex flex-col sm:flex-row justify-between items-center gap-4 w-full">
            <div class="flex flex-col items-center sm:items-start text-center sm:text-left w-full sm:w-auto">
                <h1 class="text-3xl sm:text-4xl font-serif font-bold text-ink-dark uppercase tracking-widest border-b-2 border-ink pb-1 mb-1">
                    The Data Archive
                </h1>
                <span class="font-typewriter text-[10px] sm:text-xs text-ink-light tracking-widest">EST. 1924 • CENTRAL BUREAU OF RECORDS</span>
            </div>
            <div class="flex gap-3 w-full sm:w-auto">
                <button id="nav-data" class="btn-vintage active-nav flex-1 sm:flex-none px-4 py-2 text-xs sm:text-sm font-bold">
                    Ledger View
                </button>
                <button id="nav-crud" class="btn-vintage flex-1 sm:flex-none px-4 py-2 text-xs sm:text-sm font-bold">
                    Filing System
                </button>
            </div>
        </header>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col overflow-hidden p-3 sm:p-5 relative z-10">
        
        <!-- ============================== -->
        <!-- VIEW 1: DATA EXPLORER          -->
        <!-- ============================== -->
        <div id="view-data" class="h-full flex flex-col gap-4 sm:gap-5 fade-in">
            <!-- Vintage Controls -->
            <div class="paper-sheet border-t-4 border-t-ink p-4 sm:p-5 flex flex-col lg:flex-row gap-4 items-start lg:items-end shrink-0">
                <div class="w-full lg:flex-1">
                    <label class="block font-serif text-sm italic font-bold text-ink mb-1">Select Archive Criterion:</label>
                    <div class="relative">
                        <select id="filter-dropdown" class="vintage-input w-full p-2 text-sm sm:text-base appearance-none cursor-pointer">
                            <option value="">[ View Complete Master Ledger ]</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-ink">
                            ▼
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 w-full lg:w-auto">
                    <button id="btn-apply-filter" class="flex-1 lg:flex-none btn-vintage px-6 py-2.5 text-xs sm:text-sm font-bold">
                        Process Request
                    </button>
                    <button id="btn-reset-filter" class="flex-1 lg:flex-none btn-vintage px-6 py-2.5 text-xs sm:text-sm font-bold bg-paper-dark">
                        Reset
                    </button>
                </div>
            </div>

            <!-- Ledger Table Container -->
            <div class="paper-sheet flex-1 flex flex-col overflow-hidden double-border">
                <div class="p-3 sm:p-4 border-b border-paper-border flex justify-between items-center bg-paper-dark shrink-0">
                    <h2 class="text-lg sm:text-xl font-serif font-bold text-ink">Master Record Index</h2>
                    <span class="font-typewriter text-xs font-bold text-ink border border-ink px-2 py-1 bg-paper-light shadow-[1px_1px_0px_#2c241b]">
                        COUNT: <span id="data-count">0</span>
                    </span>
                </div>
                <div class="overflow-x-auto overflow-y-auto flex-1 w-full relative">
                    <table class="w-full text-left border-collapse whitespace-nowrap font-typewriter text-xs sm:text-sm text-ink-dark">
                        <thead class="bg-paper-dark sticky top-0 z-10 border-b-2 border-ink">
                            <tr class="uppercase tracking-widest text-[10px] sm:text-xs">
                                <th class="p-3 border-r border-paper-border font-bold">Ref No.</th>
                                <th class="p-3 border-r border-paper-border font-bold">Citizen Name</th>
                                <th class="p-3 border-r border-paper-border font-bold">Age</th>
                                <th class="p-3 border-r border-paper-border font-bold">Telegraph/Mail</th>
                                <th class="p-3 border-r border-paper-border font-bold">District</th>
                                <th class="p-3 font-bold text-center">Bureau Status</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ============================== -->
        <!-- VIEW 2: FILTER ALCHEMY (CRUD)  -->
        <!-- ============================== -->
        <div id="view-crud" class="h-full flex flex-col md:flex-row gap-4 sm:gap-5 hidden fade-in">
            
            <!-- Left Side: Typewriter Form -->
            <div class="w-full md:w-1/3 paper-sheet border-t-4 border-t-ink p-4 sm:p-6 flex flex-col shrink-0 md:shrink">
                <h2 class="text-xl sm:text-2xl font-serif font-bold text-ink mb-4 border-b-2 border-ink pb-2" id="form-title">Draft New Rule</h2>
                <form id="form-filter" class="space-y-4 sm:space-y-5 flex flex-col flex-1 overflow-y-auto pr-2">
                    <input type="hidden" id="f-id">
                    <div>
                        <label class="block font-serif text-sm italic font-bold text-ink mb-1">Designation (Label)</label>
                        <input type="text" id="f-label" required class="vintage-input w-full p-2 text-sm">
                    </div>
                    <div>
                        <label class="block font-serif text-sm italic font-bold text-ink mb-1">Classification (Parent)</label>
                        <input type="text" id="f-parent" class="vintage-input w-full p-2 text-sm">
                    </div>
                    <div class="flex-1 flex flex-col min-h-[150px]">
                        <label class="block font-serif text-sm italic font-bold text-ink mb-1">
                            Logic Parameters (JSON)
                        </label>
                        <textarea id="f-value" required placeholder='[{"type":"search","searchType":"key-val","value":"age:>30"}]' 
                            class="vintage-input w-full flex-1 p-3 text-[11px] sm:text-xs leading-relaxed resize-none border border-ink bg-paper/50"></textarea>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 pt-2 shrink-0">
                        <button type="submit" class="w-full sm:flex-1 btn-vintage py-3 font-bold text-xs">File Record</button>
                        <button type="button" id="btn-cancel-edit" class="hidden w-full sm:w-auto sm:flex-1 btn-vintage bg-paper-dark py-3 px-4 font-bold text-xs">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Right Side: Filing Cabinet (List) -->
            <div class="w-full md:w-2/3 paper-sheet double-border flex flex-col flex-1 overflow-hidden">
                <div class="p-3 sm:p-4 border-b border-paper-border bg-paper-dark flex justify-between items-center shrink-0">
                    <h2 class="text-lg sm:text-xl font-serif font-bold text-ink">Active Filing Directives</h2>
                </div>
                <div class="overflow-x-auto overflow-y-auto flex-1 w-full relative">
                    <table class="w-full text-left border-collapse font-typewriter text-xs sm:text-sm text-ink-dark min-w-[550px]">
                        <thead class="bg-paper-dark sticky top-0 z-10 border-b-2 border-ink">
                            <tr class="uppercase tracking-widest text-[10px] sm:text-[11px]">
                                <th class="p-3 border-r border-paper-border font-bold w-1/4">Designation</th>
                                <th class="p-3 border-r border-paper-border font-bold w-1/6">Class</th>
                                <th class="p-3 border-r border-paper-border font-bold w-2/4">JSON Syntax</th>
                                <th class="p-3 font-bold w-1/6 text-right">Clerk Actions</th>
                            </tr>
                        </thead>
                        <tbody id="filter-table-body">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <!-- Application Logic (ESM module) -->
    <script type="module">
        import { faker } from 'https://esm.sh/@faker-js/faker@8.4.1';
        import sift from 'https://esm.sh/sift@17.1.3';

        // ==========================================
        // 1. DATA MODELS & INTERFACES
        // ==========================================
        class BaseDataModel {
            constructor() { this.db =[]; }
            async read_all() { return [...this.db]; }
            async read(id) { return this.db.find(x => x.id === id); }
            async create(data) {
                const newRec = { id: crypto.randomUUID(), ...data };
                this.db.push(newRec);
                return newRec;
            }
            async update(id, data) {
                const idx = this.db.findIndex(x => x.id === id);
                if (idx > -1) {
                    this.db[idx] = { ...this.db[idx], ...data };
                    return this.db[idx];
                }
                throw new Error("Item not found");
            }
            async deleteIt(id) {
                this.db = this.db.filter(x => x.id !== id);
                return true;
            }
        }

        class InMemoryFilterItemModel extends BaseDataModel {}
        class SomeListData extends BaseDataModel {}

        const filterModel = new InMemoryFilterItemModel();
        const dataModel = new SomeListData();

        // ==========================================
        // 2. DATA SEEDING (Vintage Context)
        // ==========================================
        async function seedData() {
            // Generating names that fit a vintage era roughly, or default faker names
            for (let i = 0; i < 200; i++) {
                await dataModel.create({
                    name: faker.person.fullName(),
                    age: faker.number.int({ min: 18, max: 85 }),
                    email: faker.internet.email().toLowerCase(), // Reusing email field but labeling it 'Telegraph' visually
                    city: faker.location.city(),
                    status: faker.helpers.arrayElement(['Approved', 'Pending', 'Rejected'])
                });
            }

            await filterModel.create({
                label: "Senior Citizens (>= 50) Limit 10",
                parent: "Demographics",
                value: JSON.stringify([
                    { type: "search", searchType: "key-val", value: "age:>=50" },
                    { type: "sort", value: JSON.stringify({ key: "age", asc: false }) },
                    { type: "slice", value: "10" }
                ], null, 2)
            });

            await filterModel.create({
                label: "Approved Status OR Age < 25",
                parent: "Security",
                value: JSON.stringify([
                    { type: "search", searchType: "sift", value: JSON.stringify({ $or:[{status: "Approved"}, {age: {$lt: 25}}] }) }
                ], null, 2)
            });

            await filterModel.create({
                label: "Matching Keyword: 'New'",
                parent: "Investigation",
                value: JSON.stringify([
                    { type: "search", searchType: "any", value: "New" }
                ], null, 2)
            });
        }

        // ==========================================
        // 3. FILTER / SEARCH EXECUTION ENGINE
        // ==========================================
        function executeFilters(data, filtersConfig) {
            let result = [...data];
            
            for (const step of filtersConfig) {
                if (step.type === 'search') {
                    const op = step.searchType;
                    const val = step.value;
                    
                    if (op === 'key-val') {
                        const colonIdx = val.indexOf(':');
                        if (colonIdx > -1) {
                            const k = val.substring(0, colonIdx);
                            const v = val.substring(colonIdx + 1);
                            const match = v.match(/^(>=|<=|>|<|!|)(.*)$/);
                            const oper = match[1];
                            let target = match[2];

                            result = result.filter(el => {
                                let ev = el[k];
                                if (ev === undefined || ev === null) return false;
                                if (typeof ev === 'number' && !isNaN(Number(target))) target = Number(target);
                                
                                if (oper === '>') return ev > target;
                                if (oper === '>=') return ev >= target;
                                if (oper === '<') return ev < target;
                                if (oper === '<=') return ev <= target;
                                if (oper === '!') return ev != target;
                                return String(ev).toLowerCase() === String(target).toLowerCase();
                            });
                        }
                    } else if (op === 'sift') {
                        try { result = result.filter(sift(JSON.parse(val))); } catch (e) { }
                    } else if (op === 'reg') {
                        try { const r = new RegExp(val); result = result.filter(el => r.test(JSON.stringify(el))); } catch(e) { }
                    } else if (op === 'case') {
                        result = result.filter(el => JSON.stringify(el).includes(val));
                    } else if (op === 'any') {
                        const lowerVal = val.toLowerCase(); result = result.filter(el => JSON.stringify(el).toLowerCase().includes(lowerVal));
                    } else if (op === 'word') {
                        try { const rw = new RegExp("\\b" + val + "\\b", "i"); result = result.filter(el => rw.test(JSON.stringify(el))); } catch(e) { }
                    }
                } else if (step.type === 'sort') {
                    try {
                        const { key, asc } = JSON.parse(step.value);
                        result.sort((a, b) => {
                            if (a[key] < b[key]) return asc ? -1 : 1;
                            if (a[key] > b[key]) return asc ? 1 : -1;
                            return 0;
                        });
                    } catch(e) { }
                } else if (step.type === 'slice') {
                    const parts = String(step.value).split(',').map(n => parseInt(n.trim(), 10));
                    if (parts.length === 1 && !isNaN(parts[0])) result = result.slice(0, parts[0]);
                    else if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) result = result.slice(parts[0], parts[1]);
                }
            }
            return result;
        }

        // ==========================================
        // 4. UI LOGIC & RENDERING
        // ==========================================
        
        document.getElementById('nav-data').addEventListener('click', (e) => switchView('data', e.target));
        document.getElementById('nav-crud').addEventListener('click', (e) => switchView('crud', e.target));

        function switchView(viewName, btnNode) {
            document.querySelectorAll('.btn-vintage').forEach(btn => {
                btn.classList.remove('active-nav');
            });
            btnNode.classList.add('active-nav');
            
            document.getElementById('view-data').classList.add('hidden');
            document.getElementById('view-crud').classList.add('hidden');
            
            const viewToOpen = document.getElementById(`view-${viewName}`);
            viewToOpen.classList.remove('fade-in');
            void viewToOpen.offsetWidth; 
            viewToOpen.classList.add('fade-in');
            viewToOpen.classList.remove('hidden');
        }

        async function renderData(dataSet = null) {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            
            const list = dataSet || await dataModel.read_all();
            document.getElementById('data-count').innerText = list.length;

            list.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "ledger-row";
                
                // Randomize stamp rotation for authenticity
                const rotation = Math.random() * 8 - 4; // -4deg to 4deg
                
                let stampClass = 'stamp-pending';
                if (item.status === 'Approved') stampClass = 'stamp-approved';
                if (item.status === 'Rejected') stampClass = 'stamp-rejected';

                tr.innerHTML = `
                    <td class="p-3 border-r border-paper-border truncate max-w-[80px]" title="${item.id}">#${item.id.substring(0,6)}</td>
                    <td class="p-3 border-r border-paper-border font-bold truncate max-w-[150px]" title="${item.name}">${item.name}</td>
                    <td class="p-3 border-r border-paper-border">${item.age}</td>
                    <td class="p-3 border-r border-paper-border truncate max-w-[120px] sm:max-w-none" title="${item.email}">${item.email}</td>
                    <td class="p-3 border-r border-paper-border truncate max-w-[100px] sm:max-w-none" title="${item.city}">${item.city}</td>
                    <td class="p-3 text-center">
                        <span class="ink-stamp ${stampClass}" style="transform: rotate(${rotation}deg);">
                            ${item.status}
                        </span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function renderFilters() {
            const filters = await filterModel.read_all();
            
            const select = document.getElementById('filter-dropdown');
            const currentSelection = select.value;
            select.innerHTML = '<option value="">[ View Complete Master Ledger ]</option>';
            filters.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = `▶ ${f.label} ${f.parent ? `(${f.parent})` : ''}`;
                select.appendChild(opt);
            });
            select.value = currentSelection;

            const tbody = document.getElementById('filter-table-body');
            tbody.innerHTML = '';
            filters.forEach(f => {
                const tr = document.createElement('tr');
                tr.className = "ledger-row";
                
                tr.innerHTML = `
                    <td class="p-3 border-r border-paper-border font-bold align-top whitespace-normal break-words">${f.label}</td>
                    <td class="p-3 border-r border-paper-border align-top">${f.parent || '---'}</td>
                    <td class="p-3 border-r border-paper-border align-top">
                        <div class="bg-paper-light border border-ink p-2 text-[10px] sm:text-[11px] max-h-32 overflow-auto whitespace-pre-wrap break-all shadow-[inset_1px_1px_3px_rgba(0,0,0,0.1)]">
${f.value}
                        </div>
                    </td>
                    <td class="p-3 text-right align-top whitespace-nowrap">
                        <button class="text-ink-dark hover:text-ink-red underline font-bold text-[10px] sm:text-[11px] btn-edit mx-1" data-id="${f.id}">[ AMEND ]</button><br/>
                        <button class="text-ink-dark hover:text-ink-red underline font-bold text-[10px] sm:text-[11px] btn-del mx-1 mt-2" data-id="${f.id}">[ STRIKE ]</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', handleEditFilter));
            document.querySelectorAll('.btn-del').forEach(btn => btn.addEventListener('click', handleDeleteFilter));
        }

        // ==========================================
        // 5. EVENT LISTENERS
        // ==========================================
        document.getElementById('form-filter').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const label = document.getElementById('f-label').value;
            const parent = document.getElementById('f-parent').value;
            const valueStr = document.getElementById('f-value').value;

            try { JSON.parse(valueStr); } catch(err) {
                alert("Syntax Error: The JSON parameters are malformed. Please consult the manual.");
                return;
            }

            const data = { label, parent, value: valueStr };
            if (id) await filterModel.update(id, data);
            else await filterModel.create(data);

            resetForm();
            await renderFilters();
        });

        async function handleEditFilter(e) {
            const id = e.target.getAttribute('data-id');
            const item = await filterModel.read(id);
            if (item) {
                document.getElementById('f-id').value = item.id;
                document.getElementById('f-label').value = item.label;
                document.getElementById('f-parent').value = item.parent;
                document.getElementById('f-value').value = item.value;
                document.getElementById('form-title').innerText = "Amend Existing Rule";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
                
                if (window.innerWidth < 768) document.getElementById('view-crud').scrollTop = 0;
            }
        }

        document.getElementById('btn-cancel-edit').addEventListener('click', resetForm);

        function resetForm() {
            document.getElementById('form-filter').reset();
            document.getElementById('f-id').value = '';
            document.getElementById('form-title').innerText = "Draft New Rule";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        async function handleDeleteFilter(e) {
            if (confirm("By order of the Bureau, do you wish to permanently strike this record?")) {
                const id = e.target.getAttribute('data-id');
                await filterModel.deleteIt(id);
                await renderFilters();
                if (document.getElementById('filter-dropdown').value === id) {
                    document.getElementById('btn-reset-filter').click();
                }
            }
        }

        document.getElementById('btn-apply-filter').addEventListener('click', async () => {
            const filterId = document.getElementById('filter-dropdown').value;
            const fullData = await dataModel.read_all();
            
            if (!filterId) return renderData(fullData);

            const filterDef = await filterModel.read(filterId);
            if (filterDef) {
                try {
                    const config = JSON.parse(filterDef.value);
                    const filteredData = executeFilters(fullData, config);
                    renderData(filteredData);
                } catch(err) {
                    alert("Processing Error: Unable to complete operation.");
                }
            }
        });

        document.getElementById('btn-reset-filter').addEventListener('click', async () => {
            document.getElementById('filter-dropdown').value = '';
            renderData();
        });

        // ==========================================
        // 6. INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', async () => {
            await seedData();
            await renderFilters();
            await renderData();
        });

    </script>
</body>
</html>
