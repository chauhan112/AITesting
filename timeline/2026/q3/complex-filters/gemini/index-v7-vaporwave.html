<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D A T A S I F T // 仮想現実</title>
    
    <!-- Vaporwave Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        vapor:['Syncopate', 'sans-serif'],
                        mono: ['"VT323"', 'monospace'],
                    },
                    colors: {
                        vapor: {
                            bg: '#120422',
                            panel: '#200b3b',
                            cyan: '#00ffff',
                            pink: '#ff00ff',
                            yellow: '#ffff00',
                            purple: '#8a2be2',
                            dark: '#0a0214',
                            border: '#ff00ff'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Base / Environment */
        body { 
            overscroll-behavior-y: none; 
            background-color: #120422;
            color: #00ffff;
            position: relative;
            margin: 0;
            overflow: hidden;
        }

        /* 3D Synthwave Grid Background */
        .vapor-grid {
            position: fixed;
            bottom: 0;
            left: -50%;
            width: 200%;
            height: 50vh;
            background-image: 
                linear-gradient(90deg, rgba(255, 0, 255, 0.5) 1px, transparent 1px),
                linear-gradient(rgba(255, 0, 255, 0.5) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(300px) rotateX(60deg);
            transform-origin: top;
            z-index: -3;
            animation: moveGrid 3s linear infinite;
        }
        @keyframes moveGrid {
            0% { transform: perspective(300px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(300px) rotateX(60deg) translateY(40px); }
        }

        /* Sliced Retro Sun */
        .retro-sun {
            position: fixed;
            bottom: 20vh;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ffff00 0%, #ff00ff 100%);
            box-shadow: 0 0 80px rgba(255, 0, 255, 0.6);
            z-index: -4;
            /* Slicing effect via mask */
            -webkit-mask-image: linear-gradient(to bottom, 
                black 0%, black 50%, 
                transparent 50%, transparent 52%, 
                black 52%, black 60%, 
                transparent 60%, transparent 63%, 
                black 63%, black 72%, 
                transparent 72%, transparent 76%, 
                black 76%, black 86%, 
                transparent 86%, transparent 92%, 
                black 92%, black 100%);
        }

        /* CRT Scanline Overlay & Flicker */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.95; }
            50% { opacity: 0.85; }
            100% { opacity: 0.95; }
        }
        
        /* Cyberpunk Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0214; border-left: 1px solid #ff00ff; }
        ::-webkit-scrollbar-thumb { background: #00ffff; }
        ::-webkit-scrollbar-thumb:hover { background: #ff00ff; }

        /* Vaporwave Panels */
        .vapor-panel {
            background-color: rgba(32, 11, 59, 0.85);
            border: 2px solid #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4), inset 0 0 20px rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            position: relative;
        }

        /* Glitch Inputs */
        .vapor-input {
            background: rgba(10, 2, 20, 0.8);
            border: 2px solid #00ffff;
            color: #ffff00;
            font-family: '"VT323"', monospace;
            font-size: 1.2rem;
            transition: all 0.2s;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2);
        }
        .vapor-input:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5), inset 0 0 10px rgba(255, 0, 255, 0.3);
            background: rgba(255, 0, 255, 0.1);
        }

        /* Buttons */
        .btn-vapor {
            font-family: 'Syncopate', sans-serif;
            background: linear-gradient(135deg, #200b3b, #8a2be2);
            border: 2px solid #00ffff;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            transition: all 0.2s;
            text-shadow: 0 0 5px #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        .btn-vapor:hover {
            background: linear-gradient(135deg, #ff00ff, #8a2be2);
            border-color: #ff00ff;
            color: #ffffff;
            box-shadow: 0 0 20px #ff00ff;
            text-shadow: 0 0 5px #ffffff;
        }
        .btn-vapor:active { transform: scale(0.95); }
        
        .btn-vapor.active-nav {
            background: #ff00ff;
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 20px #ff00ff;
            text-shadow: 0 0 5px #ffffff;
        }

        /* Tables & Rows */
        .vapor-row { border-bottom: 1px solid rgba(255, 0, 255, 0.3); transition: all 0.2s; }
        .vapor-row:hover { background-color: rgba(0, 255, 255, 0.15); border-left: 4px solid #00ffff; }
        
        select option { background: #120422; color: #00ffff; font-family: '"VT323"', monospace; font-size: 1.2rem; }

        /* Status Badges */
        .status-badge {
            display: inline-block;
            padding: 2px 10px;
            font-size: 1.1rem;
            border: 2px solid;
            letter-spacing: 2px;
            text-shadow: 0 0 5px currentColor;
            box-shadow: 0 0 10px currentColor inset;
        }
        .status-aesthetic { color: #ff00ff; border-color: #ff00ff; background: rgba(255, 0, 255, 0.1); }
        .status-virtual { color: #00ffff; border-color: #00ffff; background: rgba(0, 255, 255, 0.1); }
        .status-offline { color: #ffff00; border-color: #ffff00; background: rgba(255, 255, 0, 0.1); }

        /* Typography FX */
        .text-glow-cyan { text-shadow: 0 0 8px #00ffff, 0 0 12px #00ffff; }
        .text-glow-pink { text-shadow: 0 0 8px #ff00ff, 0 0 12px #ff00ff; }
        
        /* Title 3D / Offset Effect */
        .vapor-title {
            position: relative;
            color: #ffffff;
            text-shadow: 
                -2px -2px 0 #00ffff,
                2px 2px 0 #ff00ff;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>

    <!-- Application Logic (ESM module) -->
    <script type="module">
        import { faker } from 'https://esm.sh/@faker-js/faker@8.4.1';
        import sift from 'https://esm.sh/sift@17.1.3';

        // ==========================================
        // 1. DATA MODELS & INTERFACES
        // ==========================================
        class BaseDataModel {
            constructor() { this.db =[]; }
            async read_all() { return [...this.db]; }
            async read(id) { return this.db.find(x => x.id === id); }
            async create(data) {
                const newRec = { id: crypto.randomUUID(), ...data };
                this.db.push(newRec);
                return newRec;
            }
            async update(id, data) {
                const idx = this.db.findIndex(x => x.id === id);
                if (idx > -1) {
                    this.db[idx] = { ...this.db[idx], ...data };
                    return this.db[idx];
                }
                throw new Error("Item not found");
            }
            async deleteIt(id) {
                this.db = this.db.filter(x => x.id !== id);
                return true;
            }
        }

        class InMemoryFilterItemModel extends BaseDataModel {}
        class SomeListData extends BaseDataModel {}

        const filterModel = new InMemoryFilterItemModel();
        const dataModel = new SomeListData();

        // ==========================================
        // 2. DATA SEEDING (Vaporwave Context)
        // ==========================================
        async function seedData() {
            for (let i = 0; i < 200; i++) {
                // Formatting to look nostalgic/vaporwave
                let name = faker.internet.userName().toUpperCase().split('').join(' ');
                
                await dataModel.create({
                    name: name,
                    age: faker.number.int({ min: 18, max: 99 }),
                    email: faker.internet.email().toLowerCase(), 
                    city: `Z O N E  ${faker.number.int({min:1, max:9})}`,
                    status: faker.helpers.arrayElement(['A E S T H E T I C', 'V I R T U A L', 'O F F L I N E'])
                });
            }

            await filterModel.create({
                label: "E L D E R S [AGE >= 50] T O P 10",
                parent: "D E M O",
                value: JSON.stringify([
                    { type: "search", searchType: "key-val", value: "age:>=50" },
                    { type: "sort", value: JSON.stringify({ key: "age", asc: false }) },
                    { type: "slice", value: "10" }
                ], null, 2)
            });

            await filterModel.create({
                label: "V I R T U A L   O R   Y O U T H",
                parent: "S E C U R E",
                value: JSON.stringify([
                    { type: "search", searchType: "sift", value: JSON.stringify({ $or:[{status: "V I R T U A L"}, {age: {$lt: 25}}] }) }
                ], null, 2)
            });

            await filterModel.create({
                label: "Q U E R Y :  ' N E W '",
                parent: "L O G S",
                value: JSON.stringify([
                    { type: "search", searchType: "any", value: "NEW" }
                ], null, 2)
            });
        }

        // ==========================================
        // 3. FILTER / SEARCH EXECUTION ENGINE
        // ==========================================
        function executeFilters(data, filtersConfig) {
            let result = [...data];
            
            for (const step of filtersConfig) {
                if (step.type === 'search') {
                    const op = step.searchType;
                    const val = step.value;
                    
                    if (op === 'key-val') {
                        const colonIdx = val.indexOf(':');
                        if (colonIdx > -1) {
                            const k = val.substring(0, colonIdx);
                            const v = val.substring(colonIdx + 1);
                            const match = v.match(/^(>=|<=|>|<|!|)(.*)$/);
                            const oper = match[1];
                            let target = match[2];

                            result = result.filter(el => {
                                let ev = el[k];
                                if (ev === undefined || ev === null) return false;
                                if (typeof ev === 'number' && !isNaN(Number(target))) target = Number(target);
                                
                                if (oper === '>') return ev > target;
                                if (oper === '>=') return ev >= target;
                                if (oper === '<') return ev < target;
                                if (oper === '<=') return ev <= target;
                                if (oper === '!') return ev != target;
                                return String(ev).toLowerCase() === String(target).toLowerCase();
                            });
                        }
                    } else if (op === 'sift') {
                        try { result = result.filter(sift(JSON.parse(val))); } catch (e) { }
                    } else if (op === 'reg') {
                        try { const r = new RegExp(val); result = result.filter(el => r.test(JSON.stringify(el))); } catch(e) { }
                    } else if (op === 'case') {
                        result = result.filter(el => JSON.stringify(el).includes(val));
                    } else if (op === 'any') {
                        const lowerVal = val.toLowerCase(); result = result.filter(el => JSON.stringify(el).toLowerCase().includes(lowerVal));
                    } else if (op === 'word') {
                        try { const rw = new RegExp("\\b" + val + "\\b", "i"); result = result.filter(el => rw.test(JSON.stringify(el))); } catch(e) { }
                    }
                } else if (step.type === 'sort') {
                    try {
                        const { key, asc } = JSON.parse(step.value);
                        result.sort((a, b) => {
                            if (a[key] < b[key]) return asc ? -1 : 1;
                            if (a[key] > b[key]) return asc ? 1 : -1;
                            return 0;
                        });
                    } catch(e) { }
                } else if (step.type === 'slice') {
                    const parts = String(step.value).split(',').map(n => parseInt(n.trim(), 10));
                    if (parts.length === 1 && !isNaN(parts[0])) result = result.slice(0, parts[0]);
                    else if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) result = result.slice(parts[0], parts[1]);
                }
            }
            return result;
        }

        // ==========================================
        // 4. UI LOGIC & RENDERING
        // ==========================================
        
        document.getElementById('nav-data').addEventListener('click', (e) => switchView('data', e.target));
        document.getElementById('nav-crud').addEventListener('click', (e) => switchView('crud', e.target));

        function switchView(viewName, btnNode) {
            document.querySelectorAll('.btn-vapor').forEach(btn => {
                btn.classList.remove('active-nav');
            });
            btnNode.classList.add('active-nav');
            
            document.getElementById('view-data').classList.add('hidden');
            document.getElementById('view-crud').classList.add('hidden');
            
            const viewToOpen = document.getElementById(`view-${viewName}`);
            viewToOpen.classList.remove('fade-in');
            void viewToOpen.offsetWidth; 
            viewToOpen.classList.add('fade-in');
            viewToOpen.classList.remove('hidden');
        }

        async function renderData(dataSet = null) {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            
            const list = dataSet || await dataModel.read_all();
            
            const countEl = document.getElementById('data-count');
            countEl.innerText = list.length;
            countEl.classList.add('text-vapor-pink');
            setTimeout(() => countEl.classList.remove('text-vapor-pink'), 300);

            list.forEach((item) => {
                const tr = document.createElement('tr');
                tr.className = "vapor-row text-vapor-cyan";
                
                let stampClass = 'status-offline';
                if (item.status === 'A E S T H E T I C') stampClass = 'status-aesthetic';
                if (item.status === 'V I R T U A L') stampClass = 'status-virtual';

                tr.innerHTML = `
                    <td class="p-4 text-vapor-purple truncate max-w-[80px]" title="${item.id}">${item.id.substring(0,5)}</td>
                    <td class="p-4 text-vapor-yellow text-glow-cyan truncate max-w-[150px]" title="${item.name}">${item.name}</td>
                    <td class="p-4">${item.age}</td>
                    <td class="p-4 truncate max-w-[120px] sm:max-w-none text-vapor-pink" title="${item.email}">${item.email}</td>
                    <td class="p-4 truncate max-w-[100px] sm:max-w-none" title="${item.city}">${item.city}</td>
                    <td class="p-4 text-center">
                        <span class="status-badge ${stampClass}">${item.status}</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function renderFilters() {
            const filters = await filterModel.read_all();
            
            const select = document.getElementById('filter-dropdown');
            const currentSelection = select.value;
            select.innerHTML = '<option value="">[ M A I N F R A M E  //  A L L ]</option>';
            filters.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = `> ${f.label} ${f.parent ? `//${f.parent}` : ''}`;
                select.appendChild(opt);
            });
            select.value = currentSelection;

            const tbody = document.getElementById('filter-table-body');
            tbody.innerHTML = '';
            filters.forEach(f => {
                const tr = document.createElement('tr');
                tr.className = "vapor-row";
                
                tr.innerHTML = `
                    <td class="p-4 text-vapor-yellow text-glow-cyan align-top whitespace-normal break-words">${f.label}</td>
                    <td class="p-4 text-vapor-cyan align-top">${f.parent || 'NULL'}</td>
                    <td class="p-4 align-top">
                        <div class="bg-vapor-dark/80 border border-vapor-purple p-3 max-h-32 overflow-auto whitespace-pre-wrap break-all text-vapor-pink shadow-[inset_0_0_10px_rgba(255,0,255,0.2)]">
${f.value}
                        </div>
                    </td>
                    <td class="p-4 text-right align-top whitespace-nowrap space-y-2">
                        <button class="text-vapor-cyan hover:text-white text-[16px] btn-edit block ml-auto transition-colors" data-id="${f.id}">[ M O D ]</button>
                        <button class="text-vapor-pink hover:text-white text-[16px] btn-del block ml-auto transition-colors" data-id="${f.id}">[ D E L ]</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', handleEditFilter));
            document.querySelectorAll('.btn-del').forEach(btn => btn.addEventListener('click', handleDeleteFilter));
        }

        // ==========================================
        // 5. EVENT LISTENERS
        // ==========================================
        document.getElementById('form-filter').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('f-id').value;
            const label = document.getElementById('f-label').value;
            const parent = document.getElementById('f-parent').value;
            const valueStr = document.getElementById('f-value').value;

            try { JSON.parse(valueStr); } catch(err) {
                alert("E R R O R : I N V A L I D  J S O N  M A T R I X");
                return;
            }

            const data = { label, parent, value: valueStr };
            if (id) await filterModel.update(id, data);
            else await filterModel.create(data);

            resetForm();
            await renderFilters();
        });

        async function handleEditFilter(e) {
            const id = e.target.getAttribute('data-id');
            const item = await filterModel.read(id);
            if (item) {
                document.getElementById('f-id').value = item.id;
                document.getElementById('f-label').value = item.label;
                document.getElementById('f-parent').value = item.parent;
                document.getElementById('f-value').value = item.value;
                document.getElementById('form-title').innerText = "M o d i f y  L o g i c";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
                
                if (window.innerWidth < 768) document.getElementById('view-crud').scrollTop = 0;
            }
        }

        document.getElementById('btn-cancel-edit').addEventListener('click', resetForm);

        function resetForm() {
            document.getElementById('form-filter').reset();
            document.getElementById('f-id').value = '';
            document.getElementById('form-title').innerText = "C r e a t e  L o g i c";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        async function handleDeleteFilter(e) {
            if (confirm("P E R M A N E N T  D E L E T I O N .  P R O C E E D ?")) {
                const id = e.target.getAttribute('data-id');
                await filterModel.deleteIt(id);
                await renderFilters();
                if (document.getElementById('filter-dropdown').value === id) {
                    document.getElementById('btn-reset-filter').click();
                }
            }
        }

        document.getElementById('btn-apply-filter').addEventListener('click', async () => {
            const filterId = document.getElementById('filter-dropdown').value;
            const fullData = await dataModel.read_all();
            
            if (!filterId) return renderData(fullData);

            const filterDef = await filterModel.read(filterId);
            if (filterDef) {
                try {
                    const config = JSON.parse(filterDef.value);
                    const filteredData = executeFilters(fullData, config);
                    renderData(filteredData);
                } catch(err) {
                    alert("C R I T I C A L  F A I L U R E");
                }
            }
        });

        document.getElementById('btn-reset-filter').addEventListener('click', async () => {
            document.getElementById('filter-dropdown').value = '';
            renderData();
        });

        // ==========================================
        // 6. INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', async () => {
            await seedData();
            await renderFilters();
            await renderData();
        });

    </script>
</body>
</html>
