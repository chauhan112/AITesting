<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Vault</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- Theme Styling Variables --- */
        :root {
            /* Default Theme */
            --bg-app: #f9f9f9;
            --bg-card: #ffffff;
            --border-color: #e5e5e5;
            --text-main: #171717;
            --text-content: #404040;
            --text-muted: #737373;
            --accent-color: #171717;
            --accent-text: #ffffff;
            --accent-hover: #262626;
            --input-bg: #f5f5f5;
            --shadow-intensity: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        body.theme-ghibli {
            --bg-app: #f4efe2;
            --bg-card: #fdfbf7;
            --border-color: #dfd2bc;
            --text-main: #2b4c3f;
            --text-content: #4a3b32;
            --text-muted: #8b745f;
            --accent-color: #386b52;
            --accent-text: #fdfbf7;
            --accent-hover: #264e3b;
            --input-bg: #eae0cc;
            --shadow-intensity: 0 2px 5px 0 rgba(139, 116, 95, 0.12);
        }

        body.theme-cyberpunk {
            --bg-app: #030308;
            --bg-card: #0c0a1a;
            --border-color: #00f0ff;
            --text-main: #00f0ff;
            --text-content: #a5f3fc;
            --text-muted: #ff0055;
            --accent-color: #ffe600;
            --accent-text: #030308;
            --accent-hover: #cca800;
            --input-bg: #15112e;
            --shadow-intensity: 0 0 12px rgba(0, 240, 255, 0.3);
        }

        .theme-shadow {
            box-shadow: var(--shadow-intensity);
        }
    </style>
</head>
<body class="bg-[var(--bg-app)] text-[var(--text-main)] min-h-screen transition-colors duration-300">

    <!-- 1. List View -->
    <div id="listView">
        <header class="border-b border-[var(--border-color)] bg-[var(--bg-card)]/85 backdrop-blur sticky top-0 z-10 transition-colors duration-300">
            <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                
                <div class="flex items-center space-x-3 cursor-pointer" onclick="clearSearch()">
                    <div class="w-8 h-8 bg-[var(--accent-color)] text-[var(--accent-text)] rounded-lg flex items-center justify-center font-bold text-sm transition-colors duration-300">V</div>
                    <h1 class="text-xl font-bold tracking-tight text-[var(--text-main)] transition-colors duration-300">Vault</h1>
                </div>
                
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    <!-- Search -->
                    <div class="relative flex-1 md:w-64 min-w-[150px]">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search records..." 
                            class="w-full pl-10 pr-4 py-2 text-sm bg-[var(--input-bg)] focus:bg-[var(--bg-card)] border border-transparent focus:border-[var(--border-color)] text-[var(--text-main)] placeholder-[var(--text-muted)] rounded-xl outline-none transition duration-150"
                        />
                        <svg class="absolute left-3.5 top-2.5 h-4 w-4 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>

                    <!-- Theme Selector -->
                    <div class="flex items-center">
                        <select 
                            id="themeSelector" 
                            class="bg-[var(--input-bg)] text-[var(--text-main)] text-xs font-semibold border border-[var(--border-color)] px-2.5 py-2 rounded-xl outline-none cursor-pointer transition-colors duration-300"
                        >
                            <option value="default">Minimalist</option>
                            <option value="ghibli">Ghibli</option>
                            <option value="cyberpunk">Cyberpunk</option>
                        </select>
                    </div>

                    <!-- Add Entry Button -->
                    <button 
                        id="openFormBtn"
                        class="bg-[var(--accent-color)] hover:bg-[var(--accent-hover)] text-[var(--accent-text)] text-sm font-medium py-2 px-4 rounded-xl flex items-center gap-1.5 shadow-sm transition whitespace-nowrap"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                        Add Entry
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-8">
            <div id="vaultContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Items populated here -->
            </div>
        </main>
    </div>

    <!-- 2. Dedicated Form View -->
    <div id="formView" class="hidden max-w-2xl mx-auto px-4 py-12">
        <button 
            id="backBtn" 
            class="flex items-center gap-2 text-sm text-[var(--text-muted)] hover:text-[var(--text-main)] transition mb-8 font-medium group"
        >
            <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Back to Vault
        </button>

        <h2 id="formTitle" class="text-xs font-bold text-[var(--text-muted)] uppercase tracking-widest mb-6">New Entry</h2>

        <form id="vaultForm" class="space-y-6">
            <input type="hidden" id="itemId" />
            
            <!-- Type Toggle Selection -->
            <div>
                <label class="block text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-2">Record Type</label>
                <div class="flex gap-2">
                    <button 
                        type="button" 
                        id="typeCommandBtn" 
                        onclick="setRecordType('command')"
                        class="flex-1 py-2 rounded-xl text-xs font-bold border transition duration-150"
                    >
                        Terminal Command
                    </button>
                    <button 
                        type="button" 
                        id="typePasswordBtn" 
                        onclick="setRecordType('password')"
                        class="flex-1 py-2 rounded-xl text-xs font-bold border transition duration-150"
                    >
                        Credential / Password
                    </button>
                </div>
                <input type="hidden" id="typeInput" value="command" />
            </div>

            <!-- Dynamic Fields -->
            <div>
                <label id="titleLabel" for="titleInput" class="block text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-1">Command Name</label>
                <input 
                    type="text" 
                    id="titleInput" 
                    placeholder="e.g., Docker Prune" 
                    required
                    class="w-full text-2xl font-bold text-[var(--text-main)] bg-transparent border-b border-[var(--border-color)] focus:border-[var(--text-main)] pb-3 outline-none transition duration-150 placeholder-[var(--text-muted)]"
                />
            </div>

            <div>
                <label id="valueLabel" for="valueInput" class="block text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-1">Command Syntax</label>
                <textarea 
                    id="valueInput" 
                    rows="4" 
                    placeholder="docker system prune -a --volumes" 
                    required
                    class="w-full text-base font-mono text-[var(--text-content)] bg-transparent outline-none resize-none pb-3 border-b border-[var(--border-color)] focus:border-[var(--text-main)] transition duration-150 leading-relaxed placeholder-[var(--text-muted)]"
                ></textarea>
            </div>

            <div>
                <label for="descInput" class="block text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-1">Optional Notes / Description</label>
                <input 
                    type="text" 
                    id="descInput" 
                    placeholder="e.g., Useful for reclaiming system storage space" 
                    class="w-full text-sm text-[var(--text-main)] bg-[var(--input-bg)] focus:bg-[var(--bg-card)] border border-transparent focus:border-[var(--border-color)] px-3.5 py-2.5 rounded-xl outline-none transition placeholder-[var(--text-muted)]"
                />
            </div>

            <div class="flex justify-end pt-2">
                <button 
                    type="submit" 
                    class="bg-[var(--accent-color)] hover:bg-[var(--accent-hover)] text-[var(--accent-text)] text-sm font-medium py-2.5 px-6 rounded-xl transition shrink-0"
                >
                    <span id="submitBtnText">Publish Entry</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        // --- 1. Class Model Definition ---
        class VaultModel {
            constructor() {
                this.storageKey = 'minimal_vault_db_v1';
                this.items = JSON.parse(localStorage.getItem(this.storageKey)) || [];
                
                if (this.items.length === 0) {
                    this.items = [
                        {
                            id: '1',
                            title: 'Clean Container Volumes',
                            value: 'docker system prune -a --volumes',
                            type: 'command',
                            description: 'Safely purges unused containers, networks, and images.',
                            createdAt: new Date().toISOString()
                        },
                        {
                            id: '2',
                            title: 'PostgreSQL Root Credentials',
                            value: 'dB_SuPeR_sEcReT_pAsSwOrD_99!',
                            type: 'password',
                            description: 'Local development environment login.',
                            createdAt: new Date().toISOString()
                        }
                    ];
                    this.save();
                }
            }

            save() {
                localStorage.setItem(this.storageKey, JSON.stringify(this.items));
            }

            // Create
            create(title, value, type, description) {
                const item = {
                    id: Date.now().toString(),
                    title,
                    value,
                    type,
                    description: description.trim(),
                    createdAt: new Date().toISOString()
                };
                this.items.unshift(item);
                this.save();
                return item;
            }

            // Read
            read(id) {
                return this.items.find(item => item.id === id) || null;
            }

            // Read All
            read_all() {
                return this.items;
            }

            // Update
            update(id, updatedFields) {
                const index = this.items.findIndex(item => item.id === id);
                if (index !== -1) {
                    this.items[index] = { ...this.items[index], ...updatedFields };
                    this.save();
                    return this.items[index];
                }
                return null;
            }

            // Delete
            delete(id) {
                const index = this.items.findIndex(item => item.id === id);
                if (index !== -1) {
                    this.items.splice(index, 1);
                    this.save();
                    return true;
                }
                return false;
            }
        }

        // --- 2. Application UI Controller ---
        const model = new VaultModel();
        let editingId = null;

        // Views Cache
        const listView = document.getElementById('listView');
        const formView = document.getElementById('formView');

        // Navigation elements
        const openFormBtn = document.getElementById('openFormBtn');
        const backBtn = document.getElementById('backBtn');
        const themeSelector = document.getElementById('themeSelector');
        
        // Form Fields
        const vaultForm = document.getElementById('vaultForm');
        const formTitle = document.getElementById('formTitle');
        const itemIdInput = document.getElementById('itemId');
        const typeInput = document.getElementById('typeInput');
        const titleInput = document.getElementById('titleInput');
        const valueInput = document.getElementById('valueInput');
        const descInput = document.getElementById('descInput');
        const searchInput = document.getElementById('searchInput');
        const vaultContainer = document.getElementById('vaultContainer');
        const submitBtnText = document.getElementById('submitBtnText');

        const titleLabel = document.getElementById('titleLabel');
        const valueLabel = document.getElementById('valueLabel');
        
        const typeCommandBtn = document.getElementById('typeCommandBtn');
        const typePasswordBtn = document.getElementById('typePasswordBtn');

        // Switch screen state
        function navigateTo(viewName) {
            if (viewName === 'list') {
                listView.classList.remove('hidden');
                formView.classList.add('hidden');
                resetForm();
                renderVault(searchInput.value);
            } else if (viewName === 'form') {
                listView.classList.add('hidden');
                formView.classList.remove('hidden');
                window.scrollTo({ top: 0 });
            }
        }

        // Toggle command/password type selection in creation form
        function setRecordType(type) {
            typeInput.value = type;
            if (type === 'command') {
                typeCommandBtn.className = "flex-1 py-2 rounded-xl text-xs font-bold border border-[var(--text-main)] bg-[var(--accent-color)] text-[var(--accent-text)] transition duration-150";
                typePasswordBtn.className = "flex-1 py-2 rounded-xl text-xs font-bold border border-[var(--border-color)] text-[var(--text-muted)] bg-transparent hover:text-[var(--text-main)] transition duration-150";
                
                titleLabel.textContent = "Command Name";
                titleInput.placeholder = "e.g., Docker Prune";
                valueLabel.textContent = "Command Syntax";
                valueInput.placeholder = "docker system prune -a --volumes";
            } else {
                typePasswordBtn.className = "flex-1 py-2 rounded-xl text-xs font-bold border border-[var(--text-main)] bg-[var(--accent-color)] text-[var(--accent-text)] transition duration-150";
                typeCommandBtn.className = "flex-1 py-2 rounded-xl text-xs font-bold border border-[var(--border-color)] text-[var(--text-muted)] bg-transparent hover:text-[var(--text-main)] transition duration-150";
                
                titleLabel.textContent = "Account / Service";
                titleInput.placeholder = "e.g., AWS Root Secret";
                valueLabel.textContent = "Password / Secret";
                valueInput.placeholder = "dB_SuPeR_sEcReT_pAsSwOrD_99!";
            }
        }

        // Render cards
        function renderVault(filterText = '') {
            const items = model.read_all();
            const normalizedFilter = filterText.toLowerCase().trim();

            const filteredItems = items.filter(item => {
                if (!normalizedFilter) return true;
                const matchesTitle = item.title.toLowerCase().includes(normalizedFilter);
                const matchesValue = item.value.toLowerCase().includes(normalizedFilter);
                const matchesDesc = item.description.toLowerCase().includes(normalizedFilter);
                const matchesType = item.type.toLowerCase().includes(normalizedFilter);
                return matchesTitle || matchesValue || matchesDesc || matchesType;
            });

            vaultContainer.innerHTML = '';

            if (filteredItems.length === 0) {
                vaultContainer.innerHTML = `
                    <div class="col-span-full py-20 text-center text-[var(--text-muted)]">
                        <p class="text-sm font-medium">No matches found in your vault.</p>
                        <button onclick="clearSearch()" class="mt-2 text-xs underline hover:text-[var(--text-main)] transition">Clear search</button>
                    </div>
                `;
                return;
            }

            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-[var(--bg-card)] p-6 rounded-2xl border border-[var(--border-color)] theme-shadow hover:shadow-md transition duration-200 flex flex-col justify-between";
                
                const isCommand = item.type === 'command';
                const badgeText = isCommand ? 'Command' : 'Password';

                // Setup the credential viewing mask
                const secretMarkup = isCommand 
                    ? `<code class="block font-mono text-xs p-3 rounded-xl bg-[var(--input-bg)] border border-[var(--border-color)] overflow-x-auto text-[var(--text-content)] break-all select-all">${escapeHTML(item.value)}</code>`
                    : `<div class="flex items-center justify-between p-3 rounded-xl bg-[var(--input-bg)] border border-[var(--border-color)] font-mono text-xs text-[var(--text-content)]">
                         <span id="secret-${item.id}" data-value="${escapeHTML(item.value)}" data-hidden="true" class="tracking-widest">••••••••</span>
                         <button onclick="toggleVisibility('${item.id}', this)" class="text-[var(--text-muted)] hover:text-[var(--text-main)] text-[10px] font-bold uppercase tracking-wider ml-2 transition">Show</button>
                       </div>`;

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2 gap-2">
                            <h3 class="font-semibold text-[var(--text-main)] text-base break-words">${escapeHTML(item.title)}</h3>
                            <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded bg-[var(--input-bg)] text-[var(--text-muted)] border border-[var(--border-color)]">${badgeText}</span>
                        </div>
                        ${item.description ? `<p class="text-xs text-[var(--text-muted)] mb-4 break-words leading-relaxed">${escapeHTML(item.description)}</p>` : '<div class="h-3"></div>'}
                        <div class="mb-5">
                            ${secretMarkup}
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center pt-3 border-t border-[var(--border-color)] text-xs text-[var(--text-muted)]">
                            <span>${new Date(item.createdAt).toLocaleDateString()}</span>
                            <div class="flex space-x-3 font-semibold">
                                <button onclick="copyValue('${item.id}', this)" class="text-[var(--text-muted)] hover:text-[var(--text-main)] transition">Copy</button>
                                <button onclick="editItem('${item.id}')" class="text-[var(--text-muted)] hover:text-[var(--text-main)] transition">Edit</button>
                                <button onclick="deleteItem('${item.id}')" class="text-red-500 hover:text-red-700 transition">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
                vaultContainer.appendChild(card);
            });
        }

        // HTML escaping utility
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Form reset logic
        function resetForm() {
            editingId = null;
            vaultForm.reset();
            formTitle.textContent = 'New Entry';
            submitBtnText.textContent = 'Publish Entry';
            setRecordType('command');
        }

        // --- 3. Interaction Handlers ---

        // Theme initialization & switching
        function applyTheme(themeName) {
            document.body.className = ''; 
            if (themeName !== 'default') {
                document.body.classList.add(`theme-${themeName}`);
            }
            localStorage.setItem('minimal_vault_theme', themeName);
            themeSelector.value = themeName;
        }

        themeSelector.addEventListener('change', (e) => {
            applyTheme(e.target.value);
        });

        // Trigger Editor Navigation
        openFormBtn.addEventListener('click', () => {
            editingId = null;
            navigateTo('form');
        });

        backBtn.addEventListener('click', () => navigateTo('list'));

        // Copy Secret content straight to user clipboard (masked or visible)
        window.copyValue = async function(id, buttonEl) {
            const item = model.read(id);
            if (!item) return;

            try {
                await navigator.clipboard.writeText(item.value);
                const originalText = buttonEl.textContent;
                buttonEl.textContent = 'Copied!';
                buttonEl.style.color = 'var(--text-main)';
                
                setTimeout(() => {
                    buttonEl.textContent = originalText;
                    buttonEl.style.color = '';
                }, 1500);
            } catch (err) {
                console.error('Error executing copy: ', err);
            }
        };

        // Password Show/Hide Toggle
        window.toggleVisibility = function(id, buttonEl) {
            const targetSpan = document.getElementById(`secret-${id}`);
            if (!targetSpan) return;

            const isHidden = targetSpan.getAttribute('data-hidden') === 'true';
            if (isHidden) {
                targetSpan.textContent = targetSpan.getAttribute('data-value');
                targetSpan.setAttribute('data-hidden', 'false');
                buttonEl.textContent = 'Hide';
            } else {
                targetSpan.textContent = '••••••••';
                targetSpan.setAttribute('data-hidden', 'true');
                buttonEl.textContent = 'Show';
            }
        };

        // Save operations
        vaultForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = titleInput.value.trim();
            const value = valueInput.value.trim();
            const type = typeInput.value;
            const description = descInput.value.trim();

            if (!title || !value) return;

            if (editingId) {
                model.update(editingId, { title, value, type, description });
            } else {
                model.create(title, value, type, description);
            }

            navigateTo('list');
        });

        // Edit Entry loader
        window.editItem = function(id) {
            const item = model.read(id);
            if (!item) return;

            editingId = id;
            setRecordType(item.type);
            titleInput.value = item.title;
            valueInput.value = item.value;
            descInput.value = item.description;

            formTitle.textContent = 'Edit Entry';
            submitBtnText.textContent = 'Save Changes';
            
            navigateTo('form');
        };

        // Delete action
        window.deleteItem = function(id) {
            if (confirm('Are you sure you want to delete this vault item?')) {
                model.delete(id);
                if (editingId === id) resetForm();
                renderVault(searchInput.value);
            }
        };

        // Search reset helper
        window.clearSearch = function() {
            searchInput.value = '';
            renderVault();
        };

        // Bind real-time search
        searchInput.addEventListener('input', (e) => {
            renderVault(e.target.value);
        });

        // App Boot sequence
        const savedTheme = localStorage.getItem('minimal_vault_theme') || 'default';
        applyTheme(savedTheme);
        renderVault();
    </script>
</body>
</html>
