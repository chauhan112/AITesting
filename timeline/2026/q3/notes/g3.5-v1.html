<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Notes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-800 min-h-screen">

    <!-- Top Navigation / Search bar -->
    <header class="border-b border-neutral-200/80 bg-white/80 backdrop-blur sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-neutral-900 rounded-lg flex items-center justify-center text-white font-bold text-sm">N</div>
                <h1 class="text-xl font-bold tracking-tight text-neutral-900">Notes</h1>
            </div>
            
            <!-- Search Input -->
            <div class="relative w-full sm:w-80">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search by title, body, or tag..." 
                    class="w-full pl-10 pr-4 py-2 text-sm bg-neutral-100 focus:bg-white border border-transparent focus:border-neutral-300 rounded-xl outline-none transition duration-150"
                />
                <svg class="absolute left-3.5 top-2.5 h-4 w-4 text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <!-- Left Side: Form (Sticky on desktop) -->
            <section class="lg:sticky lg:top-24">
                <div class="bg-white p-6 rounded-2xl border border-neutral-200/80 shadow-sm">
                    <h2 id="formTitle" class="text-lg font-semibold mb-4 text-neutral-900">Create Note</h2>
                    
                    <form id="noteForm" class="space-y-4">
                        <input type="hidden" id="noteId" />
                        
                        <div>
                            <label for="titleInput" class="block text-xs font-medium text-neutral-500 uppercase tracking-wider mb-1">Title</label>
                            <input 
                                type="text" 
                                id="titleInput" 
                                placeholder="Note title" 
                                required
                                class="w-full px-3.5 py-2 text-sm bg-neutral-50 focus:bg-white border border-neutral-200 focus:border-neutral-900 rounded-lg outline-none transition"
                            />
                        </div>

                        <div>
                            <label for="contentInput" class="block text-xs font-medium text-neutral-500 uppercase tracking-wider mb-1">Content</label>
                            <textarea 
                                id="contentInput" 
                                rows="6" 
                                placeholder="Write your thought..." 
                                required
                                class="w-full px-3.5 py-2 text-sm bg-neutral-50 focus:bg-white border border-neutral-200 focus:border-neutral-900 rounded-lg outline-none resize-none transition"
                            ></textarea>
                        </div>

                        <div>
                            <label for="tagsInput" class="block text-xs font-medium text-neutral-500 uppercase tracking-wider mb-1">Tags (comma-separated)</label>
                            <input 
                                type="text" 
                                id="tagsInput" 
                                placeholder="idea, draft, urgent" 
                                class="w-full px-3.5 py-2 text-sm bg-neutral-50 focus:bg-white border border-neutral-200 focus:border-neutral-900 rounded-lg outline-none transition"
                            />
                        </div>

                        <div class="flex space-x-2 pt-2">
                            <button 
                                type="submit" 
                                class="flex-1 bg-neutral-900 hover:bg-neutral-800 text-white text-sm font-medium py-2 px-4 rounded-lg transition"
                            >
                                <span id="submitBtnText">Add Note</span>
                            </button>
                            <button 
                                type="button" 
                                id="cancelEditBtn" 
                                class="hidden bg-neutral-100 hover:bg-neutral-200 text-neutral-700 text-sm font-medium py-2 px-4 rounded-lg transition"
                            >
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Right Side: Notes List -->
            <section class="lg:col-span-2">
                <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Notes dynamically populated here -->
                </div>
            </section>
            
        </div>
    </main>

    <script>
        // --- 1. Class Model Definition ---
        class NoteModel {
            constructor() {
                this.storageKey = 'minimal_notes_db';
                this.notes = JSON.parse(localStorage.getItem(this.storageKey)) || [];
                
                // Populating initial guide notes if storage is blank
                if (this.notes.length === 0) {
                    this.notes = [
                        {
                            id: '1',
                            title: 'Welcome to Minimal Notes',
                            content: 'This application is built using Tailwind CSS and native ES6 JavaScript classes. You can add, edit, delete, and filter notes with ease.',
                            tags: ['welcome', 'guide'],
                            createdAt: new Date().toISOString()
                        },
                        {
                            id: '2',
                            title: 'Searching & Tags',
                            content: 'Use the search bar at the top right to filter notes by titles, contents, or tags. You can also click directly on any tag to filter your workspace.',
                            tags: ['features', 'tips'],
                            createdAt: new Date().toISOString()
                        }
                    ];
                    this.save();
                }
            }

            save() {
                localStorage.setItem(this.storageKey, JSON.stringify(this.notes));
            }

            // Create
            create(title, content, tagsRaw) {
                const tags = this._parseTags(tagsRaw);
                const note = {
                    id: Date.now().toString(),
                    title,
                    content,
                    tags,
                    createdAt: new Date().toISOString()
                };
                this.notes.unshift(note); // Add to the beginning
                this.save();
                return note;
            }

            // Read
            read(id) {
                return this.notes.find(note => note.id === id) || null;
            }

            // Read All
            read_all() {
                return this.notes;
            }

            // Update
            update(id, updatedFields) {
                const index = this.notes.findIndex(note => note.id === id);
                if (index !== -1) {
                    if (updatedFields.tags !== undefined) {
                        updatedFields.tags = this._parseTags(updatedFields.tags);
                    }
                    this.notes[index] = { ...this.notes[index], ...updatedFields };
                    this.save();
                    return this.notes[index];
                }
                return null;
            }

            // Delete
            delete(id) {
                const index = this.notes.findIndex(note => note.id === id);
                if (index !== -1) {
                    this.notes.splice(index, 1);
                    this.save();
                    return true;
                }
                return false;
            }

            // Helper to clean and split string tags into a clean array
            _parseTags(tagsInput) {
                if (Array.isArray(tagsInput)) return tagsInput;
                if (!tagsInput) return [];
                return tagsInput
                    .split(',')
                    .map(t => t.trim().toLowerCase())
                    .filter(t => t.length > 0);
            }
        }

        // --- 2. Application UI Controller ---
        const model = new NoteModel();
        let editingId = null;

        // DOM Element Cache
        const noteForm = document.getElementById('noteForm');
        const formTitle = document.getElementById('formTitle');
        const noteIdInput = document.getElementById('noteId');
        const titleInput = document.getElementById('titleInput');
        const contentInput = document.getElementById('contentInput');
        const tagsInput = document.getElementById('tagsInput');
        const searchInput = document.getElementById('searchInput');
        const notesContainer = document.getElementById('notesContainer');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const submitBtnText = document.getElementById('submitBtnText');

        // Render UI
        function renderNotes(filterText = '') {
            const notes = model.read_all();
            const normalizedFilter = filterText.toLowerCase().trim();

            const filteredNotes = notes.filter(note => {
                if (!normalizedFilter) return true;
                const matchesTitle = note.title.toLowerCase().includes(normalizedFilter);
                const matchesContent = note.content.toLowerCase().includes(normalizedFilter);
                const matchesTag = note.tags.some(tag => tag.toLowerCase().includes(normalizedFilter));
                return matchesTitle || matchesContent || matchesTag;
            });

            notesContainer.innerHTML = '';

            if (filteredNotes.length === 0) {
                notesContainer.innerHTML = `
                    <div class="col-span-full py-16 text-center text-neutral-400">
                        <p class="text-sm font-medium">No notes match your request.</p>
                        <button onclick="clearSearch()" class="mt-2 text-xs text-neutral-600 underline hover:text-black">Clear search</button>
                    </div>
                `;
                return;
            }

            filteredNotes.forEach(note => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-2xl border border-neutral-200/80 shadow-sm hover:shadow-md transition duration-200 flex flex-col justify-between";
                
                // Format tags markup safely
                const tagsMarkup = note.tags.map(tag => `
                    <span 
                        onclick="searchByTag('${tag}')" 
                        class="inline-block bg-neutral-100 hover:bg-neutral-200 text-neutral-600 text-xs font-medium px-2 py-0.5 rounded cursor-pointer mr-1 mb-1 transition duration-150"
                    >
                        #${escapeHTML(tag)}
                    </span>
                `).join('');

                card.innerHTML = `
                    <div>
                        <h3 class="font-semibold text-neutral-900 text-base break-words mb-2">${escapeHTML(note.title)}</h3>
                        <p class="text-sm text-neutral-600 break-words whitespace-pre-wrap leading-relaxed mb-4">${escapeHTML(note.content)}</p>
                    </div>
                    <div>
                        <div class="flex flex-wrap mb-4">
                            ${tagsMarkup}
                        </div>
                        <div class="flex justify-between items-center pt-3 border-t border-neutral-100 text-xs text-neutral-400">
                            <span>${new Date(note.createdAt).toLocaleDateString()}</span>
                            <div class="flex space-x-3">
                                <button onclick="editNote('${note.id}')" class="text-neutral-500 hover:text-neutral-900 font-medium transition">Edit</button>
                                <button onclick="deleteNote('${note.id}')" class="text-red-500 hover:text-red-700 font-medium transition">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
                notesContainer.appendChild(card);
            });
        }

        // HTML escaping utility for security
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Form reset handler
        function resetForm() {
            editingId = null;
            noteForm.reset();
            formTitle.textContent = 'Create Note';
            submitBtnText.textContent = 'Add Note';
            cancelEditBtn.classList.add('hidden');
        }

        // --- 3. Interaction Handlers ---

        // Handle note submission (Create or Update)
        noteForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            const tags = tagsInput.value.trim();

            if (!title || !content) return;

            if (editingId) {
                model.update(editingId, { title, content, tags });
            } else {
                model.create(title, content, tags);
            }

            resetForm();
            renderNotes(searchInput.value);
        });

        // Edit Mode Populator
        window.editNote = function(id) {
            const note = model.read(id);
            if (!note) return;

            editingId = id;
            titleInput.value = note.title;
            contentInput.value = note.content;
            tagsInput.value = note.tags.join(', ');

            formTitle.textContent = 'Edit Note';
            submitBtnText.textContent = 'Save Changes';
            cancelEditBtn.classList.remove('hidden');
            
            // Soft-scroll to form input on mobile device viewports
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Delete confirmation
        window.deleteNote = function(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                model.delete(id);
                if (editingId === id) resetForm();
                renderNotes(searchInput.value);
            }
        };

        // Click tag behavior to apply to filter search input
        window.searchByTag = function(tag) {
            searchInput.value = tag;
            renderNotes(tag);
        };

        window.clearSearch = function() {
            searchInput.value = '';
            renderNotes();
        }

        // Handle real-time search filtering
        searchInput.addEventListener('input', (e) => {
            renderNotes(e.target.value);
        });

        cancelEditBtn.addEventListener('click', resetForm);

        // Initial application setup
        renderNotes();
    </script>
</body>
</html>
