<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Notes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* --- Theme Colors (Defined via CSS Variables) --- */
        :root {
            /* Default Minimalist Theme */
            --bg-app: #f9f9f9;
            --bg-card: #ffffff;
            --border-color: #e5e5e5;
            --text-main: #171717;
            --text-content: #404040;
            --text-muted: #737373;
            --accent-color: #171717;
            --accent-text: #ffffff;
            --accent-hover: #262626;
            --input-bg: #f5f5f5;
            --shadow-intensity: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        body.theme-ghibli {
            /* Warm Cozy Ghibli Theme */
            --bg-app: #f4efe2;
            --bg-card: #fdfbf7;
            --border-color: #dfd2bc;
            --text-main: #2b4c3f;
            --text-content: #4a3b32;
            --text-muted: #8b745f;
            --accent-color: #386b52;
            --accent-text: #fdfbf7;
            --accent-hover: #264e3b;
            --input-bg: #eae0cc;
            --shadow-intensity: 0 2px 5px 0 rgba(139, 116, 95, 0.12);
        }

        body.theme-cyberpunk {
            /* Cyberpunk / Retrowave Dark Theme */
            --bg-app: #030308;
            --bg-card: #0c0a1a;
            --border-color: #00f0ff;
            --text-main: #00f0ff;
            --text-content: #a5f3fc;
            --text-muted: #ff0055;
            --accent-color: #ffe600;
            --accent-text: #030308;
            --accent-hover: #cca800;
            --input-bg: #15112e;
            --shadow-intensity: 0 0 12px rgba(0, 240, 255, 0.3);
        }

        /* Application of the custom shadows dependent on selected theme */
        .theme-shadow {
            box-shadow: var(--shadow-intensity);
        }
    </style>
</head>
<body class="bg-[var(--bg-app)] text-[var(--text-main)] min-h-screen transition-colors duration-300">

    <!-- 1. List View (Main Page) -->
    <div id="listView">
        <!-- Top Navigation -->
        <header class="border-b border-[var(--border-color)] bg-[var(--bg-card)]/85 backdrop-blur sticky top-0 z-10 transition-colors duration-300">
            <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                
                <div class="flex items-center space-x-3 cursor-pointer" onclick="clearSearch()">
                    <div class="w-8 h-8 bg-[var(--accent-color)] text-[var(--accent-text)] rounded-lg flex items-center justify-center font-bold text-sm transition-colors duration-300">N</div>
                    <h1 class="text-xl font-bold tracking-tight text-[var(--text-main)] transition-colors duration-300">Notes</h1>
                </div>
                
                <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                    <!-- Search Input -->
                    <div class="relative flex-1 md:w-64 min-w-[150px]">
                        <input 
                            type="text" 
                            id="searchInput" 
                            placeholder="Search notes or tags..." 
                            class="w-full pl-10 pr-4 py-2 text-sm bg-[var(--input-bg)] focus:bg-[var(--bg-card)] border border-transparent focus:border-[var(--border-color)] text-[var(--text-main)] placeholder-[var(--text-muted)] rounded-xl outline-none transition duration-150"
                        />
                        <svg class="absolute left-3.5 top-2.5 h-4 w-4 text-[var(--text-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>

                    <!-- Theme Selector Dropdown -->
                    <div class="flex items-center">
                        <select 
                            id="themeSelector" 
                            class="bg-[var(--input-bg)] text-[var(--text-main)] text-xs font-semibold border border-[var(--border-color)] px-2.5 py-2 rounded-xl outline-none cursor-pointer transition-colors duration-300"
                        >
                            <option value="default">Minimalist</option>
                            <option value="ghibli">Ghibli</option>
                            <option value="cyberpunk">Cyberpunk</option>
                        </select>
                    </div>

                    <!-- Add Note Button -->
                    <button 
                        id="openFormBtn"
                        class="bg-[var(--accent-color)] hover:bg-[var(--accent-hover)] text-[var(--accent-text)] text-sm font-medium py-2 px-4 rounded-xl flex items-center gap-1.5 shadow-sm transition whitespace-nowrap"
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                        New Note
                    </button>
                </div>
            </div>
        </header>

        <!-- Notes Container -->
        <main class="max-w-6xl mx-auto px-4 py-8">
            <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Notes populated dynamically -->
            </div>
        </main>
    </div>

    <!-- 2. Form View (Simulated Dedicated Writing Page) -->
    <div id="formView" class="hidden max-w-2xl mx-auto px-4 py-12">
        <!-- Back Navigation Button -->
        <button 
            id="backBtn" 
            class="flex items-center gap-2 text-sm text-[var(--text-muted)] hover:text-[var(--text-main)] transition mb-8 font-medium group"
        >
            <svg class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
            Back to Notes
        </button>

        <!-- View Title indicator -->
        <h2 id="formTitle" class="text-xs font-bold text-[var(--text-muted)] uppercase tracking-widest mb-6">New Note</h2>

        <!-- Note Edit Form -->
        <form id="noteForm" class="space-y-6">
            <input type="hidden" id="noteId" />
            
            <div>
                <input 
                    type="text" 
                    id="titleInput" 
                    placeholder="Title" 
                    required
                    class="w-full text-3xl font-bold text-[var(--text-main)] bg-transparent border-b border-[var(--border-color)] focus:border-[var(--text-main)] pb-3 outline-none transition duration-150 placeholder-[var(--text-muted)]"
                />
            </div>

            <div>
                <textarea 
                    id="contentInput" 
                    rows="10" 
                    placeholder="Start writing..." 
                    required
                    class="w-full text-base text-[var(--text-content)] bg-transparent outline-none resize-none pb-3 border-b border-[var(--border-color)] focus:border-[var(--text-main)] transition duration-150 leading-relaxed placeholder-[var(--text-muted)]"
                ></textarea>
            </div>

            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pt-2">
                <div class="flex-1">
                    <input 
                        type="text" 
                        id="tagsInput" 
                        placeholder="Tags (comma-separated, e.g. design, ideas)" 
                        class="w-full text-sm text-[var(--text-main)] bg-[var(--input-bg)] focus:bg-[var(--bg-card)] border border-transparent focus:border-[var(--border-color)] px-3.5 py-2.5 rounded-xl outline-none transition placeholder-[var(--text-muted)]"
                    />
                </div>
                <div class="flex space-x-3">
                    <button 
                        type="submit" 
                        class="bg-[var(--accent-color)] hover:bg-[var(--accent-hover)] text-[var(--accent-text)] text-sm font-medium py-2.5 px-6 rounded-xl transition shrink-0"
                    >
                        <span id="submitBtnText">Publish Note</span>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        // --- 1. Class Model Definition ---
        class NoteModel {
            constructor() {
                this.storageKey = 'minimal_notes_db_v4';
                this.notes = JSON.parse(localStorage.getItem(this.storageKey)) || [];
                
                if (this.notes.length === 0) {
                    this.notes = [
                        {
                            id: '1',
                            title: 'Welcome to Minimal Notes',
                            content: 'This application is built using Tailwind CSS and native ES6 JavaScript classes. You can add, edit, delete, and copy notes with ease.',
                            tags: ['welcome', 'guide'],
                            createdAt: new Date().toISOString()
                        },
                        {
                            id: '2',
                            title: 'Dynamic Themes Added',
                            content: 'Toggle between themes using the dropdown in the navigation header. Your chosen aesthetic will persist dynamically in storage.',
                            tags: ['features', 'styling'],
                            createdAt: new Date().toISOString()
                        }
                    ];
                    this.save();
                }
            }

            save() {
                localStorage.setItem(this.storageKey, JSON.stringify(this.notes));
            }

            // Create
            create(title, content, tagsRaw) {
                const tags = this._parseTags(tagsRaw);
                const note = {
                    id: Date.now().toString(),
                    title,
                    content,
                    tags,
                    createdAt: new Date().toISOString()
                };
                this.notes.unshift(note);
                this.save();
                return note;
            }

            // Read
            read(id) {
                return this.notes.find(note => note.id === id) || null;
            }

            // Read All
            read_all() {
                return this.notes;
            }

            // Update
            update(id, updatedFields) {
                const index = this.notes.findIndex(note => note.id === id);
                if (index !== -1) {
                    if (updatedFields.tags !== undefined) {
                        updatedFields.tags = this._parseTags(updatedFields.tags);
                    }
                    this.notes[index] = { ...this.notes[index], ...updatedFields };
                    this.save();
                    return this.notes[index];
                }
                return null;
            }

            // Delete
            delete(id) {
                const index = this.notes.findIndex(note => note.id === id);
                if (index !== -1) {
                    this.notes.splice(index, 1);
                    this.save();
                    return true;
                }
                return false;
            }

            _parseTags(tagsInput) {
                if (Array.isArray(tagsInput)) return tagsInput;
                if (!tagsInput) return [];
                return tagsInput
                    .split(',')
                    .map(t => t.trim().toLowerCase())
                    .filter(t => t.length > 0);
            }
        }

        // --- 2. Application UI Controller ---
        const model = new NoteModel();
        let editingId = null;

        // Views Cache
        const listView = document.getElementById('listView');
        const formView = document.getElementById('formView');

        // Navigation controls
        const openFormBtn = document.getElementById('openFormBtn');
        const backBtn = document.getElementById('backBtn');
        const themeSelector = document.getElementById('themeSelector');
        
        // Form Fields
        const noteForm = document.getElementById('noteForm');
        const formTitle = document.getElementById('formTitle');
        const noteIdInput = document.getElementById('noteId');
        const titleInput = document.getElementById('titleInput');
        const contentInput = document.getElementById('contentInput');
        const tagsInput = document.getElementById('tagsInput');
        const searchInput = document.getElementById('searchInput');
        const notesContainer = document.getElementById('notesContainer');
        const submitBtnText = document.getElementById('submitBtnText');

        // Page State Switcher
        function navigateTo(viewName) {
            if (viewName === 'list') {
                listView.classList.remove('hidden');
                formView.classList.add('hidden');
                resetForm();
                renderNotes(searchInput.value);
            } else if (viewName === 'form') {
                listView.classList.add('hidden');
                formView.classList.remove('hidden');
                window.scrollTo({ top: 0 });
            }
        }

        // Render logic
        function renderNotes(filterText = '') {
            const notes = model.read_all();
            const normalizedFilter = filterText.toLowerCase().trim();

            const filteredNotes = notes.filter(note => {
                if (!normalizedFilter) return true;
                const matchesTitle = note.title.toLowerCase().includes(normalizedFilter);
                const matchesContent = note.content.toLowerCase().includes(normalizedFilter);
                const matchesTag = note.tags.some(tag => tag.toLowerCase().includes(normalizedFilter));
                return matchesTitle || matchesContent || matchesTag;
            });

            notesContainer.innerHTML = '';

            if (filteredNotes.length === 0) {
                notesContainer.innerHTML = `
                    <div class="col-span-full py-20 text-center text-[var(--text-muted)]">
                        <p class="text-sm font-medium">No notes match your request.</p>
                        <button onclick="clearSearch()" class="mt-2 text-xs underline hover:text-[var(--text-main)] transition">Clear search</button>
                    </div>
                `;
                return;
            }

            filteredNotes.forEach(note => {
                const card = document.createElement('div');
                card.className = "bg-[var(--bg-card)] p-6 rounded-2xl border border-[var(--border-color)] theme-shadow hover:shadow-md transition duration-200 flex flex-col justify-between";
                
                const tagsMarkup = note.tags.map(tag => `
                    <span 
                        onclick="searchByTag('${tag}'); event.stopPropagation();" 
                        class="inline-block bg-[var(--input-bg)] hover:opacity-80 text-[var(--text-muted)] text-xs font-semibold px-2.5 py-0.5 rounded-md cursor-pointer mr-1 mb-1 transition duration-150"
                    >
                        #${escapeHTML(tag)}
                    </span>
                `).join('');

                card.innerHTML = `
                    <div>
                        <h3 class="font-semibold text-[var(--text-main)] text-base break-words mb-2">${escapeHTML(note.title)}</h3>
                        <p class="text-sm text-[var(--text-content)] break-words whitespace-pre-wrap leading-relaxed mb-4">${escapeHTML(note.content)}</p>
                    </div>
                    <div>
                        <div class="flex flex-wrap mb-4">
                            ${tagsMarkup}
                        </div>
                        <div class="flex justify-between items-center pt-3 border-t border-[var(--border-color)] text-xs text-[var(--text-muted)]">
                            <span>${new Date(note.createdAt).toLocaleDateString()}</span>
                            <div class="flex space-x-3 font-semibold">
                                <button onclick="copyNote('${note.id}', this); event.stopPropagation();" class="text-[var(--text-muted)] hover:text-[var(--text-main)] transition">Copy</button>
                                <button onclick="editNote('${note.id}'); event.stopPropagation();" class="text-[var(--text-muted)] hover:text-[var(--text-main)] transition">Edit</button>
                                <button onclick="deleteNote('${note.id}'); event.stopPropagation();" class="text-[var(--text-muted)] hover:text-[var(--text-main)] transition opacity-90 hover:opacity-100">Delete</button>
                            </div>
                        </div>
                    </div>
                `;
                notesContainer.appendChild(card);
            });
        }

        // HTML escaping utility for basic security
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Form reset logic
        function resetForm() {
            editingId = null;
            noteForm.reset();
            formTitle.textContent = 'New Note';
            submitBtnText.textContent = 'Publish Note';
        }

        // --- 3. Interaction Handlers ---

        // Theme management operations
        function applyTheme(themeName) {
            document.body.className = ''; // Wipe pre-existing theme helper tags
            if (themeName !== 'default') {
                document.body.classList.add(`theme-${themeName}`);
            }
            localStorage.setItem('minimal_notes_theme', themeName);
            themeSelector.value = themeName;
        }

        themeSelector.addEventListener('change', (e) => {
            applyTheme(e.target.value);
        });

        // Navigate to write page (New Note)
        openFormBtn.addEventListener('click', () => {
            editingId = null;
            navigateTo('form');
        });

        // Click back button to exit editor
        backBtn.addEventListener('click', () => navigateTo('list'));

        // Copy Note Content with temporary aesthetic feedback
        window.copyNote = async function(id, buttonEl) {
            const note = model.read(id);
            if (!note) return;

            try {
                await navigator.clipboard.writeText(note.content);
                const originalText = buttonEl.textContent;
                buttonEl.textContent = 'Copied!';
                buttonEl.style.color = 'var(--text-main)';
                
                setTimeout(() => {
                    buttonEl.textContent = originalText;
                    buttonEl.style.color = '';
                }, 1500);
            } catch (err) {
                console.error('Error copying text: ', err);
            }
        };

        // Form submission (Add or Save)
        noteForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            const tags = tagsInput.value.trim();

            if (!title || !content) return;

            if (editingId) {
                model.update(editingId, { title, content, tags });
            } else {
                model.create(title, content, tags);
            }

            navigateTo('list');
        });

        // Edit Mode Populator
        window.editNote = function(id) {
            const note = model.read(id);
            if (!note) return;

            editingId = id;
            titleInput.value = note.title;
            contentInput.value = note.content;
            tagsInput.value = note.tags.join(', ');

            formTitle.textContent = 'Edit Note';
            submitBtnText.textContent = 'Save Changes';
            
            navigateTo('form');
        };

        // Delete action
        window.deleteNote = function(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                model.delete(id);
                if (editingId === id) resetForm();
                renderNotes(searchInput.value);
            }
        };

        // Tag Filter helper
        window.searchByTag = function(tag) {
            searchInput.value = tag;
            renderNotes(tag);
        };

        window.clearSearch = function() {
            searchInput.value = '';
            renderNotes();
        };

        // Real-time Search input binding
        searchInput.addEventListener('input', (e) => {
            renderNotes(e.target.value);
        });

        // Initial setup sequence
        const savedTheme = localStorage.getItem('minimal_notes_theme') || 'default';
        applyTheme(savedTheme);
        renderNotes();
    </script>
</body>
</html>
