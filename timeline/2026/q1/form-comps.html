<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Form Component Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans">

    <div class="flex min-h-screen">
        <!-- Navigation Sidebar -->
        <aside class="w-64 bg-white border-r hidden md:block sticky top-0 h-screen p-6">
            <h1 class="text-2xl font-bold text-indigo-600 mb-8">Form UI Kit</h1>
            <nav class="space-y-2">
                <a href="#text" class="block px-4 py-2 rounded hover:bg-indigo-50 hover:text-indigo-600 transition">Text
                    Inputs</a>
                <a href="#textarea"
                    class="block px-4 py-2 rounded hover:bg-indigo-50 hover:text-indigo-600 transition">Textareas</a>
                <a href="#checkbox"
                    class="block px-4 py-2 rounded hover:bg-indigo-50 hover:text-indigo-600 transition">Checkboxes</a>
                <a href="#radio"
                    class="block px-4 py-2 rounded hover:bg-indigo-50 hover:text-indigo-600 transition">Radio
                    Buttons</a>
                <a href="#select"
                    class="block px-4 py-2 rounded hover:bg-indigo-50 hover:text-indigo-600 transition">Select Menus</a>
                <a href="#datetime"
                    class="block px-4 py-2 rounded hover:bg-indigo-50 hover:text-indigo-600 transition">Date & Time</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-4 md:p-12 max-w-5xl mx-auto space-y-20">

            <!-- 1. TEXT INPUTS -->
            <section id="text" class="space-y-6">
                <h2 class="text-3xl font-extrabold border-b pb-2">Text Inputs</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Variant 1: Basic Outlined -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Standard Input</label>
                        <input type="text" placeholder="Enter name..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <!-- Variant 2: Icon Input -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Email with Icon</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                    </path>
                                </svg>
                            </span>
                            <input type="email" placeholder="you@example.com"
                                class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    <!-- Variant 3: Floating Label -->
                    <div class="relative">
                        <input type="text" id="float_text" placeholder=" "
                            class="block px-2.5 pb-2.5 pt-4 w-full text-sm bg-transparent rounded-lg border border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-indigo-600 peer" />
                        <label for="float_text"
                            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-gray-50 px-2 peer-focus:px-2 peer-focus:text-indigo-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 left-1">Floating
                            Label</label>
                    </div>
                    <!-- Variant 4: Validation State -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-red-600">Error State</label>
                        <input type="text" value="Invalid input"
                            class="w-full px-4 py-2 border border-red-500 rounded-lg bg-red-50 text-red-900 focus:ring-red-500 outline-none">
                        <p class="text-xs text-red-500 italic">This field is required.</p>
                    </div>
                </div>
            </section>

            <!-- 2. TEXTAREAS -->
            <section id="textarea" class="space-y-6">
                <h2 class="text-3xl font-extrabold border-b pb-2">Textareas</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Variant 1: Auto-Expanding -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Auto-Expanding</label>
                        <textarea id="autoExp" placeholder="This grows as you type..." rows="1"
                            class="w-full p-3 border rounded-lg resize-none overflow-hidden focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                    </div>
                    <!-- Variant 2: Character Count -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Character Count</label>
                        <div class="relative">
                            <textarea id="charCountInput" maxlength="100" rows="3"
                                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                            <span id="charCountDisplay"
                                class="absolute bottom-2 right-2 text-xs text-gray-400">0/100</span>
                        </div>
                    </div>
                    <!-- Variant 3: Underline Only -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Minimalist Underline</label>
                        <textarea rows="2" placeholder="Write a note..."
                            class="w-full bg-transparent border-b-2 border-gray-300 focus:border-indigo-500 outline-none transition-colors py-2"></textarea>
                    </div>
                    <!-- Variant 4: Chat Style -->
                    <div class="bg-gray-100 p-2 rounded-2xl flex items-end gap-2">
                        <textarea rows="1" placeholder="Type a message..."
                            class="flex-1 p-2 bg-white rounded-xl border-none focus:ring-0 outline-none text-sm"></textarea>
                        <button class="bg-indigo-600 text-white p-2 rounded-xl">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path
                                    d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- 3. CHECKBOXES -->
            <section id="checkbox" class="space-y-6">
                <h2 class="text-3xl font-extrabold border-b pb-2">Checkboxes</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Variant 1: Modern Switch -->
                    <label class="flex items-center justify-between p-4 bg-white border rounded-xl cursor-pointer">
                        <span class="font-medium">Enable Notifications</span>
                        <div class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer">
                            <div
                                class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600">
                            </div>
                        </div>
                    </label>
                    <!-- Variant 2: Card Selection -->
                    <label class="relative group cursor-pointer">
                        <input type="checkbox" class="peer sr-only">
                        <div
                            class="p-4 border-2 rounded-xl transition-all peer-checked:border-indigo-600 peer-checked:bg-indigo-50 group-hover:bg-gray-50">
                            <div class="flex justify-between items-center">
                                <h3 class="font-bold">Premium Support</h3>
                                <div
                                    class="w-5 h-5 border-2 rounded peer-checked:bg-indigo-600 flex items-center justify-center">
                                    <svg class="w-3 h-3 text-white hidden peer-checked:block" fill="none"
                                        stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-width="4" d="M5 13l4 4L19 7"></path>
                                    </svg>
                                </div>
                            </div>
                            <p class="text-sm text-gray-500">24/7 priority email and phone support.</p>
                        </div>
                    </label>
                    <!-- Variant 3: Checklist Style -->
                    <div class="space-y-2">
                        <label class="flex items-center space-x-3">
                            <input type="checkbox"
                                class="w-5 h-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500" checked>
                            <span class="text-gray-700">Finish documentation</span>
                        </label>
                        <label class="flex items-center space-x-3">
                            <input type="checkbox"
                                class="w-5 h-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
                            <span class="text-gray-700">Deploy to production</span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- 4. RADIO BUTTONS -->
            <section id="radio" class="space-y-6">
                <h2 class="text-3xl font-extrabold border-b pb-2">Radio Buttons</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Variant 1: Segmented Control -->
                    <div class="flex p-1 bg-gray-200 rounded-lg w-full max-w-xs">
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="view" class="sr-only peer" checked>
                            <span
                                class="block py-1.5 text-sm font-medium rounded-md peer-checked:bg-white peer-checked:shadow-sm">Grid</span>
                        </label>
                        <label class="flex-1 text-center cursor-pointer">
                            <input type="radio" name="view" class="sr-only peer">
                            <span
                                class="block py-1.5 text-sm font-medium rounded-md peer-checked:bg-white peer-checked:shadow-sm">List</span>
                        </label>
                    </div>
                    <!-- Variant 2: Color Pickers -->
                    <div class="flex gap-4">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="color" class="peer sr-only" checked>
                            <div class="w-8 h-8 rounded-full bg-red-500 ring-offset-2 peer-checked:ring-2 ring-red-500">
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="color" class="peer sr-only">
                            <div
                                class="w-8 h-8 rounded-full bg-blue-500 ring-offset-2 peer-checked:ring-2 ring-blue-500">
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="color" class="peer sr-only">
                            <div
                                class="w-8 h-8 rounded-full bg-green-500 ring-offset-2 peer-checked:ring-2 ring-green-500">
                            </div>
                        </label>
                    </div>
                    <!-- Variant 3: Vertical Modern List -->
                    <div class="space-y-2 col-span-full">
                        <label
                            class="flex items-center p-4 border rounded-lg cursor-pointer hover:bg-gray-50 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50">
                            <input type="radio" name="plan" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                            <div class="ml-4">
                                <p class="block font-bold">Monthly Plan</p>
                                <p class="text-sm text-gray-500">$19/mo - Cancel anytime</p>
                            </div>
                        </label>
                        <label
                            class="flex items-center p-4 border rounded-lg cursor-pointer hover:bg-gray-50 has-[:checked]:border-indigo-600 has-[:checked]:bg-indigo-50">
                            <input type="radio" name="plan" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                            <div class="ml-4">
                                <p class="block font-bold">Annual Plan</p>
                                <p class="text-sm text-gray-500">$190/yr - 2 months free</p>
                            </div>
                        </label>
                    </div>
                </div>
            </section>

            <!-- 5. SELECT MENUS -->
            <section id="select" class="space-y-6">
                <h2 class="text-3xl font-extrabold border-b pb-2">Select Menus</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Variant 1: Custom Chevron -->
                    <div class="relative">
                        <label class="text-sm font-semibold mb-1 block">Custom Select</label>
                        <select
                            class="w-full pl-4 pr-10 py-2 border rounded-lg appearance-none bg-white focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option>Product Design</option>
                            <option>Marketing</option>
                            <option>Engineering</option>
                        </select>
                        <div class="absolute inset-y-0 right-3 flex items-center pt-5 pointer-events-none">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                    <!-- Variant 2: Minimalist -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold mb-1 block">Minimalist</label>
                        <select
                            class="w-full bg-gray-100 border-none rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500">
                            <option>Sort by: Newest</option>
                            <option>Sort by: Price</option>
                            <option>Sort by: Popular</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- 6. DATE & TIME -->
            <section id="datetime" class="space-y-6 pb-20">
                <h2 class="text-3xl font-extrabold border-b pb-2">Date & Time</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Date -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Select Date</label>
                        <input type="date"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <!-- Time -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Select Time</label>
                        <input type="time"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <!-- Datetime -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold">Event Start</label>
                        <input type="datetime-local"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <!-- Themed Wrapper -->
                    <div class="bg-indigo-600 p-4 rounded-xl shadow-lg">
                        <label class="text-white text-xs font-bold uppercase tracking-wider mb-2 block">Dark Theme
                            Picker</label>
                        <input type="date"
                            class="w-full bg-indigo-500 border-none rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-white outline-none">
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- JAVASCRIPT FOR DYNAMIC LOGIC -->
    <script>
        // 1. Auto-Expanding Textarea
        const tx = document.getElementById('autoExp');
        tx.addEventListener("input", function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // 2. Character Counter
        const charInput = document.getElementById('charCountInput');
        const charDisplay = document.getElementById('charCountDisplay');
        charInput.addEventListener('input', (e) => {
            const currentLength = e.target.value.length;
            charDisplay.textContent = `${currentLength}/100`;
            if (currentLength >= 100) {
                charDisplay.classList.replace('text-gray-400', 'text-red-500');
            } else {
                charDisplay.classList.replace('text-red-500', 'text-gray-400');
            }
        });

        // 3. Smooth scroll for sidebar links
        document.querySelectorAll('aside a').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>

</html>
