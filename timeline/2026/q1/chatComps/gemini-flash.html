<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-gray-200 p-10 font-sans">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto">
        <!-- Preview 1: Two People Chat -->
        <div class="space-y-2">
            <h2 class="text-lg font-bold">Two People Chat</h2>
            <div id="two-people-container" class="h-80 border rounded-lg bg-white overflow-hidden"></div>
        </div>

        <!-- Preview 2: Many People Chat -->
        <div class="space-y-2">
            <h2 class="text-lg font-bold">Group Chat (Colors)</h2>
            <div id="group-chat-container" class="h-80 border rounded-lg bg-slate-900 overflow-hidden"></div>
        </div>
    </div>

    <!-- Chat Bubble will append to body -->

    <script>
        // --- 1. Utilities & Markdown Parser ---
        // Using marked.js CDN for markdown. If you're in a local env, npm install marked.
        const parseMarkdown = (text) => {
            if (window.marked && window.marked.parse) {
                return window.marked.parse(text);
            }
            return text.replace(/\n/g, '<br>'); // Fallback
        };

        // Lucide IconNode Renderer: Converts [tag, attrs, children] structure to SVG
        const renderIcon = (iconNode) => {
            if (!iconNode || !Array.isArray(iconNode)) return '';

            const createEl = ([tag, attrs, children = []]) => {
                const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
                Object.entries(attrs).forEach(([key, val]) => el.setAttribute(key, val));
                children.forEach(child => el.appendChild(createEl(child)));
                return el;
            };

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 24 24");
            svg.setAttribute("fill", "none");
            svg.setAttribute("stroke", "currentColor");
            svg.setAttribute("stroke-width", "2");
            svg.setAttribute("stroke-linecap", "round");
            svg.setAttribute("stroke-linejoin", "round");
            svg.classList.add("w-5", "h-5");

            iconNode.forEach(node => svg.appendChild(createEl(node)));
            return svg;
        };

        // --- 2. The Data Model (CRUD) ---
        class MessageStore {
            constructor(key = "chat_messages") {
                this.key = key;
            }
            create(msg) {
                const msgs = this.read_all();
                msgs.push({ ...msg, id: Date.now() });
                localStorage.setItem(this.key, JSON.stringify(msgs));
            }
            read_all() {
                return JSON.parse(localStorage.getItem(this.key) || "[]");
            }
            update(id, updates) {
                const msgs = this.read_all().map(m => m.id === id ? { ...m, ...updates } : m);
                localStorage.setItem(this.key, JSON.stringify(msgs));
            }
            delete(id) {
                const msgs = this.read_all().filter(m => m.id !== id);
                localStorage.setItem(this.key, JSON.stringify(msgs));
            }
        }

        // --- 3. Chat Components ---

        class TwoPeopleChatComponent {
            constructor() {
                this.container = document.createElement('div');
                this.container.className = "flex flex-col h-full bg-gray-50 rounded-lg shadow p-4 space-y-4 overflow-y-auto max-h-[500px]";
                this.userName = "Me";
            }

            set_user_name(name) { this.userName = name; }

            set_messages(msgs) {
                this.container.innerHTML = '';
                msgs.forEach(msg => {
                    const isMe = msg.user.name === this.userName;
                    const bubble = document.createElement('div');
                    bubble.className = `flex ${isMe ? 'justify-end' : 'justify-start'} items-end space-x-2`;

                    bubble.innerHTML = `
        ${!isMe ? `<div class="p-1 bg-white rounded-full border">${renderIcon(msg.user.icon).outerHTML}</div>` : ''}
        <div class="max-w-[70%] p-3 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-br-none' : 'bg-white text-gray-800 rounded-bl-none'}">
          <div class="prose prose-sm prose-invert">${parseMarkdown(msg.content)}</div>
        </div>
        ${isMe ? `<div class="p-1 bg-blue-100 rounded-full">${renderIcon(msg.user.icon).outerHTML}</div>` : ''}
      `;
                    this.container.appendChild(bubble);
                });
            }

            get_comp() { return this.container; }
        }

        class ManyPeopleChatComponent {
            constructor() {
                this.container = document.createElement('div');
                this.container.className = "flex flex-col h-full bg-slate-900 rounded-lg p-4 space-y-3 overflow-y-auto max-h-[500px]";
                this.colors = ['text-blue-400', 'text-green-400', 'text-purple-400', 'text-pink-400', 'text-orange-400'];
            }

            set_group_name(name) { /* Optional: UI for group header */ }

            set_messages(msgs) {
                this.container.innerHTML = '';
                msgs.forEach((msg, i) => {
                    const color = this.colors[i % this.colors.length];
                    const div = document.createElement('div');
                    div.className = "flex space-x-3 items-start animate-fade-in";
                    div.innerHTML = `
        <div class="mt-1">${renderIcon(msg.user.icon).outerHTML}</div>
        <div class="flex flex-col">
          <span class="text-xs font-bold ${color}">${msg.user.name}</span>
          <div class="text-slate-300 text-sm markdown-body">${parseMarkdown(msg.content)}</div>
        </div>
      `;
                    this.container.appendChild(div);
                });
            }

            get_comp() { return this.container; }
        }

        class AIChatComponent extends TwoPeopleChatComponent {
            set_api_and_model(api, model) {
                this.api = api;
                this.model = model || "glm-4.7";
            }

            async send_to_ai(prompt, onResponse) {
                // Placeholder for GLM 4.7 call
                console.log(`Calling ${this.model} via ${this.api}...`);
                // Simulated delay
                setTimeout(() => {
                    onResponse(`This is a response from **${this.model}**. I received your prompt: "${prompt}"`);
                }, 1000);
            }
        }

        class ChatBubbleComponent {
            constructor() {
                this.isOpen = false;
                this.store = new MessageStore();
                this.container = document.createElement('div');
                this.container.className = "fixed bottom-6 right-6 flex flex-col items-end z-50";
                this.init();
            }

            init() {
                this.container.innerHTML = `
      <div id="chat-window" class="hidden flex-col w-80 h-96 bg-white shadow-2xl rounded-2xl border border-gray-100 mb-4 overflow-hidden">
        <div class="bg-blue-600 p-4 text-white font-bold flex justify-between items-center">
          <span id="chat-title">Chat</span>
          <button id="close-chat" class="hover:bg-blue-700 p-1 rounded">✕</button>
        </div>
        <div id="bubble-msgs" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm"></div>
        <div class="p-3 border-t flex space-x-2">
          <input id="chat-input" type="text" placeholder="Type a message..." class="flex-1 border rounded-lg px-3 py-1 text-sm outline-none focus:ring-2 ring-blue-500">
          <button id="chat-send" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-sm">Send</button>
        </div>
      </div>
      <button id="toggle-bubble" class="w-14 h-14 bg-blue-600 rounded-full shadow-lg flex items-center justify-center text-white hover:scale-110 transition-transform">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
      </button>
    `;

                this.container.querySelector('#toggle-bubble').onclick = () => this.toggle();
                this.container.querySelector('#close-chat').onclick = () => this.toggle();
                this.container.querySelector('#chat-send').onclick = () => this.handleSend();
                this.container.querySelector('#chat-input').onkeypress = (e) => e.key === 'Enter' && this.handleSend();

                this.render_messages();
            }

            toggle() {
                this.isOpen = !this.isOpen;
                this.container.querySelector('#chat-window').classList.toggle('hidden', !this.isOpen);
                this.container.querySelector('#chat-window').classList.toggle('flex', this.isOpen);
            }

            set_title(name) { this.container.querySelector('#chat-title').innerText = name; }

            handleSend() {
                const input = this.container.querySelector('#chat-input');
                if (!input.value.trim()) return;

                this.store.create({
                    user: { name: "Me", type: "Person", icon: [["path", { d: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" }], ["circle", { cx: "12", cy: "7", r: "4" }]] },
                    content: input.value
                });

                input.value = '';
                this.render_messages();
            }

            render_messages() {
                const msgs = this.store.read_all();
                const list = this.container.querySelector('#bubble-msgs');
                list.innerHTML = msgs.map(m => `
      <div class="flex flex-col ${m.user.name === 'Me' ? 'items-end' : 'items-start'}">
        <div class="px-3 py-2 rounded-xl ${m.user.name === 'Me' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-100 text-gray-800 rounded-tl-none'}">
          ${parseMarkdown(m.content)}
        </div>
      </div>
    `).join('');
                list.scrollTop = list.scrollHeight;
            }

            get_comp() { return this.container; }
        }
    </script>
    <script>
        // --- MOCK DATA ---
        const userIcon = [["path", { d: "M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" }], ["circle", { cx: "12", cy: "7", r: "4" }]];
        const botIcon = [["path", { d: "M12 8V4H8" }], ["rect", { width: "16", height: "12", x: "4", y: "8", rx: "2" }], ["path", { d: "M2 14h2" }], ["path", { d: "M20 14h2" }], ["path", { d: "M15 13v2" }], ["path", { d: "M9 13v2" }]];

        const msgs = [
            { user: { name: "Alice", type: "Person", icon: userIcon }, content: "Hello! Have you seen the **GLM 4.7** benchmarks?" },
            { user: { name: "Bot", type: "Bot", icon: botIcon }, content: "Yes! They look *very* promising." }
        ];

        // --- INSTANTIATION ---
        const twoChat = new TwoPeopleChatComponent();
        twoChat.set_user_name("Alice");
        twoChat.set_messages(msgs);
        document.getElementById('two-people-container').appendChild(twoChat.get_comp());

        const manyChat = new ManyPeopleChatComponent();
        manyChat.set_messages([
            ...msgs,
            { user: { name: "Charlie", type: "Person", icon: userIcon }, content: "Count me in for the test!" }
        ]);
        document.getElementById('group-chat-container').appendChild(manyChat.get_comp());

        const bubble = new ChatBubbleComponent();
        bubble.set_title("Support Assistant");
        document.body.appendChild(bubble.get_comp());
    </script>
</body>

</html>
