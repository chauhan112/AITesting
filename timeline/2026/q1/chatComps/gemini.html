<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Components Preview</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Basic styling for markdown content inside bubbles */
        .md-content p { margin-bottom: 0.5rem; }
        .md-content p:last-child { margin-bottom: 0; }
        .md-content pre { background: rgba(0,0,0,0.15); padding: 0.5rem; border-radius: 0.25rem; overflow-x: auto; margin: 0.5rem 0;}
        .md-content code { font-family: monospace; background: rgba(0,0,0,0.15); padding: 0.1rem 0.2rem; border-radius: 0.2rem; font-size: 0.875em;}
        .md-content ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .md-content ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.5rem; }
        .md-content strong { font-weight: bold; }
        
        /* Custom scrollbar for chat containers */
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <h1 class="text-3xl font-bold mb-8 text-gray-800 text-center">Chat Components Preview</h1>

    <!-- Previews Container -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 h-[600px]" id="preview-container">
        <!-- Components will be injected here via JS -->
    </div>

    <script>
        // ==========================================
        // 1. LOCAL STORAGE CRUD MODEL
        // ==========================================
        class LocalMessageModel {
            constructor(collectionName) {
                this.collectionName = collectionName;
                if (!localStorage.getItem(this.collectionName)) {
                    localStorage.setItem(this.collectionName, JSON.stringify([]));
                }
            }
            read_all() {
                return JSON.parse(localStorage.getItem(this.collectionName));
            }
            read(id) {
                return this.read_all().find(msg => msg.id === id);
            }
            create(msg) {
                const msgs = this.read_all();
                const newMsg = { ...msg, id: Date.now().toString() + Math.random().toString(36).substring(7) };
                msgs.push(newMsg);
                localStorage.setItem(this.collectionName, JSON.stringify(msgs));
                return newMsg;
            }
            update(id, updatedContent) {
                let msgs = this.read_all();
                const index = msgs.findIndex(msg => msg.id === id);
                if (index !== -1) {
                    msgs[index].content = updatedContent;
                    localStorage.setItem(this.collectionName, JSON.stringify(msgs));
                    return msgs[index];
                }
                return null;
            }
            delete(id) {
                let msgs = this.read_all();
                msgs = msgs.filter(msg => msg.id !== id);
                localStorage.setItem(this.collectionName, JSON.stringify(msgs));
            }
        }

        // ==========================================
        // 2. COMPONENTS
        // ==========================================

        class TwoPeopleChatComponent {
            constructor() {
                this.container = document.createElement('div');
                this.container.className = "flex flex-col h-full bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden";
                
                this.header = document.createElement('div');
                this.header.className = "bg-gray-50 border-b p-4 font-semibold text-gray-800 flex flex-col justify-center";
                
                this.messagesContainer = document.createElement('div');
                this.messagesContainer.className = "flex-1 p-4 overflow-y-auto chat-scroll flex flex-col gap-4 bg-white";
                
                this.container.appendChild(this.header);
                this.container.appendChild(this.messagesContainer);
                
                this.userName = ""; 
            }

            get_comp() { return this.container; }

            set_user_name(name) {
                this.userName = name;
                this.header.innerHTML = `<span>Chatting as: <span class="text-blue-600">${name}</span></span>`;
            }

            set_messages(msgs) {
                this.messagesContainer.innerHTML = '';
                msgs.forEach(msg => {
                    const isMe = msg.user.name === this.userName;
                    const alignClass = isMe ? "self-end flex-row-reverse" : "self-start flex-row";
                    const bgClass = isMe ? "bg-blue-600 text-white" : "bg-gray-100 text-gray-800";

                    const msgWrapper = document.createElement('div');
                    msgWrapper.className = `flex items-end gap-2 max-w-[85%] ${alignClass}`;

                    const iconDiv = document.createElement('div');
                    iconDiv.className = "w-8 h-8 rounded-full bg-gray-200 border flex items-center justify-center flex-shrink-0 text-gray-600 shadow-sm";
                    iconDiv.innerHTML = `<i data-lucide="${msg.user.icon}" class="w-4 h-4"></i>`;

                    const bubble = document.createElement('div');
                    bubble.className = `p-3 rounded-2xl md-content text-sm shadow-sm ${bgClass} ${isMe ? 'rounded-br-none' : 'rounded-bl-none'}`;
                    bubble.innerHTML = marked.parse(msg.content);

                    msgWrapper.appendChild(iconDiv);
                    msgWrapper.appendChild(bubble);
                    this.messagesContainer.appendChild(msgWrapper);
                });
                lucide.createIcons({ root: this.messagesContainer });
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }
        }

        class ManyPeopleChatComponent {
            constructor() {
                this.container = document.createElement('div');
                this.container.className = "flex flex-col h-full bg-white border border-gray-200 shadow-sm rounded-xl overflow-hidden";
                
                this.header = document.createElement('div');
                this.header.className = "bg-indigo-600 text-white p-4 font-semibold shadow-sm flex items-center gap-2";
                
                this.messagesContainer = document.createElement('div');
                this.messagesContainer.className = "flex-1 p-4 overflow-y-auto chat-scroll flex flex-col gap-3 bg-gray-50";
                
                this.container.appendChild(this.header);
                this.container.appendChild(this.messagesContainer);
            }

            get_comp() { return this.container; }

            set_group_name(name) {
                this.header.innerHTML = `<i data-lucide="users" class="w-5 h-5"></i> <span>${name}</span>`;
            }

            // Assign a deterministic color based on the user's name
            _getColorForName(name) {
                const colors = ['bg-red-100 text-red-900', 'bg-green-100 text-green-900', 'bg-yellow-100 text-yellow-900', 'bg-purple-100 text-purple-900', 'bg-pink-100 text-pink-900', 'bg-teal-100 text-teal-900'];
                let hash = 0;
                for (let i = 0; i < name.length; i++) hash += name.charCodeAt(i);
                return colors[hash % colors.length];
            }

            set_messages(msgs) {
                this.messagesContainer.innerHTML = '';
                msgs.forEach(msg => {
                    const bgClass = this._getColorForName(msg.user.name);

                    const msgWrapper = document.createElement('div');
                    msgWrapper.className = `flex flex-col self-start max-w-[90%] gap-1`;

                    const nameLabel = document.createElement('span');
                    nameLabel.className = "text-xs font-medium text-gray-500 ml-1 flex items-center gap-1";
                    nameLabel.innerHTML = `<i data-lucide="${msg.user.icon}" class="w-3 h-3"></i> ${msg.user.name}`;

                    const bubble = document.createElement('div');
                    bubble.className = `px-3 py-2 rounded-xl md-content text-sm shadow-sm ${bgClass}`;
                    bubble.innerHTML = marked.parse(msg.content);

                    msgWrapper.appendChild(nameLabel);
                    msgWrapper.appendChild(bubble);
                    this.messagesContainer.appendChild(msgWrapper);
                });
                lucide.createIcons({ root: this.container });
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }
        }

        class AIChatComponent extends TwoPeopleChatComponent {
            set_api_and_model(api, model) {
                // Modifying the header from the parent class
                this.header.innerHTML = `
                    <div class="flex items-center gap-2 text-indigo-700 font-bold">
                        <i data-lucide="bot" class="w-5 h-5"></i>
                        <span>AI Assistant</span>
                    </div>
                    <div class="text-xs text-gray-500 font-normal mt-1 flex items-center gap-1">
                        <span class="bg-gray-200 px-2 py-0.5 rounded-full">API: ${api}</span> 
                        <span class="bg-gray-200 px-2 py-0.5 rounded-full">Model: ${model}</span>
                    </div>
                `;
            }
        }

        class ChatBubbleComponent {
            constructor() {
                this.container = document.createElement('div');
                this.container.className = "fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3";
                
                // Floating Bubble Button
                this.btn = document.createElement('button');
                this.btn.className = "w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-2xl hover:bg-blue-700 transition transform hover:scale-105";
                this.btn.innerHTML = `<i data-lucide="message-square"></i>`;
                this.btn.onclick = () => this.toggle();

                // Chat Window (hidden by default)
                this.window = document.createElement('div');
                this.window.className = "hidden flex-col w-80 h-[28rem] bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-200 origin-bottom-right transition-all";

                this.header = document.createElement('div');
                this.header.className = "bg-blue-600 text-white p-4 font-semibold flex justify-between items-center shadow-md z-10";
                
                this.messagesContainer = document.createElement('div');
                this.messagesContainer.className = "flex-1 p-4 overflow-y-auto chat-scroll flex flex-col gap-3 bg-gray-50";
                
                // Form to send messages
                this.inputArea = document.createElement('form');
                this.inputArea.className = "border-t border-gray-200 p-3 flex gap-2 bg-white";
                this.inputArea.innerHTML = `
                    <input type="text" class="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition" placeholder="Type a message..." required />
                    <button type="submit" class="bg-blue-600 text-white w-9 h-9 flex items-center justify-center rounded-full hover:bg-blue-700 transition flex-shrink-0"><i data-lucide="send" class="w-4 h-4"></i></button>
                `;
                this.inputArea.onsubmit = (e) => this.sendMessage(e);

                this.window.appendChild(this.header);
                this.window.appendChild(this.messagesContainer);
                this.window.appendChild(this.inputArea);

                this.container.appendChild(this.window);
                this.container.appendChild(this.btn);

                this.isOpen = false;
                this.currentUser = { name: "You", type: "Person", icon: "user" };
                this.model = null; // Will be injected via set_model
            }

            get_comp() { return this.container; }

            toggle() {
                this.isOpen = !this.isOpen;
                if (this.isOpen) {
                    this.window.classList.remove("hidden");
                    this.window.classList.add("flex");
                    this.btn.innerHTML = `<i data-lucide="x"></i>`;
                    this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
                } else {
                    this.window.classList.add("hidden");
                    this.window.classList.remove("flex");
                    this.btn.innerHTML = `<i data-lucide="message-square"></i>`;
                }
                lucide.createIcons({ root: this.container });
            }

            set_title(name) {
                this.header.innerHTML = `<span>${name}</span> <button class="text-white hover:text-gray-200"><i data-lucide="more-horizontal" class="w-5 h-5"></i></button>`;
            }

            // Bind to a CRUD model instance
            set_model(model) {
                this.model = model;
                // Read existing messages from local storage
                const existingMsgs = this.model.read_all();
                if (existingMsgs.length === 0) {
                    // Seed initial message if DB is empty
                    this.model.create({ user: { name: "Support", type: "Person", icon: "headset" }, content: "Hello! How can we help you today?" });
                }
                this.set_messages(this.model.read_all());
            }

            set_messages(msgs) {
                this.messagesContainer.innerHTML = '';
                msgs.forEach(msg => {
                    const isMe = msg.user.name === this.currentUser.name;
                    const alignClass = isMe ? "self-end bg-blue-600 text-white rounded-br-sm" : "self-start bg-white border border-gray-200 text-gray-800 rounded-bl-sm";
                    
                    const div = document.createElement('div');
                    div.className = `px-3 py-2 rounded-2xl max-w-[85%] text-sm md-content shadow-sm ${alignClass}`;
                    div.innerHTML = marked.parse(msg.content);
                    this.messagesContainer.appendChild(div);
                });
                lucide.createIcons({ root: this.messagesContainer });
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }

            sendMessage(e) {
                e.preventDefault();
                const input = this.inputArea.querySelector('input');
                const text = input.value.trim();
                if (!text || !this.model) return;
                
                const newMsg = { user: this.currentUser, content: text };
                
                // Create in local storage model
                this.model.create(newMsg);
                
                // Update view
                this.set_messages(this.model.read_all());
                input.value = '';
            }
        }


        // ==========================================
        // 3. INITIALIZATION & PREVIEW
        // ==========================================

        // Mock Users
        const userMe = { name: "Alex", type: "Person", icon: "user" };
        const userOther = { name: "Bob", type: "Person", icon: "ghost" };
        const userBot = { name: "AI Agent", type: "Bot", icon: "bot" };
        const userCharlie = { name: "Charlie", type: "Person", icon: "glasses" };

        document.addEventListener('DOMContentLoaded', () => {
            const previewContainer = document.getElementById('preview-container');

            // 1. Preview TwoPeopleChatComponent
            const twoPeopleChat = new TwoPeopleChatComponent();
            twoPeopleChat.set_user_name("Alex");
            twoPeopleChat.set_messages([
                { user: userOther, content: "Hey Alex! Did you fix the bug?" },
                { user: userMe, content: "Yes! Everything is working now. It was an issue with `localStorage`." },
                { user: userOther, content: "Awesome, let's deploy today." }
            ]);
            previewContainer.appendChild(twoPeopleChat.get_comp());

            // 2. Preview ManyPeopleChatComponent
            const groupChat = new ManyPeopleChatComponent();
            groupChat.set_group_name("Dev Team Alpha");
            groupChat.set_messages([
                { user: userMe, content: "Morning team! Ready for the sprint?" },
                { user: userOther, content: "Morning! I've attached the PR links in the doc." },
                { user: userCharlie, content: "Just a heads up, the DB migration takes **~5 minutes** to run.\n\n```sql\nALTER TABLE users ADD COLUMN active BOOLEAN;\n```" }
            ]);
            previewContainer.appendChild(groupChat.get_comp());

            // 3. Preview AIChatComponent
            const aiChat = new AIChatComponent();
            aiChat.set_user_name("Alex"); // Identifies the human side
            aiChat.set_api_and_model("OpenAI", "glm-4.7");
            aiChat.set_messages([
                { user: userMe, content: "Write a short loop in JS." },
                { user: userBot, content: "Certainly! Here is a simple `for` loop in JavaScript:\n\n```javascript\nfor(let i=0; i<5; i++){\n  console.log(i);\n}\n```\nLet me know if you need anything else!" }
            ]);
            previewContainer.appendChild(aiChat.get_comp());

            // 4. Preview ChatBubbleComponent (Floating)
            // Initialize the local storage DB collection
            const dbModel = new LocalMessageModel('app_chat_messages');
            
            const chatBubble = new ChatBubbleComponent();
            chatBubble.set_title("Live Support");
            chatBubble.set_model(dbModel); // Bind to DB
            
            // Append the floating bubble to the document body
            document.body.appendChild(chatBubble.get_comp());

            // Render all Lucide Icons in the DOM (global backup)
            lucide.createIcons();
        });
    </script>
</body>
</html>
