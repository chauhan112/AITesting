<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIB21 Sickness Workflow Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-gray-800">

    <!-- App Container -->
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white shadow-sm z-10">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white p-2 rounded-lg">
                        <i class="fa-solid fa-hospital-user"></i>
                    </div>
                    <h1 class="text-xl font-bold text-gray-900">GIB21 <span class="text-blue-600">Workflow Manager</span></h1>
                </div>
                <button onclick="app.resetData()" class="text-sm text-gray-500 hover:text-red-600 underline">Reset Database</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full gap-6 grid grid-cols-1 lg:grid-cols-12">
            
            <!-- Sidebar / Trigger Area -->
            <div class="lg:col-span-4 space-y-6">
                <div id="trigger-container"></div>
                <div id="stats-container"></div>
            </div>

            <!-- Main Workflow Area -->
            <div class="lg:col-span-8 space-y-6">
                <div id="workflow-container"></div>
            </div>

        </main>
    </div>

    <script>
        /**
         * ------------------------------------------------------------------
         * ARCHITECTURE & INTERFACES
         * ------------------------------------------------------------------
         */

        // Interface IDataModel (Conceptual)
        // read_all()
        // read(id)
        // update(id, changed_vals)
        // delete(id)
        // create(vals)

        // Interface IComponent (Conceptual)
        // get_comp(): HTMLElement | string

        /**
         * ------------------------------------------------------------------
         * DATA MODELS (LocalStorage)
         * ------------------------------------------------------------------
         */

        class BaseModel {
            constructor(storageKey) {
                this.storageKey = storageKey;
                if (!localStorage.getItem(this.storageKey)) {
                    this.saveData([]);
                }
            }

            getData() {
                return JSON.parse(localStorage.getItem(this.storageKey) || '[]');
            }

            saveData(data) {
                localStorage.setItem(this.storageKey, JSON.stringify(data));
            }

            // IDataModel Implementation
            read_all() {
                return this.getData();
            }

            read(id) {
                return this.getData().find(item => item.id === id);
            }

            create(vals) {
                const data = this.getData();
                const newItem = { id: crypto.randomUUID(), ...vals };
                data.push(newItem);
                this.saveData(data);
                return newItem;
            }

            update(id, changed_vals) {
                const data = this.getData();
                const index = data.findIndex(item => item.id === id);
                if (index !== -1) {
                    data[index] = { ...data[index], ...changed_vals };
                    this.saveData(data);
                    return data[index];
                }
                return null;
            }

            delete(id) {
                const data = this.getData();
                const newData = data.filter(item => item.id !== id);
                this.saveData(newData);
            }
        }

        class AppointmentModel extends BaseModel {
            constructor() {
                super('gib21_appointments');
                // Seed data if empty for demo purposes
                if (this.read_all().length === 0) {
                    this.seed();
                }
            }

            seed() {
                const today = new Date().toISOString().split('T')[0];
                const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
                
                const seedData = [
                    { consultantId: 'c1', client: 'Max Mustermann', date: today, time: '10:00', type: 'Erstgespräch', status: 'Scheduled' },
                    { consultantId: 'c1', client: 'Maria Schmidt', date: today, time: '14:00', type: 'Folgetermin', status: 'Scheduled' },
                    { consultantId: 'c1', client: 'Lukas Meyer', date: tomorrow, time: '09:00', type: 'Runder Tisch', status: 'Scheduled' },
                    { consultantId: 'c1', client: 'Sarah Connor', date: tomorrow, time: '11:00', type: 'Info-Gespräch', status: 'Scheduled' },
                    { consultantId: 'c2', client: 'John Doe', date: today, time: '13:00', type: 'Erstgespräch', status: 'Scheduled' }
                ];
                seedData.forEach(d => this.create(d));
            }
            
            // Helper to find by range and consultant
            findByRange(consultantId, startDate, endDate) {
                return this.read_all().filter(appt => {
                    return appt.consultantId === consultantId && 
                           appt.date >= startDate && 
                           appt.date <= endDate;
                });
            }
        }

        class ConsultantModel extends BaseModel {
            constructor() {
                super('gib21_consultants');
                if (this.read_all().length === 0) {
                    this.create({ id: 'c1', name: 'Dr. Julia Weber' });
                    this.create({ id: 'c2', name: 'Stefan Klein' });
                }
            }
        }

        // Initialize Models
        const appointmentsDB = new AppointmentModel();
        const consultantsDB = new ConsultantModel();

        /**
         * ------------------------------------------------------------------
         * COMPONENTS
         * ------------------------------------------------------------------
         */

        class TriggerComponent {
            constructor(onSubmit) {
                this.onSubmit = onSubmit;
            }

            get_comp() {
                const consultants = consultantsDB.read_all();
                const options = consultants.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                const today = new Date().toISOString().split('T')[0];

                const html = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 fade-in">
                        <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-bolt text-yellow-500"></i> Start Workflow
                        </h2>
                        <form id="workflow-form" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Consultant (Beraterin)</label>
                                <select id="consultant-select" class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                                    ${options}
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">From</label>
                                    <input type="date" id="date-from" value="${today}" class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">To</label>
                                    <input type="date" id="date-to" value="${today}" class="w-full rounded-lg border-gray-300 border p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors flex justify-center items-center gap-2">
                                <span>Find Affected Appointments</span>
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </form>
                    </div>
                `;
                
                // We return a string here, but in a real app we might return a DOM element with listeners attached.
                // For this single file prototype, we'll attach listeners after injection.
                return html;
            }
        }

        class StatsComponent {
            get_comp() {
                const all = appointmentsDB.read_all();
                const open = all.filter(a => a.status === 'Scheduled').length;
                const rebooked = all.filter(a => a.status === 'Rebooked').length;
                const mailed = all.filter(a => a.status === 'Mail Sent').length;
                const escalated = all.filter(a => a.status === 'Escalated').length;

                return `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 fade-in">
                        <h2 class="text-lg font-semibold mb-4 text-gray-900">Dashboard Stats</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-3 bg-blue-50 rounded-lg">
                                <div class="text-2xl font-bold text-blue-700">${open}</div>
                                <div class="text-xs text-blue-600 font-medium">Open</div>
                            </div>
                            <div class="p-3 bg-green-50 rounded-lg">
                                <div class="text-2xl font-bold text-green-700">${rebooked}</div>
                                <div class="text-xs text-green-600 font-medium">Rebooked</div>
                            </div>
                            <div class="p-3 bg-purple-50 rounded-lg">
                                <div class="text-2xl font-bold text-purple-700">${mailed}</div>
                                <div class="text-xs text-purple-600 font-medium">Processed</div>
                            </div>
                            <div class="p-3 bg-red-50 rounded-lg">
                                <div class="text-2xl font-bold text-red-700">${escalated}</div>
                                <div class="text-xs text-red-600 font-medium">Escalated</div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        class AppointmentListComponent {
            constructor(appointments, onAction) {
                this.appointments = appointments;
                this.onAction = onAction;
            }

            get_comp() {
                if (!this.appointments || this.appointments.length === 0) {
                    return `
                        <div class="bg-white p-12 rounded-xl shadow-sm border border-gray-200 text-center fade-in">
                            <div class="text-gray-300 mb-4 text-6xl"><i class="fa-regular fa-calendar-check"></i></div>
                            <h3 class="text-lg font-medium text-gray-900">No Appointments Found</h3>
                            <p class="text-gray-500">Select a consultant and date range to view affected items.</p>
                        </div>
                    `;
                }

                const rows = this.appointments.map(appt => {
                    let statusColor = 'bg-gray-100 text-gray-800';
                    if(appt.status === 'Rebooked') statusColor = 'bg-green-100 text-green-800';
                    if(appt.status === 'Mail Sent') statusColor = 'bg-purple-100 text-purple-800';
                    if(appt.status === 'Escalated') statusColor = 'bg-red-100 text-red-800';

                    // Logic for available actions based on status
                    let actions = '';
                    if (appt.status === 'Scheduled') {
                        actions = `
                            <div class="flex gap-2">
                                <button onclick="app.handleAction('${appt.id}', 'rebook')" class="bg-green-600 hover:bg-green-700 text-white text-xs px-3 py-1.5 rounded transition shadow-sm">
                                    Manual Rebook
                                </button>
                                <button onclick="app.handleAction('${appt.id}', 'auto')" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs px-3 py-1.5 rounded transition shadow-sm">
                                    Auto Process
                                </button>
                            </div>
                        `;
                    } else {
                        actions = `<span class="text-xs text-gray-400 italic">No actions available</span>`;
                    }

                    return `
                        <tr class="hover:bg-gray-50 transition-colors border-b border-gray-100 last:border-0">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm font-medium text-gray-900">${appt.date}</div>
                                <div class="text-xs text-gray-500">${appt.time}</div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm text-gray-900 font-medium">${appt.client}</div>
                                <div class="text-xs text-blue-600 bg-blue-50 inline-block px-1.5 py-0.5 rounded mt-0.5">${appt.type}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColor}">
                                    ${appt.status}
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                ${actions}
                            </td>
                        </tr>
                    `;
                }).join('');

                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden fade-in">
                        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                            <h3 class="text-lg font-semibold text-gray-800">Affected Appointments</h3>
                            <span class="bg-gray-200 text-gray-700 text-xs px-2 py-1 rounded-full">${this.appointments.length} items</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date/Time</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Client / Type</th>
                                        <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                        <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    ${rows}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
        }

        /**
         * ------------------------------------------------------------------
         * MAIN APP CONTROLLER
         * ------------------------------------------------------------------
         */
        
        class App {
            constructor() {
                this.currentList = [];
                this.renderTrigger();
                this.renderStats();
                this.renderList([]);
            }

            resetData() {
                localStorage.clear();
                location.reload();
            }

            // Render Methods
            renderTrigger() {
                const comp = new TriggerComponent();
                document.getElementById('trigger-container').innerHTML = comp.get_comp();
                
                // Attach Event Listener
                document.getElementById('workflow-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleSearch();
                });
            }

            renderStats() {
                const comp = new StatsComponent();
                document.getElementById('stats-container').innerHTML = comp.get_comp();
            }

            renderList(data) {
                const comp = new AppointmentListComponent(data);
                document.getElementById('workflow-container').innerHTML = comp.get_comp();
            }

            // Logic Methods
            handleSearch() {
                const consultantId = document.getElementById('consultant-select').value;
                const dateFrom = document.getElementById('date-from').value;
                const dateTo = document.getElementById('date-to').value;

                this.currentList = appointmentsDB.findByRange(consultantId, dateFrom, dateTo);
                this.renderList(this.currentList);
            }

            handleAction(id, actionType) {
                const appt = appointmentsDB.read(id);
                if (!appt) return;

                if (actionType === 'rebook') {
                    // Manual Rebooking Logic
                    appointmentsDB.update(id, { status: 'Rebooked' });
                    alert(`✅ Appointment for ${appt.client} manually rebooked to a colleague.`);
                } 
                else if (actionType === 'auto') {
                    // Automatic Workflow Logic (Paths A-D from PDF)
                    let msg = "";
                    let newStatus = "";

                    if (appt.type === 'Erstgespräch') {
                        // Path B
                        newStatus = 'Mail Sent';
                        msg = `🤖 Path B: Cancelled in Cal.com -> Sent Standard Mail with Round-Robin Link.`;
                    } else if (appt.type === 'Info-Gespräch') {
                        // Path C
                        newStatus = 'Mail Sent';
                        msg = `🤖 Path C: Auto-cancelled -> Sent "Call Required" Mail.`;
                    } else if (appt.type === 'Runder Tisch') {
                        // Path D
                        newStatus = 'Escalated';
                        msg = `⚠️ Path D: Manual coordination required (Round Table). Escalated to dashboard.`;
                    } else {
                        // Path A (Default/Folgetermin)
                        newStatus = 'Mail Sent';
                        msg = `🤖 Path A: Cancelled -> Sent Standard Mail with Booking Link.`;
                    }

                    appointmentsDB.update(id, { status: newStatus });
                    alert(msg);
                }

                // Refresh UI
                this.renderStats();
                this.handleSearch(); // Refresh list to show new status
            }
        }

        // Initialize App
        const app = new App();

    </script>
</body>
</html>
