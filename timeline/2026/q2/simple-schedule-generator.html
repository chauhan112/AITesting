<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule & Markdown Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen p-6">

    <div class="max-w-5xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center">
            <h1 class="text-3xl font-bold text-gray-900">Task Schedule Generator</h1>
            <p class="text-gray-500 mt-2">Generate time blocks, write your tasks, and convert to a Markdown table.</p>
        </header>

        <!-- Step 1: Generator Parameters -->
        <section class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2 text-blue-600">Step 1: Create Time Skeleton</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Start Hour</label>
                    <input type="number" id="startHour" value="8" min="0" max="23" class="w-full border border-gray-300 px-3 py-2 rounded focus:ring focus:ring-blue-200 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Start Minute</label>
                    <input type="number" id="startMin" value="0" min="0" max="59" class="w-full border border-gray-300 px-3 py-2 rounded focus:ring focus:ring-blue-200 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Interval (minutes)</label>
                    <input type="number" id="timeDiff" value="30" min="1" class="w-full border border-gray-300 px-3 py-2 rounded focus:ring focus:ring-blue-200 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">End Hour</label>
                    <input type="number" id="endHour" value="17" min="0" max="48" class="w-full border border-gray-300 px-3 py-2 rounded focus:ring focus:ring-blue-200 focus:outline-none">
                </div>
            </div>

            <button onclick="generateSkeleton()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded transition">
                Generate Skeleton
            </button>
        </section>

        <!-- Step 2: Skeleton Editor -->
        <section class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
            <h2 class="text-xl font-semibold mb-2 border-b pb-2 text-indigo-600">Step 2: Fill in your Tasks</h2>
            <p class="text-sm text-gray-500 mb-4">Add your task descriptions after the <code class="bg-gray-100 px-1 rounded">:-</code> separator.</p>
            
            <textarea id="skeletonText" rows="10" placeholder="08:00 - 08:30 :- Check emails..." class="w-full border border-gray-300 p-3 rounded font-mono text-sm focus:ring focus:ring-indigo-200 focus:outline-none mb-4"></textarea>

            <button onclick="generateTable()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded transition">
                Generate Markdown & Table
            </button>
        </section>

        <!-- Step 3: Outputs -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Raw Markdown -->
            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-semibold text-green-600">Raw Markdown</h2>
                    <button onclick="copyMarkdown()" class="text-sm bg-gray-200 hover:bg-gray-300 text-gray-800 py-1 px-3 rounded transition">Copy</button>
                </div>
                <textarea id="markdownOutput" rows="12" readonly class="w-full border border-gray-300 p-3 rounded font-mono text-sm bg-gray-50 focus:outline-none"></textarea>
            </div>

            <!-- Rendered Table Viewer -->
            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 overflow-x-auto">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2 text-purple-600">Table Viewer</h2>
                <div id="tableViewer" class="text-sm">
                    <p class="text-gray-400 italic">Rendered table will appear here...</p>
                </div>
            </div>
        </section>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Helper function mapping to your Python fill_time()
        function fillTime(val) {
            return String(val).padStart(2, '0');
        }

        function generateSkeleton() {
            let startHour = parseInt(document.getElementById('startHour').value) || 0;
            let startMin = parseInt(document.getElementById('startMin').value) || 0;
            let timeDiff = parseInt(document.getElementById('timeDiff').value) || 30;
            let endHour = parseInt(document.getElementById('endHour').value) || 24;

            let output =[];
            let loops = 0; // Failsafe to prevent infinite loops

            while (loops < 100) {
                // Formatting current start time
                let startStr = `${fillTime(startHour)}:${fillTime(startMin)}`;
                
                // Calculating next time
                let nextMin = startMin + timeDiff;
                let nextHour = startHour + Math.floor(nextMin / 60);
                nextMin = nextMin % 60;
                
                // Formatting current end time
                let endStr = `${fillTime(nextHour)}:${fillTime(nextMin)}`;

                output.push(`${startStr} - ${endStr} :- `);

                // Update start variables for next iteration
                startHour = nextHour;
                startMin = nextMin;

                // Python logic equivalent: break if start_time > end_time
                if (startHour > endHour || (startHour === endHour && startMin > 0)) {
                    break;
                }
                loops++;
            }

            document.getElementById('skeletonText').value = output.join('\n');
            
            // Clear outputs
            document.getElementById('markdownOutput').value = '';
            document.getElementById('tableViewer').innerHTML = '<p class="text-gray-400 italic">Rendered table will appear here...</p>';
        }

        function generateTable() {
            let content = document.getElementById('skeletonText').value.trim();
            if (!content) {
                alert("Please generate or enter a schedule skeleton first.");
                return;
            }

            let lines = content.split('\n');
            
            // Markdown logic (Mapping to Python make_a_table)
            let rawTable =[
                "| time | task | status |",
                "| ------ | ------ | ------ |"
            ];

            // HTML Logic for visual viewer
            let htmlTable = `
                <table class="w-full text-left border-collapse border border-gray-300">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="border border-gray-300 px-4 py-2 font-semibold">Time</th>
                            <th class="border border-gray-300 px-4 py-2 font-semibold">Task</th>
                            <th class="border border-gray-300 px-4 py-2 font-semibold">Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            lines.forEach(line => {
                if (!line.includes(':-')) return; // skip invalid lines
                
                let parts = line.split(':-');
                let time = parts[0].trim();
                // Re-join remaining parts in case the user typed ':-' inside their task description
                let task = parts.slice(1).join(':-').trim(); 

                // Add to raw markdown array
                rawTable.push(`| ${time} | ${task} | not-done |`);

                // Add to html table string
                htmlTable += `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="border border-gray-300 px-4 py-2 whitespace-nowrap">${time}</td>
                        <td class="border border-gray-300 px-4 py-2">${task || '<span class="text-gray-400 italic">No task</span>'}</td>
                        <td class="border border-gray-300 px-4 py-2">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-red-100 text-red-800">
                                not-done
                            </span>
                        </td>
                    </tr>
                `;
            });

            htmlTable += `</tbody></table>`;

            // Display results
            document.getElementById('markdownOutput').value = rawTable.join('\n');
            document.getElementById('tableViewer').innerHTML = htmlTable;
        }

        function copyMarkdown() {
            let mdText = document.getElementById('markdownOutput');
            if(mdText.value === "") return;
            
            mdText.select();
            document.execCommand('copy');
            alert('Markdown copied to clipboard!');
        }

        // Initialize empty skeleton on page load based on default values
        window.onload = generateSkeleton;
    </script>
</body>
</html>
