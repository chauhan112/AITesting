<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berater Scheduling PoC</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-xl shadow-md p-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Consulting Calendar PoC</h1>

        <!-- Simulation Controls -->
        <div class="bg-blue-50 border border-blue-200 p-6 rounded-lg mb-8">
            <h2 class="text-xl font-semibold text-blue-800 mb-4">1. Simulator Settings</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div>
                    <label class="block text-sm text-gray-600">Start Date</label>
                    <input type="date" id="simStartDate" value="2026-03-01" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm text-gray-600">End Date</label>
                    <input type="date" id="simEndDate" value="2026-03-17" class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm text-gray-600">Appt. Count</label>
                    <input type="number" id="simCount" value="50" class="w-full border p-2 rounded">
                </div>
                <div class="flex items-end">
                    <button id="runSimulationBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow w-full">
                        Run Simulation
                    </button>
                </div>
            </div>
            <p id="simStatus" class="text-sm text-green-600 font-semibold hidden">Simulation successful! Data generated.</p>
        </div>

        <!-- Dashboard -->
        <div class="bg-gray-50 border border-gray-200 p-6 rounded-lg hidden" id="dashboard">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">2. Check Availability</h2>
            
            <div class="flex gap-4 mb-6">
                <div class="w-1/2">
                    <label class="block text-sm text-gray-600">Select Berater</label>
                    <select id="beraterSelect" class="w-full border p-2 rounded"></select>
                </div>
                <div class="w-1/2">
                    <label class="block text-sm text-gray-600">Select Date</label>
                    <input type="date" id="checkDate" class="w-full border p-2 rounded">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Booked Appointments -->
                <div>
                    <h3 class="font-bold text-gray-700 border-b pb-2 mb-4">Booked Appointments (Local Time)</h3>
                    <ul id="bookedList" class="space-y-3"></ul>
                </div>
                
                <!-- Free Slots -->
                <div>
                    <h3 class="font-bold text-green-700 border-b border-green-200 pb-2 mb-4">Free Slots (Local Time)</h3>
                    <ul id="freeSlotsList" class="space-y-3"></ul>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // ==========================================
        // 1. INFRASTRUCTURE & ADAPTERS
        // ==========================================

        class LocalStorageAdapter {
            set_value(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
            get_value(key) { return JSON.parse(localStorage.getItem(key)); }
            remove_value(key) { localStorage.removeItem(key); }
            clear_all(prefix) {
                Object.keys(localStorage).forEach(k => {
                    if (k.startsWith(prefix)) localStorage.removeItem(k);
                });
            }
        }

        class GermanTime {
            // Returns Local Time string "HH:MM"
            toLocalTime(utcString) {
                const d = new Date(utcString);
                return d.toLocaleTimeString('de-DE', { timeZone: 'Europe/Berlin', hour: '2-digit', minute: '2-digit' });
            }

            // Returns Local Date string "YYYY-MM-DD"
            toLocalDate(utcString) {
                const d = new Date(utcString);
                const parts = new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Berlin', year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(d);
                return `${parts.find(p=>p.type==='year').value}-${parts.find(p=>p.type==='month').value}-${parts.find(p=>p.type==='day').value}`;
            }

            // Simple convertion to UTC ISO string (Assumes browser executes in local standard)
            toUTC(localDate, localTime) {
                return new Date(`${localDate}T${localTime}:00`).toISOString();
            }

            addMinutes(localTime, minutes) {
                let [h, m] = localTime.split(':').map(Number);
                m += minutes;
                h += Math.floor(m / 60);
                m = m % 60;
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            }

            diffMinutes(startTime, endTime) {
                let [h1, m1] = startTime.split(':').map(Number);
                let [h2, m2] = endTime.split(':').map(Number);
                return (h2 * 60 + m2) - (h1 * 60 + m1);
            }

            compare(time1, time2) {
                return time1.localeCompare(time2);
            }
        }

        // ==========================================
        // 2. DOMAIN LOGIC
        // ==========================================

        class GenericCalender {
            constructor() {
                this.start = "08:00";
                this.end = "17:00";
            }
            set_person(beraterId) { this.beraterId = beraterId; }
            set_storage(storage) { this.storage = storage; }
            set_datetime_adapter(adapter) { this.timeAdapter = adapter; }
            set_available_time(start, end) { this.start = start; this.end = end; }
            
            get_appointments() {
                const key = `calendar_berater_${this.beraterId}`;
                return this.storage.get_value(key) ||[];
            }

            get_free_slots(on_date) {
                const all_apts = this.get_appointments();
                
                // Filter for this specific local date
                let day_apts = all_apts.filter(a => this.timeAdapter.toLocalDate(a.start) === on_date);
                
                // Sort chronologically
                day_apts.sort((a, b) => this.timeAdapter.toLocalTime(a.start).localeCompare(this.timeAdapter.toLocalTime(b.start)));

                let freeSlots =[];
                let current_time = this.start;

                for (let apt of day_apts) {
                    let apt_start = this.timeAdapter.toLocalTime(apt.start);
                    let apt_end = this.timeAdapter.addMinutes(apt_start, apt.duration);
                    
                    // Gap before this appointment
                    if (this.timeAdapter.compare(current_time, apt_start) < 0) {
                        freeSlots.push({ start: current_time, end: apt_start });
                    }
                    // Move the cursor forward
                    if (this.timeAdapter.compare(current_time, apt_end) < 0) {
                        current_time = apt_end;
                    }
                }
                
                // Gap after the last appointment until end of day
                if (this.timeAdapter.compare(current_time, this.end) < 0) {
                    freeSlots.push({ start: current_time, end: this.end });
                }

                return freeSlots;
            }

            add_appointment(apt) {
                const key = `calendar_berater_${this.beraterId}`;
                let apts = this.storage.get_value(key) ||[];
                apts.push(apt);
                this.storage.set_value(key, apts);
            }
        }

        // ==========================================
        // 3. SIMULATOR
        // ==========================================

        class SimulateAppointmentsCreation {
            constructor(storage, timeAdapter) {
                this.storage = storage;
                this.timeAdapter = timeAdapter;
                this.clients = [];
                this.beraters =[];
                this.apptTypes =["Erstgespräch", "Folgetermin", "Abschluss", "Info-Gespr.", "Runder Tisch"];
                this.durations =[15, 30, 45, 60, 90, 120];
                
                this.firstNames =["Lukas", "Julia", "Maximilian", "Sarah", "Felix", "Lena", "Tim", "Laura"];
                this.lastNames =["Müller", "Schmidt", "Schneider", "Fischer", "Weber", "Meyer", "Wagner", "Becker"];
            }

            set_date_range(start_date, end_date) {
                this.simStartDate = new Date(start_date);
                this.simEndDate = new Date(end_date);
            }

            getRandomDateString() {
                const start = this.simStartDate.getTime();
                const end = this.simEndDate.getTime();
                const randDate = new Date(start + Math.random() * (end - start));
                return randDate.toISOString().split('T')[0]; // simple YYYY-MM-DD
            }

            getRandomName() {
                const f = this.firstNames[Math.floor(Math.random() * this.firstNames.length)];
                const l = this.lastNames[Math.floor(Math.random() * this.lastNames.length)];
                return { vorname: f, nachname: l };
            }

            initialize(client_count, berater_count) {
                this.storage.clear_all('calendar_berater_'); // reset previous sim data

                for (let i = 1; i <= client_count; i++) {
                    const name = this.getRandomName();
                    this.clients.push({ id: i, ...name, email: `${name.vorname}.${name.nachname}@client.example.com`.toLowerCase() });
                }

                for (let i = 1; i <= berater_count; i++) {
                    const name = this.getRandomName();
                    
                    let cal = new GenericCalender();
                    cal.set_person(i);
                    cal.set_storage(this.storage);
                    cal.set_datetime_adapter(this.timeAdapter);

                    this.beraters.push({ id: i, ...name, email: `${name.vorname}.${name.nachname}@berater.example.com`.toLowerCase(), cal: cal });
                }
            }

            generate_appointments(count) {
                let generated = 0;
                let attempts = 0;

                while (generated < count && attempts < count * 5) { // Prevent infinite loops
                    attempts++;
                    
                    const berater = this.beraters[Math.floor(Math.random() * this.beraters.length)];
                    const client = this.clients[Math.floor(Math.random() * this.clients.length)];
                    const dateStr = this.getRandomDateString();
                    const duration = this.durations[Math.floor(Math.random() * this.durations.length)];
                    
                    // Call the free slots logic
                    const freeSlots = berater.cal.get_free_slots(dateStr);
                    
                    // Find a slot big enough for the duration
                    const validSlot = freeSlots.find(slot => this.timeAdapter.diffMinutes(slot.start, slot.end) >= duration);

                    if (validSlot) {
                        const startUTC = this.timeAdapter.toUTC(dateStr, validSlot.start);
                        
                        const apt = {
                            id: crypto.randomUUID(),
                            clientId: client.id,
                            beraterId: berater.id,
                            title: `${this.apptTypes[Math.floor(Math.random() * this.apptTypes.length)]} - ${client.nachname}`,
                            description: "Autogenerated Appointment",
                            start: startUTC,
                            duration: duration,
                            type: this.apptTypes[Math.floor(Math.random() * this.apptTypes.length)],
                            moreInfo: {}
                        };
                        
                        berater.cal.add_appointment(apt);
                        generated++;
                    }
                }
                return this.beraters; // Return updated state
            }
        }

        // ==========================================
        // 4. UI LOGIC (Wiring it together)
        // ==========================================
        const storage = new LocalStorageAdapter();
        const timeAdapter = new GermanTime();
        let sim = null;

        document.getElementById('runSimulationBtn').addEventListener('click', () => {
            const startDate = document.getElementById('simStartDate').value;
            const endDate = document.getElementById('simEndDate').value;
            const count = parseInt(document.getElementById('simCount').value);

            sim = new SimulateAppointmentsCreation(storage, timeAdapter);
            sim.set_date_range(startDate, endDate);
            sim.initialize(10, 3); // 10 Clients, 3 Beraters
            
            const finalBeraters = sim.generate_appointments(count);

            // Populate UI Dropdown
            const select = document.getElementById('beraterSelect');
            select.innerHTML = "";
            finalBeraters.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                opt.textContent = `${b.vorname} ${b.nachname}`;
                select.appendChild(opt);
            });

            // Make checkDate default to a random day within range
            document.getElementById('checkDate').value = startDate;
            document.getElementById('checkDate').min = startDate;
            document.getElementById('checkDate').max = endDate;

            // Show UI
            document.getElementById('simStatus').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            updateDashboard();
        });

        // Event listeners for Dashboard interaction
        document.getElementById('beraterSelect').addEventListener('change', updateDashboard);
        document.getElementById('checkDate').addEventListener('change', updateDashboard);

        function updateDashboard() {
            if(!sim) return;

            const bId = parseInt(document.getElementById('beraterSelect').value);
            const dateStr = document.getElementById('checkDate').value;

            const berater = sim.beraters.find(b => b.id === bId);
            if(!berater) return;

            // Render Booked Appointments
            const bookedList = document.getElementById('bookedList');
            bookedList.innerHTML = '';
            
            let allApts = berater.cal.get_appointments().filter(a => timeAdapter.toLocalDate(a.start) === dateStr);
            allApts.sort((a,b) => timeAdapter.toLocalTime(a.start).localeCompare(timeAdapter.toLocalTime(b.start)));

            if(allApts.length === 0) bookedList.innerHTML = '<li class="text-gray-500 italic">No appointments on this day.</li>';
            
            allApts.forEach(apt => {
                const startLocal = timeAdapter.toLocalTime(apt.start);
                const endLocal = timeAdapter.addMinutes(startLocal, apt.duration);
                bookedList.innerHTML += `
                    <li class="bg-white border rounded p-3 shadow-sm border-l-4 border-l-blue-500 text-sm">
                        <strong class="text-blue-700">${startLocal} - ${endLocal}</strong><br>
                        ${apt.title} <br>
                        <span class="text-gray-400 text-xs">${apt.type} • ${apt.duration} mins</span>
                    </li>`;
            });

            // Render Free Slots
            const freeSlotsList = document.getElementById('freeSlotsList');
            freeSlotsList.innerHTML = '';
            
            const freeSlots = berater.cal.get_free_slots(dateStr);
            if(freeSlots.length === 0) freeSlotsList.innerHTML = '<li class="text-red-500 italic">No free slots left.</li>';

            freeSlots.forEach(slot => {
                freeSlotsList.innerHTML += `
                    <li class="bg-green-50 border border-green-200 rounded p-3 text-sm text-green-800 flex justify-between items-center shadow-sm">
                        <span>Available: <strong>${slot.start} to ${slot.end}</strong></span>
                        <span class="text-xs bg-green-200 px-2 py-1 rounded text-green-900">${timeAdapter.diffMinutes(slot.start, slot.end)} min available</span>
                    </li>`;
            });
        }
    </script>
</body>
</html>
