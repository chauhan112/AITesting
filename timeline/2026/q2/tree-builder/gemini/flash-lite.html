<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tree Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex bg-gray-100 overflow-hidden font-sans">

    <!-- Left Navigation: Tree Structure -->
    <aside class="w-64 bg-white border-r flex flex-col">
        <div class="p-4 border-b font-bold text-gray-700">Structure</div>
        <div id="tree-container" class="p-4 overflow-y-auto flex-1"></div>
    </aside>

    <!-- Body: Canvas -->
    <main class="flex-1 p-6 flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold">Canvas</h1>
            <button onclick="addNewNode()" class="bg-green-600 text-white px-4 py-2 rounded text-sm hover:bg-green-700">+ Add Root Node</button>
        </div>
        <div id="canvas" class="flex-1 border-2 border-dashed border-gray-300 rounded-lg bg-white p-6 overflow-auto">
            <!-- Nodes will be rendered here -->
        </div>
    </main>

    <!-- Right Navigation: Properties -->
    <aside class="w-80 bg-white border-l p-4 flex flex-col">
        <h2 class="font-bold mb-4 border-b pb-2">Properties</h2>
        <div id="prop-editor" class="flex-1">
            <p class="text-gray-400 text-sm">Select a node to edit properties.</p>
        </div>
        <button id="export-btn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 mt-4">Export JSON</button>
    </aside>

    <script>
        // --- Model Classes ---
        class Node {
            constructor(name) {
                this.id = Date.now().toString();
                this.name = name;
                this.properties = [];
                this.children = [];
            }
            add_new_prop(prop) { this.properties.push(prop); }
            remove_prop(key) { this.properties = this.properties.filter(p => p.key !== key); }
            is_leaf() { return this.children.length === 0; }
            get_props() { return this.properties; }
            
            toJSON() {
                return {
                    name: this.name,
                    properties: this.properties,
                    children: this.children.map(c => c.toJSON())
                };
            }
        }

        let treeData = [];
        let selectedNode = null;

        // --- UI Logic ---
        function renderTree() {
            const container = document.getElementById('tree-container');
            container.innerHTML = '';
            treeData.forEach(node => container.appendChild(createNodeElement(node)));
        }

        function createNodeElement(node) {
            const div = document.createElement('div');
            div.className = "mb-2 p-2 bg-gray-50 rounded border cursor-pointer hover:border-blue-300";
            div.innerHTML = `<div class="font-medium">${node.name}</div>`;
            div.onclick = (e) => { e.stopPropagation(); selectNode(node); };
            
            node.children.forEach(child => {
                const childEl = createNodeElement(child);
                childEl.classList.add("ml-4");
                div.appendChild(childEl);
            });
            return div;
        }

        function selectNode(node) {
            selectedNode = node;
            const editor = document.getElementById('prop-editor');
            editor.innerHTML = `
                <div class="mb-4"><strong>Node:</strong> ${node.name}</div>
                <div class="space-y-2">
                    ${node.properties.map(p => `
                        <div class="flex justify-between bg-gray-100 p-2 rounded text-sm">
                            <span>${p.key}: ${p.value}</span>
                            <button onclick="removeProp('${p.key}')" class="text-red-500">x</button>
                        </div>
                    `).join('')}
                </div>
                <div class="mt-4 flex gap-2">
                    <input id="new-key" placeholder="Key" class="border p-1 w-1/2 text-sm">
                    <input id="new-val" placeholder="Value" class="border p-1 w-1/2 text-sm">
                    <button onclick="addProp()" class="bg-blue-500 text-white px-2 py-1 text-sm rounded">+</button>
                </div>
                <button onclick="addChildNode()" class="mt-4 w-full bg-gray-800 text-white py-1 rounded text-sm">Add Child</button>
            `;
        }

        function addProp() {
            const key = document.getElementById('new-key').value;
            const val = document.getElementById('new-val').value;
            if(key && selectedNode) {
                selectedNode.add_new_prop({ key, value: val, order: selectedNode.properties.length });
                selectNode(selectedNode);
                renderTree();
            }
        }

        function removeProp(key) {
            selectedNode.remove_prop(key);
            selectNode(selectedNode);
        }

        function addNewNode() {
            const name = prompt("Node Name:");
            if(name) {
                treeData.push(new Node(name));
                renderTree();
            }
        }

        function addChildNode() {
            const name = prompt("Child Node Name:");
            if(name && selectedNode) {
                selectedNode.children.push(new Node(name));
                selectNode(selectedNode);
                renderTree();
            }
        }

        document.getElementById('export-btn').onclick = () => {
            const json = JSON.stringify(treeData.map(n => n.toJSON()), null, 2);
            alert("Check console for JSON output");
            console.log(json);
        };
    </script>
</body>
</html>
