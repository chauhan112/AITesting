<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TreeForge — Visual Tree Builder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/uuid/8.3.2/uuid.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg-base: #0a0b0f;
    --bg-panel: #111318;
    --bg-card: #181c24;
    --bg-hover: #1e2330;
    --bg-active: #232940;
    --border: #252a38;
    --border-bright: #323a52;
    --accent: #6366f1;
    --accent-dim: #3d3f7a;
    --accent-glow: rgba(99,102,241,0.18);
    --accent2: #22d3ee;
    --accent2-dim: rgba(34,211,238,0.12);
    --text-primary: #e8eaf6;
    --text-secondary: #8b90a8;
    --text-muted: #4a5068;
    --danger: #f43f5e;
    --danger-dim: rgba(244,63,94,0.12);
    --success: #10b981;
    --warn: #f59e0b;
    --leaf-color: #a78bfa;
    --branch-color: #6366f1;
    --depth-colors: #6366f1, #22d3ee, #10b981, #f59e0b, #f43f5e, #a78bfa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg-base);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 4px; }

  /* ── TOPBAR ── */
  .topbar {
    height: 52px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .topbar-sep { width: 1px; height: 22px; background: var(--border); }

  .badge {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid var(--border-bright);
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* ── LAYOUT ── */
  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── LEFT NAV ── */
  .left-nav {
    width: 240px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .nav-section-header {
    padding: 12px 16px 8px;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tree-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .tree-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid transparent;
    transition: all 0.15s;
    margin-bottom: 2px;
    position: relative;
  }

  .tree-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .tree-item.active {
    background: var(--accent-glow);
    border-color: var(--accent-dim);
    color: var(--text-primary);
  }

  .tree-item .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .tree-item.active .dot { box-shadow: 0 0 6px var(--accent); }

  .tree-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .tree-item-delete {
    opacity: 0;
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px;
    color: var(--danger);
    font-size: 11px;
    transition: opacity 0.1s;
    cursor: pointer;
  }

  .tree-item:hover .tree-item-delete { opacity: 1; }

  .nav-actions {
    padding: 12px;
    border-top: 1px solid var(--border);
  }

  /* ── MAIN BODY ── */
  .body-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    background:
      radial-gradient(ellipse 60% 50% at 60% 30%, rgba(99,102,241,0.04) 0%, transparent 70%),
      var(--bg-base);
  }

  .body-toolbar {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-panel);
    flex-shrink: 0;
  }

  .depth-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-secondary);
  }

  .depth-btn {
    width: 24px; height: 24px;
    border: 1px solid var(--border-bright);
    background: var(--bg-card);
    color: var(--text-primary);
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .depth-btn:hover { border-color: var(--accent); background: var(--accent-glow); }

  .depth-value {
    min-width: 20px;
    text-align: center;
    font-size: 13px;
    color: var(--accent2);
    font-weight: 500;
  }

  .tree-canvas {
    flex: 1;
    overflow: auto;
    padding: 32px;
  }

  /* ── TREE NODES ── */
  .node-wrapper {
    position: relative;
  }

  .node-row {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
  }

  .node-indent {
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
  }

  .indent-line {
    width: 20px;
    position: relative;
    flex-shrink: 0;
  }

  .indent-line::before {
    content: '';
    position: absolute;
    left: 10px;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--border);
  }

  .indent-line.last::after {
    content: '';
    position: absolute;
    left: 10px;
    top: 50%;
    width: 10px;
    height: 1px;
    background: var(--border);
  }

  .node-card {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 7px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.14s;
    min-width: 0;
    margin: 2px 0;
    position: relative;
    user-select: none;
  }

  .node-card:hover {
    background: var(--bg-hover);
    border-color: var(--border);
  }

  .node-card.selected {
    background: var(--accent-glow);
    border-color: var(--accent-dim);
  }

  .node-card.drag-over {
    border-color: var(--accent2);
    background: var(--accent2-dim);
  }

  .node-card.dragging {
    opacity: 0.4;
  }

  .toggle-btn {
    width: 18px; height: 18px;
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    background: var(--bg-card);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
    cursor: pointer;
    transition: all 0.12s;
  }

  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

  .node-type-icon {
    width: 20px; height: 20px;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
  }

  .node-name {
    flex: 1;
    font-size: 13px;
    color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .node-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .prop-count {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--accent-glow);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    flex-shrink: 0;
  }

  .node-actions {
    display: none;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .node-card:hover .node-actions { display: flex; }
  .node-card.selected .node-actions { display: flex; }

  .node-action-btn {
    width: 22px; height: 22px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all 0.12s;
    color: var(--text-secondary);
  }

  .node-action-btn:hover {
    background: var(--bg-card);
    border-color: var(--border-bright);
    color: var(--text-primary);
  }

  .node-action-btn.danger:hover {
    background: var(--danger-dim);
    border-color: var(--danger);
    color: var(--danger);
  }

  .children-container {
    padding-left: 20px;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    width: 280px;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .right-panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .right-panel-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.3px;
    color: var(--text-primary);
  }

  .right-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .panel-section-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .field-label {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }

  input[type=text], input[type=number], textarea {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type=text]:focus, input[type=number]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }

  /* ── PROPERTIES ── */
  .prop-list { display: flex; flex-direction: column; gap: 6px; }

  .prop-row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: border-color 0.15s;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .prop-row:hover { border-color: var(--border-bright); }

  .prop-row-top {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .prop-order {
    font-size: 9px;
    color: var(--text-muted);
    width: 14px;
    text-align: right;
    flex-shrink: 0;
  }

  .prop-key-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--accent2);
    font-size: 11px;
    padding: 0;
    outline: none;
    font-family: 'DM Mono', monospace;
  }

  .prop-key-input:focus { color: var(--text-primary); }

  .prop-val-input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    font-size: 11px;
    padding: 0;
    outline: none;
    font-family: 'DM Mono', monospace;
  }

  .prop-val-input:focus { color: var(--text-primary); }

  .prop-delete-btn {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 11px;
    border-radius: 3px;
    flex-shrink: 0;
    transition: all 0.12s;
  }

  .prop-delete-btn:hover { color: var(--danger); background: var(--danger-dim); }

  .prop-separator {
    height: 1px;
    background: var(--border);
    margin: 2px 0;
  }

  /* ── BUTTONS ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: #7577f5; box-shadow: 0 0 0 3px var(--accent-glow); }

  .btn-secondary {
    background: transparent;
    border-color: var(--border-bright);
    color: var(--text-secondary);
  }

  .btn-secondary:hover { border-color: var(--accent); color: var(--text-primary); background: var(--accent-glow); }

  .btn-ghost {
    background: transparent;
    border-color: transparent;
    color: var(--text-muted);
    padding: 5px 10px;
  }

  .btn-ghost:hover { color: var(--text-primary); background: var(--bg-hover); border-color: var(--border); }

  .btn-danger {
    background: transparent;
    border-color: var(--border);
    color: var(--danger);
  }

  .btn-danger:hover { border-color: var(--danger); background: var(--danger-dim); }

  .btn-sm { padding: 4px 8px; font-size: 10px; }
  .btn-icon { padding: 5px 8px; }
  .btn-full { width: 100%; }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border-bright);
    border-radius: 12px;
    width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    animation: popIn 0.2s cubic-bezier(0.16,1,0.3,1);
    overflow: hidden;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.94) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    color: var(--text-muted);
  }

  .empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text-secondary);
  }

  .empty-sub { font-size: 12px; text-align: center; max-width: 220px; line-height: 1.6; }

  /* ── JSON PREVIEW ── */
  .json-preview {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 11px;
    line-height: 1.7;
    overflow: auto;
    max-height: 420px;
    white-space: pre;
    color: var(--text-secondary);
  }

  .json-key { color: var(--accent2); }
  .json-str { color: #a3e635; }
  .json-num { color: var(--warn); }
  .json-bool { color: var(--accent); }
  .json-null { color: var(--text-muted); }

  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--bg-panel);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text-primary);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    display: flex; align-items: center; gap: 8px;
    animation: toastIn 0.25s cubic-bezier(0.16,1,0.3,1);
    pointer-events: all;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .toast.success { border-color: var(--success); }
  .toast.success::before { content: '✓'; color: var(--success); }

  /* ── DRAG INDICATOR ── */
  .drop-line {
    height: 2px;
    background: var(--accent2);
    border-radius: 2px;
    margin: 1px 0;
    box-shadow: 0 0 8px var(--accent2);
    display: none;
  }

  .drop-line.visible { display: block; }

  /* ── DEPTH DOTS ── */
  .depth-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .depth-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border-bright);
    transition: background 0.15s;
  }

  .depth-dot.active { background: var(--accent); }

  /* ── NODE PATH ── */
  .node-path {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    padding: 4px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }

  .path-sep { color: var(--border-bright); }

  .no-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 8px; }
  .no-select-icon { font-size: 32px; opacity: 0.2; }
  .no-select-text { font-size: 12px; color: var(--text-muted); line-height: 1.6; max-width: 180px; }

  /* drag handle */
  .drag-handle {
    cursor: grab;
    color: var(--text-muted);
    font-size: 12px;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .node-card:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  /* node depth color stripe */
  .depth-stripe {
    width: 3px;
    border-radius: 2px;
    flex-shrink: 0;
    align-self: stretch;
  }

</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🌲</div>
    TreeForge
  </div>
  <div class="topbar-sep"></div>
  <span class="badge">v1.0</span>
  <span class="badge">in-memory</span>
  <div class="topbar-right">
    <button class="btn btn-secondary btn-sm" onclick="showExportModal()">⬇ Export JSON</button>
    <button class="btn btn-primary btn-sm" onclick="showNewTreeModal()">＋ New Tree</button>
  </div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- LEFT NAV -->
  <div class="left-nav">
    <div class="nav-section-header">
      Trees
      <span id="tree-count" style="color:var(--accent);font-size:10px;">0</span>
    </div>
    <div class="tree-list" id="tree-list"></div>
    <div class="nav-actions">
      <button class="btn btn-secondary btn-full" onclick="showNewTreeModal()">＋ New Tree</button>
    </div>
  </div>

  <!-- BODY -->
  <div class="body-area">
    <div class="body-toolbar">
      <div class="depth-control">
        <span>Depth visible</span>
        <button class="depth-btn" onclick="changeMaxDepth(-1)">−</button>
        <span class="depth-value" id="depth-display">3</span>
        <button class="depth-btn" onclick="changeMaxDepth(1)">＋</button>
        <div class="depth-indicator" id="depth-dots"></div>
      </div>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <span id="breadcrumb" style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;"></span>
      </div>
    </div>
    <div class="tree-canvas" id="tree-canvas">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🌲</div>
        <div class="empty-title">No tree selected</div>
        <div class="empty-sub">Create a new tree or select one from the left panel</div>
        <button class="btn btn-primary" onclick="showNewTreeModal()" style="margin-top:8px;">＋ Create First Tree</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="right-panel-header">
      <span class="right-panel-title" id="right-panel-title">Properties</span>
      <span id="node-leaf-badge" style="display:none;" class="badge" style="color:var(--leaf-color);">leaf</span>
    </div>
    <div class="right-panel-body" id="right-panel-body">
      <div class="no-select">
        <div class="no-select-icon">🎯</div>
        <div class="no-select-text">Select a node to view and edit its properties</div>
      </div>
    </div>
  </div>

</div>

<!-- MODALS -->
<div id="modal-backdrop" class="modal-backdrop" style="display:none;" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toast-container"></div>

<script>
// ══════════════════════════════════════════════════════
// DATA MODEL
// ══════════════════════════════════════════════════════

class PropertyItem {
  constructor(key, value, order) {
    this.key = key;
    this.value = value;
    this.order = order;
  }
}

class Node {
  constructor(name, id = null) {
    this.id = id || generateId();
    this.name = name;
    this.props = [];
    this.children = [];
    this.collapsed = false;
  }

  add_new_prop(prop) {
    this.props.push(prop);
  }

  remove_prop(key) {
    this.props = this.props.filter(p => p.key !== key);
  }

  is_leaf() {
    return this.children.length === 0;
  }

  get_props() {
    return [...this.props].sort((a, b) => a.order - b.order);
  }

  toJSON() {
    const obj = { name: this.name };
    if (this.props.length > 0) {
      obj.properties = {};
      for (const p of this.get_props()) {
        obj.properties[p.key] = p.value;
      }
    }
    if (this.children.length > 0) {
      obj.children = this.children.map(c => c.toJSON());
    }
    return obj;
  }
}

class Tree {
  constructor(name, id = null) {
    this.id = id || generateId();
    this.name = name;
    this.root = new Node(name + ' (root)');
    this.createdAt = new Date().toISOString();
  }

  get_all() {
    return this.root.toJSON();
  }
}

// InMemoryDataModel
class InMemoryDatamodel {
  constructor() {
    this._store = new Map();
  }

  async read_all() { return [...this._store.values()]; }
  async read(id) { return this._store.get(id) || null; }
  async deleteIt(id) { this._store.delete(id); }
  async update(id, vals) {
    const item = this._store.get(id);
    if (item) Object.assign(item, vals);
  }
  async create(vals) { this._store.set(vals.id, vals); return vals; }
}

// ══════════════════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════════════════

const db = new InMemoryDatamodel();
let trees = {};           // id -> Tree
let activeTreeId = null;
let selectedNodeId = null;
let maxDepth = 3;
let dragSourceId = null;
let dragOverId = null;

function generateId() {
  return 'n_' + Math.random().toString(36).substr(2, 9);
}

// ══════════════════════════════════════════════════════
// NODE FINDERS
// ══════════════════════════════════════════════════════

function findNode(root, id) {
  if (root.id === id) return root;
  for (const c of root.children) {
    const r = findNode(c, id);
    if (r) return r;
  }
  return null;
}

function findParent(root, id, parent = null) {
  if (root.id === id) return parent;
  for (const c of root.children) {
    const r = findParent(c, id, root);
    if (r !== undefined) return r;
  }
  return undefined;
}

function getNodeDepth(root, id, depth = 0) {
  if (root.id === id) return depth;
  for (const c of root.children) {
    const d = getNodeDepth(c, id, depth + 1);
    if (d !== -1) return d;
  }
  return -1;
}

function getNodePath(root, id, path = []) {
  if (root.id === id) return [...path, root.name];
  for (const c of root.children) {
    const r = getNodePath(c, id, [...path, root.name]);
    if (r) return r;
  }
  return null;
}

function moveNode(tree, sourceId, targetId) {
  const root = tree.root;
  // Prevent moving root
  if (sourceId === root.id || targetId === sourceId) return;

  // Find source node and remove from parent
  const sourceParent = findParent(root, sourceId, null);
  if (!sourceParent) return;
  const sourceNode = findNode(root, sourceId);
  if (!sourceNode) return;

  // Check not moving to own descendant
  if (findNode(sourceNode, targetId)) { toast('Cannot move to own child', 'warn'); return; }

  // Remove from parent
  sourceParent.children = sourceParent.children.filter(c => c.id !== sourceId);

  // Add to target
  const targetNode = findNode(root, targetId);
  if (!targetNode) return;
  targetNode.children.push(sourceNode);
}

// ══════════════════════════════════════════════════════
// LEFT NAV
// ══════════════════════════════════════════════════════

function renderTreeList() {
  const list = document.getElementById('tree-list');
  const ids = Object.keys(trees);
  document.getElementById('tree-count').textContent = ids.length;

  if (ids.length === 0) {
    list.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--text-muted);text-align:center;">No trees yet</div>';
    return;
  }

  list.innerHTML = ids.map(id => {
    const tree = trees[id];
    const isActive = id === activeTreeId;
    return `
      <div class="tree-item ${isActive ? 'active' : ''}" onclick="selectTree('${id}')">
        <div class="dot"></div>
        <span class="tree-item-name">${escHtml(tree.name)}</span>
        <div class="tree-item-delete" onclick="event.stopPropagation();deleteTree('${id}')">✕</div>
      </div>`;
  }).join('');
}

function selectTree(id) {
  activeTreeId = id;
  selectedNodeId = null;
  renderAll();
}

function deleteTree(id) {
  delete trees[id];
  if (activeTreeId === id) {
    activeTreeId = null;
    selectedNodeId = null;
  }
  renderAll();
  toast('Tree deleted');
}

// ══════════════════════════════════════════════════════
// TREE CANVAS
// ══════════════════════════════════════════════════════

const DEPTH_COLORS = ['#6366f1','#22d3ee','#10b981','#f59e0b','#f43f5e','#a78bfa'];

function renderCanvas() {
  const canvas = document.getElementById('tree-canvas');
  const empty = document.getElementById('empty-state');
  const bc = document.getElementById('breadcrumb');

  if (!activeTreeId || !trees[activeTreeId]) {
    canvas.innerHTML = '';
    canvas.appendChild(empty);
    empty.style.display = 'flex';
    bc.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  const tree = trees[activeTreeId];

  // Breadcrumb
  if (selectedNodeId) {
    const path = getNodePath(tree.root, selectedNodeId);
    if (path) {
      bc.innerHTML = path.map((p, i) =>
        `<span style="color:${i === path.length-1 ? 'var(--text-primary)' : 'var(--text-muted)'}">${escHtml(p)}</span>${i < path.length-1 ? '<span class="path-sep">/</span>' : ''}`
      ).join('');
    }
  } else {
    bc.innerHTML = `<span style="color:var(--text-secondary)">${escHtml(tree.name)}</span>`;
  }

  // Depth dots
  renderDepthDots();

  const wrap = document.createElement('div');
  wrap.innerHTML = renderNode(tree.root, 0, [], true);
  canvas.innerHTML = '';
  canvas.appendChild(wrap);

  setupDragHandlers();
}

function renderNode(node, depth, indentLines, isLast) {
  const hidden = depth > maxDepth;
  if (hidden) return '';

  const color = DEPTH_COLORS[depth % DEPTH_COLORS.length];
  const isSelected = node.id === selectedNodeId;
  const hasChildren = node.children.length > 0;
  const isCollapsed = node.collapsed;
  const isLeaf = node.is_leaf();
  const propCount = node.props.length;

  const indentHTML = indentLines.map((isParentLast, i) => {
    const isLastLine = i === indentLines.length - 1;
    return `<div class="indent-line${isLastLine ? ' last' : ''}"></div>`;
  }).join('');

  const toggleBtn = hasChildren
    ? `<div class="toggle-btn" onclick="toggleNode('${node.id}');event.stopPropagation();">${isCollapsed ? '▶' : '▼'}</div>`
    : `<div style="width:18px;flex-shrink:0;"></div>`;

  const propBadge = propCount > 0
    ? `<span class="prop-count">${propCount} prop${propCount > 1 ? 's' : ''}</span>`
    : '';

  const leafBadge = isLeaf
    ? `<span class="node-badge">leaf</span>`
    : `<span class="node-badge" style="color:var(--accent)">${node.children.length}</span>`;

  const html = `
    <div class="node-wrapper" data-node-id="${node.id}">
      <div class="drop-line" id="drop-before-${node.id}"></div>
      <div class="node-row">
        <div class="node-indent">${indentHTML}</div>
        ${toggleBtn}
        <div class="node-card ${isSelected ? 'selected' : ''}"
             data-id="${node.id}"
             draggable="true"
             onclick="selectNode('${node.id}');event.stopPropagation()">
          <div class="depth-stripe" style="background:${color};min-height:20px;"></div>
          <div class="drag-handle" title="Drag to move">⠿</div>
          <div class="node-type-icon" style="background:${color}22;color:${color};">
            ${isLeaf ? '◆' : '◈'}
          </div>
          <span class="node-name">${escHtml(node.name)}</span>
          ${propBadge}
          ${leafBadge}
          <div class="node-actions">
            <button class="node-action-btn" title="Add child" onclick="addChildNode('${node.id}');event.stopPropagation()">＋</button>
            <button class="node-action-btn" title="Rename" onclick="showRenameModal('${node.id}');event.stopPropagation()">✎</button>
            ${node.id !== trees[activeTreeId]?.root?.id ? `<button class="node-action-btn danger" title="Delete" onclick="deleteNode('${node.id}');event.stopPropagation()">✕</button>` : ''}
          </div>
        </div>
      </div>
      ${(!isCollapsed && hasChildren && depth < maxDepth) ? `
        <div class="children-container">
          ${node.children.map((child, i) =>
            renderNode(child, depth + 1, [...indentLines, isLast], i === node.children.length - 1)
          ).join('')}
        </div>
      ` : ''}
    </div>`;

  return html;
}

function setupDragHandlers() {
  const cards = document.querySelectorAll('.node-card[draggable]');
  cards.forEach(card => {
    const id = card.dataset.id;

    card.addEventListener('dragstart', e => {
      dragSourceId = id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    card.addEventListener('dragend', e => {
      card.classList.remove('dragging');
      document.querySelectorAll('.node-card.drag-over').forEach(el => el.classList.remove('drag-over'));
      dragSourceId = null;
    });

    card.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSourceId && dragSourceId !== id) {
        document.querySelectorAll('.node-card.drag-over').forEach(el => el.classList.remove('drag-over'));
        card.classList.add('drag-over');
        e.dataTransfer.dropEffect = 'move';
      }
    });

    card.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSourceId && dragSourceId !== id) {
        const tree = trees[activeTreeId];
        moveNode(tree, dragSourceId, id);
        renderCanvas();
        toast('Node moved successfully', 'success');
      }
    });
  });
}

function toggleNode(id) {
  const tree = trees[activeTreeId];
  const node = findNode(tree.root, id);
  if (node) {
    node.collapsed = !node.collapsed;
    renderCanvas();
  }
}

function selectNode(id) {
  selectedNodeId = id;
  renderCanvas();
  renderRightPanel();
}

function addChildNode(parentId) {
  const tree = trees[activeTreeId];
  const parent = findNode(tree.root, parentId);
  if (!parent) return;
  parent.collapsed = false;

  const name = `node_${generateId().slice(2,6)}`;
  const child = new Node(name);
  parent.children.push(child);
  selectedNodeId = child.id;
  renderCanvas();
  renderRightPanel();
  toast('Node added', 'success');
}

function deleteNode(id) {
  const tree = trees[activeTreeId];
  const parent = findParent(tree.root, id, null);
  if (!parent) return;
  parent.children = parent.children.filter(c => c.id !== id);
  if (selectedNodeId === id) selectedNodeId = null;
  renderCanvas();
  renderRightPanel();
  toast('Node deleted');
}

// ══════════════════════════════════════════════════════
// RIGHT PANEL
// ══════════════════════════════════════════════════════

function renderRightPanel() {
  const body = document.getElementById('right-panel-body');
  const title = document.getElementById('right-panel-title');
  const leafBadge = document.getElementById('node-leaf-badge');

  if (!selectedNodeId || !activeTreeId) {
    title.textContent = 'Properties';
    leafBadge.style.display = 'none';
    body.innerHTML = `
      <div class="no-select">
        <div class="no-select-icon">🎯</div>
        <div class="no-select-text">Select a node to view and edit its properties</div>
      </div>`;
    return;
  }

  const tree = trees[activeTreeId];
  const node = findNode(tree.root, selectedNodeId);
  if (!node) return;

  title.textContent = node.name;
  leafBadge.style.display = node.is_leaf() ? 'inline' : 'none';
  leafBadge.textContent = node.is_leaf() ? 'leaf' : 'branch';

  const props = node.get_props();

  body.innerHTML = `
    <div class="panel-section">
      <div class="panel-section-label">Node Info</div>
      <div class="field-row">
        <div class="field-label">name</div>
        <input type="text" value="${escHtml(node.name)}" id="node-name-input"
          oninput="updateNodeName('${node.id}', this.value)" />
      </div>
      <div class="field-row">
        <div class="field-label">id</div>
        <input type="text" value="${node.id}" readonly style="color:var(--text-muted);cursor:default;" />
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-label">
        Properties
        <button class="btn btn-ghost btn-sm" onclick="addProp('${node.id}')">＋ add</button>
      </div>
      <div class="prop-list" id="prop-list">
        ${props.length === 0
          ? `<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:12px;">No properties yet</div>`
          : props.map((p, i) => renderPropRow(node.id, p, i)).join('')
        }
      </div>
    </div>

    <div class="panel-section" style="margin-top:auto;padding-top:12px;border-top:1px solid var(--border);">
      <button class="btn btn-secondary btn-full" onclick="addChildNode('${node.id}')">＋ Add Child Node</button>
      ${node.id !== tree.root.id ? `<button class="btn btn-danger btn-full" onclick="deleteNode('${node.id}')">✕ Delete Node</button>` : ''}
    </div>
  `;
}

function renderPropRow(nodeId, prop, idx) {
  return `
    <div class="prop-row" data-prop-key="${prop.key}">
      <div class="prop-row-top">
        <span class="prop-order">${prop.order}</span>
        <input class="prop-key-input" type="text" value="${escHtml(prop.key)}" placeholder="key"
          onchange="updatePropKey('${nodeId}', '${prop.key}', this.value)" />
        <div class="prop-delete-btn" onclick="removeProp('${nodeId}', '${prop.key}')">✕</div>
      </div>
      <div class="prop-separator"></div>
      <input class="prop-val-input" type="text" value="${escHtml(String(prop.value))}" placeholder="value"
        onchange="updatePropValue('${nodeId}', '${prop.key}', this.value)" />
    </div>`;
}

function updateNodeName(id, name) {
  const tree = trees[activeTreeId];
  const node = findNode(tree.root, id);
  if (node) {
    node.name = name;
    renderCanvas();
    document.getElementById('right-panel-title').textContent = name;
  }
}

function addProp(nodeId) {
  const tree = trees[activeTreeId];
  const node = findNode(tree.root, nodeId);
  if (!node) return;
  const order = node.props.length + 1;
  node.add_new_prop(new PropertyItem(`key_${order}`, '', order));
  renderRightPanel();
  renderCanvas();
}

function removeProp(nodeId, key) {
  const tree = trees[activeTreeId];
  const node = findNode(tree.root, nodeId);
  if (!node) return;
  node.remove_prop(key);
  renderRightPanel();
  renderCanvas();
}

function updatePropKey(nodeId, oldKey, newKey) {
  const tree = trees[activeTreeId];
  const node = findNode(tree.root, nodeId);
  if (!node) return;
  const prop = node.props.find(p => p.key === oldKey);
  if (prop) { prop.key = newKey; renderCanvas(); }
}

function updatePropValue(nodeId, key, val) {
  const tree = trees[activeTreeId];
  const node = findNode(tree.root, nodeId);
  if (!node) return;
  const prop = node.props.find(p => p.key === key);
  if (prop) {
    // Try to parse as JSON, else keep as string
    try { prop.value = JSON.parse(val); } catch { prop.value = val; }
    renderCanvas();
  }
}

// ══════════════════════════════════════════════════════
// DEPTH CONTROL
// ══════════════════════════════════════════════════════

function changeMaxDepth(delta) {
  maxDepth = Math.max(1, Math.min(8, maxDepth + delta));
  document.getElementById('depth-display').textContent = maxDepth;
  renderDepthDots();
  renderCanvas();
}

function renderDepthDots() {
  const dots = document.getElementById('depth-dots');
  dots.innerHTML = Array.from({length: 6}, (_, i) =>
    `<div class="depth-dot ${i < maxDepth ? 'active' : ''}"></div>`
  ).join('');
}

// ══════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════

function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-backdrop').style.display = 'flex';
  const inp = document.querySelector('#modal-content input[autofocus]');
  if (inp) setTimeout(() => inp.focus(), 50);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-backdrop')) return;
  document.getElementById('modal-backdrop').style.display = 'none';
}

function dismissModal() {
  document.getElementById('modal-backdrop').style.display = 'none';
}

function showNewTreeModal() {
  showModal(`
    <div class="modal-header">🌲 New Tree</div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field-label">Tree name</div>
        <input type="text" id="new-tree-name" placeholder="my_tree" autofocus
          onkeydown="if(event.key==='Enter')createTreeFromModal()" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="dismissModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createTreeFromModal()">Create Tree</button>
    </div>
  `);
}

function createTreeFromModal() {
  const name = document.getElementById('new-tree-name').value.trim() || 'Tree';
  const tree = new Tree(name);
  trees[tree.id] = tree;
  activeTreeId = tree.id;
  selectedNodeId = null;
  dismissModal();
  renderAll();
  toast(`Tree "${name}" created`, 'success');
}

function showRenameModal(nodeId) {
  const tree = trees[activeTreeId];
  const node = findNode(tree.root, nodeId);
  if (!node) return;
  showModal(`
    <div class="modal-header">✎ Rename Node</div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field-label">Node name</div>
        <input type="text" id="rename-input" value="${escHtml(node.name)}" autofocus
          onkeydown="if(event.key==='Enter')doRename('${nodeId}')" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="dismissModal()">Cancel</button>
      <button class="btn btn-primary" onclick="doRename('${nodeId}')">Rename</button>
    </div>
  `);
}

function doRename(nodeId) {
  const val = document.getElementById('rename-input').value.trim();
  if (!val) return;
  updateNodeName(nodeId, val);
  dismissModal();
  renderRightPanel();
  toast('Renamed', 'success');
}

function showExportModal() {
  if (!activeTreeId || !trees[activeTreeId]) {
    toast('Select a tree first', 'warn');
    return;
  }
  const tree = trees[activeTreeId];
  const json = JSON.stringify(tree.get_all(), null, 2);
  const highlighted = syntaxHighlight(json);

  showModal(`
    <div class="modal-header">⬇ Export JSON — <span style="color:var(--accent2);font-size:13px;">${escHtml(tree.name)}</span></div>
    <div class="modal-body" style="gap:8px;">
      <div class="json-preview">${highlighted}</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="dismissModal()">Close</button>
      <button class="btn btn-secondary" onclick="copyJSON()">⎘ Copy</button>
      <button class="btn btn-primary" onclick="downloadJSON()">⬇ Download</button>
    </div>
  `);
}

function copyJSON() {
  const tree = trees[activeTreeId];
  navigator.clipboard.writeText(JSON.stringify(tree.get_all(), null, 2));
  toast('Copied to clipboard', 'success');
}

function downloadJSON() {
  const tree = trees[activeTreeId];
  const json = JSON.stringify(tree.get_all(), null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${tree.name.replace(/\s+/g,'_')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded!', 'success');
}

function syntaxHighlight(json) {
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    let cls = 'json-num';
    if (/^"/.test(match)) {
      cls = /:$/.test(match) ? 'json-key' : 'json-str';
    } else if (/true|false/.test(match)) {
      cls = 'json-bool';
    } else if (/null/.test(match)) {
      cls = 'json-null';
    }
    return `<span class="${cls}">${match}</span>`;
  });
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════

function toast(msg, type = '') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, 2200);
}

// ══════════════════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════════════════

function renderAll() {
  renderTreeList();
  renderCanvas();
  renderRightPanel();
  renderDepthDots();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') dismissModal();
  if ((e.key === 'n' || e.key === 'N') && (e.metaKey || e.ctrlKey)) { e.preventDefault(); showNewTreeModal(); }
  if (selectedNodeId && e.key === 'Delete' && document.activeElement === document.body) {
    const tree = trees[activeTreeId];
    if (tree && selectedNodeId !== tree.root.id) deleteNode(selectedNodeId);
  }
});

// ══════════════════════════════════════════════════════
// SEED DATA
// ══════════════════════════════════════════════════════

(function seed() {
  const t = new Tree('example_tree');
  t.root.name = 'root';

  const a = new Node('components');
  a.add_new_prop(new PropertyItem('type', 'folder', 1));
  a.add_new_prop(new PropertyItem('version', '2.0', 2));

  const a1 = new Node('Button');
  a1.add_new_prop(new PropertyItem('variant', 'primary', 1));
  a1.add_new_prop(new PropertyItem('size', 'md', 2));
  a1.add_new_prop(new PropertyItem('disabled', false, 3));

  const a2 = new Node('Input');
  a2.add_new_prop(new PropertyItem('type', 'text', 1));
  a2.add_new_prop(new PropertyItem('placeholder', 'Enter value...', 2));

  const a3 = new Node('Modal');
  const a3a = new Node('Header');
  a3a.add_new_prop(new PropertyItem('sticky', true, 1));
  const a3b = new Node('Body');
  a3b.add_new_prop(new PropertyItem('scrollable', true, 1));
  a3.children.push(a3a, a3b);

  a.children.push(a1, a2, a3);

  const b = new Node('styles');
  b.add_new_prop(new PropertyItem('theme', 'dark', 1));
  const b1 = new Node('colors');
  b1.add_new_prop(new PropertyItem('primary', '#6366f1', 1));
  b1.add_new_prop(new PropertyItem('bg', '#0a0b0f', 2));
  b.children.push(b1);

  t.root.children.push(a, b);

  trees[t.id] = t;
  activeTreeId = t.id;
  renderAll();
})();
</script>
