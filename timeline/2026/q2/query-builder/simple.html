<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sift.js Query Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load Sift from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sift@13.5.2/sift.min.js"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-gray-800">Sift Query Builder</h1>
        
        <!-- Query Builder UI -->
        <div id="query-rules" class="space-y-3 mb-6">
            <!-- Rules will be injected here -->
        </div>

        <div class="flex gap-4 mb-8">
            <button onclick="addRule()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded transition">
                + Add Rule
            </button>
            <button onclick="runSearch()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition font-bold">
                Run Search
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Raw Query Output -->
            <div>
                <h2 class="font-semibold mb-2 text-gray-600">Generated Sift Query:</h2>
                <pre id="query-output" class="bg-gray-900 text-green-400 p-4 rounded text-sm overflow-auto h-40">{}</pre>
            </div>

            <!-- Results Output -->
            <div>
                <h2 class="font-semibold mb-2 text-gray-600">Results:</h2>
                <div id="results-output" class="bg-white border p-4 rounded h-40 overflow-auto text-sm">
                    <!-- Results appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample Data
        const products = [
            { id: 1, name: "iPhone 15", category: "Electronics", price: 999, stock: 10 },
            { id: 2, name: "MacBook Pro", category: "Electronics", price: 2400, stock: 5 },
            { id: 3, name: "Coffee Maker", category: "Home", price: 120, stock: 20 },
            { id: 4, name: "Desk Chair", category: "Furniture", price: 350, stock: 15 },
            { id: 5, name: "Yoga Mat", category: "Fitness", price: 50, stock: 50 },
        ];

        const operators = [
            { label: 'Equals', value: '$eq' },
            { label: 'Not Equals', value: '$ne' },
            { label: 'Greater Than', value: '$gt' },
            { label: 'Less Than', value: '$lt' },
            { label: 'Contains (Regex)', value: '$regex' }
        ];

        const fields = ['name', 'category', 'price', 'stock'];

        function addRule() {
            const container = document.getElementById('query-rules');
            const ruleId = Date.now();
            
            const ruleHtml = `
                <div id="rule-${ruleId}" class="flex flex-wrap gap-2 items-center bg-gray-50 p-3 rounded border border-gray-200">
                    <select class="field-select p-2 border rounded bg-white">
                        ${fields.map(f => `<option value="${f}">${f}</option>`).join('')}
                    </select>

                    <select class="operator-select p-2 border rounded bg-white">
                        ${operators.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
                    </select>

                    <input type="text" class="value-input p-2 border rounded flex-1" placeholder="Value...">

                    <button onclick="removeRule(${ruleId})" class="text-red-500 hover:text-red-700 font-bold px-2">
                        ✕
                    </button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', ruleHtml);
        }

        function removeRule(id) {
            document.getElementById(`rule-${id}`).remove();
        }

        function runSearch() {
            const rules = document.querySelectorAll('#query-rules > div');
            let query = {};

            rules.forEach(rule => {
                const field = rule.querySelector('.field-select').value;
                const operator = rule.querySelector('.operator-select').value;
                let value = rule.querySelector('.value-input').value;

                // Simple type conversion for numbers
                if (!isNaN(value) && value.trim() !== "") {
                    value = parseFloat(value);
                }

                // Build MongoDB-style object
                if (!query[field]) query[field] = {};
                
                // If regex, make it case insensitive
                if (operator === '$regex') {
                    query[field][operator] = new RegExp(value, 'i');
                } else {
                    query[field][operator] = value;
                }
            });

            // Update UI
            document.getElementById('query-output').textContent = JSON.stringify(query, null, 2);

            // Execute Sift
            try {
                // sift.default(query) or sift(query) depending on version
                const filterFn = sift.default ? sift.default(query) : sift(query);
                const filteredData = products.filter(filterFn);

                const resultsDiv = document.getElementById('results-output');
                if (filteredData.length > 0) {
                    resultsDiv.innerHTML = filteredData.map(item => `
                        <div class="mb-2 pb-2 border-b last:border-0">
                            <strong>${item.name}</strong> - $${item.price} (${item.category})
                        </div>
                    `).join('');
                } else {
                    resultsDiv.innerHTML = '<span class="text-gray-400">No results found.</span>';
                }
            } catch (err) {
                console.error(err);
                alert("Invalid Query Selection");
            }
        }

        // Initialize with one rule
        addRule();
    </script>
</body>
</html>
