<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Vanilla Sift Query Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sift@13.5.2/sift.min.js"></script>
    <style>
        .group-container { border-left: 4px solid #3b82f6; transition: border-color 0.3s; }
        .group-or { border-left-color: #ef4444; }
        .invisible-but-space { visibility: hidden; } 
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 md:mb-10 text-center md:text-left">
            <h1 class="text-2xl md:text-4xl font-extrabold text-gray-900 tracking-tight">Data Explorer</h1>
            <p class="text-sm md:text-base text-gray-600 mt-2">Build nested queries using AND/OR logic and verify field existence.</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
            <div class="w-full lg:w-2/3 flex flex-col gap-4">
                <div id="query-root" class="bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200">
                </div>
                <div class="flex">
                    <button onclick="runSearch()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg font-bold shadow-md transition-colors">
                        Run Search
                    </button>
                </div>
            </div>
            <div class="w-full lg:w-1/3 flex flex-col gap-6">
                <div class="bg-gray-900 rounded-xl shadow-md overflow-hidden flex flex-col">
                    <div class="bg-gray-800 text-gray-300 text-xs font-bold uppercase tracking-wider py-2 px-4 border-b border-gray-700">
                        Generated MongoDB Query
                    </div>
                    <pre id="query-json" class="text-green-400 p-4 text-xs overflow-auto max-h-60 break-all w-full whitespace-pre-wrap">{}</pre>
                </div>
                <div class="bg-white rounded-xl shadow-md overflow-hidden flex flex-col border border-gray-200">
                    <div class="bg-gray-50 text-gray-500 text-xs font-bold uppercase tracking-wider py-2 px-4 border-b border-gray-200">
                        Results (<span id="result-count">0</span>)
                    </div>
                    <div id="results" class="divide-y text-sm max-h-80 overflow-auto">
                    </div>
                </div>
            </div>

        </div>
    </div>
    <template id="rule-template">
        <div class="rule-row flex flex-col sm:flex-row gap-2 items-start sm:items-center bg-gray-50 p-3 rounded-lg border border-gray-200 w-full relative group">
            
            <select class="field-node w-full sm:w-auto p-2 border border-gray-300 rounded-md text-sm bg-white focus:ring-2 focus:ring-blue-400 outline-none">
                <option value="name">Name</option>
                <option value="category">Category</option>
                <option value="price">Price</option>
                <option value="stock">Stock</option>
                <option value="discount">Discount (Optional)</option>
            </select>
            
            <select class="operator-node w-full sm:w-auto p-2 border border-gray-300 rounded-md text-sm bg-white focus:ring-2 focus:ring-blue-400 outline-none" onchange="toggleValueInput(this)">
                <option value="$eq">Equals</option>
                <option value="$ne">Not Equals</option>
                <option value="$gt">&gt; Greater Than</option>
                <option value="$lt">&lt; Less Than</option>
                <option value="$regex">Contains</option>
                <option value="$exists_true">Exists</option>
                <option value="$exists_false">Does Not Exist</option>
            </select>
            
            <input type="text" class="value-node w-full sm:w-auto p-2 border border-gray-300 rounded-md text-sm flex-1 focus:ring-2 focus:ring-blue-400 outline-none transition-all" placeholder="Value...">
            <button onclick="this.parentElement.remove()" class="absolute sm:relative top-2 right-2 sm:top-auto sm:right-auto text-gray-400 hover:text-red-500 transition-colors p-1" aria-label="Delete Rule">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
    </template>
    <template id="group-template">
        <div class="group-node group-container bg-white p-3 sm:p-5 rounded-lg border border-gray-200 mt-3 shadow-sm w-full">
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 gap-3 w-full">
                <div class="flex items-center gap-2">
                    <select class="logic-node p-1.5 bg-blue-50 border border-blue-200 rounded-md font-bold text-blue-700 text-xs uppercase tracking-widest outline-none cursor-pointer" onchange="updateGroupStyle(this)">
                        <option value="$and">AND</option>
                        <option value="$or">OR</option>
                    </select>
                </div>
                
                <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                    <button onclick="addRule(this)" class="flex-1 sm:flex-none text-xs bg-white hover:bg-gray-50 py-1.5 px-3 rounded border border-gray-300 font-semibold text-gray-700 transition shadow-sm">+ Rule</button>
                    <button onclick="addGroup(this)" class="flex-1 sm:flex-none text-xs bg-white hover:bg-gray-50 py-1.5 px-3 rounded border border-gray-300 font-semibold text-gray-700 transition shadow-sm">+ Group</button>
                    <button onclick="removeGroup(this)" class="delete-group-btn flex-1 sm:flex-none text-xs text-red-500 hover:bg-red-50 py-1.5 px-3 rounded border border-red-200 font-semibold transition">Delete</button>
                </div>
            </div>
            <div class="children-container space-y-3 sm:ml-2 sm:border-l-2 border-gray-100 sm:pl-4">
            </div>
        </div>
    </template>
    <script>
        const products = [
            { id: 1, name: "iPhone 15", category: "Electronics", price: 999, stock: 10 },
            { id: 2, name: "MacBook Pro", category: "Electronics", price: 2400, stock: 5, discount: 10 },
            { id: 3, name: "Coffee Maker", category: "Home", price: 120, stock: 20 },
            { id: 4, name: "Desk Chair", category: "Furniture", price: 350, stock: 15, discount: 15 },
            { id: 5, name: "Yoga Mat", category: "Fitness", price: 50, stock: 50 },
            { id: 6, name: "iPhone 13", category: "Electronics", price: 600, stock: 2 },
        ];

        function init() {
            const root = document.getElementById('query-root');
            const group = createGroup();
            group.querySelector('.delete-group-btn').remove(); // Prevent deleting the root group
            root.appendChild(group);
            addRule(group.querySelector('button')); // Add one default rule
            runSearch(); // Run initial search to show all data
        }

        function createGroup() {
            const template = document.getElementById('group-template');
            return template.content.cloneNode(true).firstElementChild;
        }

        function addGroup(btn) {
            const container = btn.closest('.group-node').querySelector('.children-container');
            container.appendChild(createGroup());
        }

        function addRule(btn) {
            const container = btn.closest('.group-node').querySelector('.children-container');
            const template = document.getElementById('rule-template');
            container.appendChild(template.content.cloneNode(true));
        }

        function removeGroup(btn) {
            btn.closest('.group-node').remove();
        }

        function toggleValueInput(select) {
            const valueInput = select.parentElement.querySelector('.value-node');
            if (select.value === '$exists_true' || select.value === '$exists_false') {
                valueInput.classList.add('invisible-but-space'); // hides it without breaking mobile layout
                valueInput.value = ''; 
            } else {
                valueInput.classList.remove('invisible-but-space');
            }
        }

        function updateGroupStyle(select) {
            const groupNode = select.closest('.group-node');
            if (select.value === '$or') {
                groupNode.classList.add('group-or');
                select.classList.replace('bg-blue-50', 'bg-red-50');
                select.classList.replace('text-blue-700', 'text-red-700');
                select.classList.replace('border-blue-200', 'border-red-200');
            } else {
                groupNode.classList.remove('group-or');
                select.classList.replace('bg-red-50', 'bg-blue-50');
                select.classList.replace('text-red-700', 'text-blue-700');
                select.classList.replace('border-red-200', 'border-blue-200');
            }
        }

        // --- 2. Query Compiler ---

        function buildQuery(element) {
            // Group Processing
            if (element.classList.contains('group-node')) {
                const logic = element.querySelector('.logic-node').value; // $and or $or
                const childrenElements = element.querySelector('.children-container').children;
                
                const childrenQueries = [];
                for (let child of childrenElements) {
                    const result = buildQuery(child);
                    if (result && Object.keys(result).length > 0) {
                        childrenQueries.push(result);
                    }
                }

                if (childrenQueries.length === 0) return {};
                if (childrenQueries.length === 1) return childrenQueries[0]; // Simplify if only 1 rule
                return { [logic]: childrenQueries };
            } 
            
            // Rule Processing
            if (element.classList.contains('rule-row')) {
                const field = element.querySelector('.field-node').value;
                const operator = element.querySelector('.operator-node').value;
                let value = element.querySelector('.value-node').value;

                // Handle Exists logic
                if (operator === '$exists_true') return { [field]: { $exists: true } };
                if (operator === '$exists_false') return { [field]: { $exists: false } };

                // Handle empty values gracefully
                if (value.trim() === '') return null; 

                // Auto-cast numbers
                if (!isNaN(value)) value = parseFloat(value);
                
                // Handle Regex
                if (operator === '$regex') {
                    return { [field]: { $regex: new RegExp(value, 'i') } };
                }
                
                // Standard Operators ($eq, $ne, $gt, $lt)
                return { [field]: { [operator]: value } };
            }
            return null;
        }

        // --- 3. Execution Engine ---

        function runSearch() {
            const rootNode = document.querySelector('.group-node');
            const query = buildQuery(rootNode) || {};

            // Render Query to screen (handling Regex stringification)
            document.getElementById('query-json').textContent = JSON.stringify(query, (key, value) => {
                if (value instanceof RegExp) return value.toString();
                return value;
            }, 2);

            try {
                // Execute Sift filter
                const filterFn = sift.default ? sift.default(query) : sift(query);
                const filtered = products.filter(filterFn);
                
                // Render Results
                const resultsDiv = document.getElementById('results');
                document.getElementById('result-count').textContent = filtered.length;

                if (filtered.length > 0) {
                    resultsDiv.innerHTML = filtered.map(p => `
                        <div class="p-4 hover:bg-blue-50 transition-colors">
                            <div class="flex justify-between items-start">
                                <div class="font-bold text-gray-800">${p.name}</div>
                                <div class="font-bold text-emerald-600">$${p.price}</div>
                            </div>
                            <div class="text-xs text-gray-500 mt-1">
                                ${p.category} &bull; Stock: ${p.stock} 
                                ${p.discount ? `<span class="text-amber-600 font-semibold border border-amber-200 bg-amber-50 px-1 rounded ml-1">-${p.discount}%</span>` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    resultsDiv.innerHTML = `<div class="p-6 text-center text-gray-400 italic">No matching results found</div>`;
                }
            } catch (e) {
                console.error(e);
                alert("Invalid query syntax generated.");
            }
        }

        // Bootstrap the app
        init();
    </script>
</body>
</html>
