<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drawer-closed { transform: translateX(100%); }
        .drawer-open { transform: translateX(0); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-6">
        <!-- Top Bar -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">System Resources</h1>
                <p class="text-slate-500">Manage your active cloud components and instances.</p>
            </div>
            <button onclick="toggleDrawer('create')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-medium transition flex items-center justify-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add Resource
            </button>
        </div>

        <!-- Table Container (Responsive: Scroll on small screens) -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-sm font-semibold text-slate-700">Resource Name</th>
                        <th class="px-6 py-4 text-sm font-semibold text-slate-700 hidden md:table-cell">Status</th>
                        <th class="px-6 py-4 text-sm font-semibold text-slate-700">Actions</th>
                    </tr>
                </thead>
                <tbody id="resourceTable" class="divide-y divide-slate-100">
                    <!-- Rows injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Slide-over Drawer Overlay -->
    <div id="drawerOverlay" class="fixed inset-0 bg-slate-900/40 opacity-0 pointer-events-none transition-opacity duration-300 z-40" onclick="toggleDrawer()"></div>

    <!-- Slide-over Drawer Content -->
    <div id="sideDrawer" class="fixed right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl z-50 transition-transform duration-300 ease-in-out drawer-closed flex flex-col">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <h2 id="drawerTitle" class="text-xl font-bold text-slate-800">Add Resource</h2>
            <button onclick="toggleDrawer()" class="text-slate-400 hover:text-slate-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <form id="resourceForm" onsubmit="handleSubmit(event)" class="p-6 flex-1">
            <input type="hidden" id="resId">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Display Name</label>
                    <input type="text" id="resName" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                    <select id="resStatus" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="Active">Active</option>
                        <option value="Pending">Pending</option>
                        <option value="Maintenance">Maintenance</option>
                    </select>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-6 bg-slate-50 border-t border-slate-100 flex gap-3">
                <button type="button" onclick="toggleDrawer()" class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg text-slate-700 hover:bg-white transition">Cancel</button>
                <button type="submit" class="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition font-medium">Save Changes</button>
            </div>
        </form>
    </div>

    <script>
        let resources = [
            { id: 1, name: 'Main Database', status: 'Active' },
            { id: 2, name: 'Auth Microservice', status: 'Pending' }
        ];

        function render() {
            const container = document.getElementById('resourceTable');
            container.innerHTML = resources.map(res => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-6 py-4 font-medium text-slate-900">${res.name}</td>
                    <td class="px-6 py-4 hidden md:table-cell">
                        <span class="px-2 py-1 text-xs rounded-full ${res.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${res.status}</span>
                    </td>
                    <td class="px-6 py-4 space-x-3">
                        <button onclick="editResource(${res.id})" class="text-indigo-600 hover:text-indigo-900 font-medium text-sm">Edit</button>
                        <button onclick="deleteResource(${res.id})" class="text-red-500 hover:text-red-700 font-medium text-sm">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function toggleDrawer(mode = null) {
            const drawer = document.getElementById('sideDrawer');
            const overlay = document.getElementById('drawerOverlay');
            const isOpening = drawer.classList.contains('drawer-closed');

            if (isOpening) {
                if (mode === 'create') {
                    document.getElementById('drawerTitle').innerText = 'New Resource';
                    document.getElementById('resourceForm').reset();
                    document.getElementById('resId').value = '';
                }
                drawer.classList.replace('drawer-closed', 'drawer-open');
                overlay.classList.replace('opacity-0', 'opacity-100');
                overlay.classList.replace('pointer-events-none', 'pointer-events-auto');
            } else {
                drawer.classList.replace('drawer-open', 'drawer-closed');
                overlay.classList.replace('opacity-100', 'opacity-0');
                overlay.classList.replace('pointer-events-auto', 'pointer-events-none');
            }
        }

        function handleSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('resId').value;
            const name = document.getElementById('resName').value;
            const status = document.getElementById('resStatus').value;

            if (id) {
                resources = resources.map(r => r.id == id ? { ...r, name, status } : r);
            } else {
                resources.push({ id: Date.now(), name, status });
            }
            render();
            toggleDrawer();
        }

        function editResource(id) {
            const res = resources.find(r => r.id === id);
            document.getElementById('resId').value = res.id;
            document.getElementById('resName').value = res.name;
            document.getElementById('resStatus').value = res.status;
            document.getElementById('drawerTitle').innerText = 'Edit Resource';
            toggleDrawer();
        }

        function deleteResource(id) {
            if(confirm('Delete?')) {
                resources = resources.filter(r => r.id !== id);
                render();
            }
        }

        render();
    </script>
</body>
</html>
