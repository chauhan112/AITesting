<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties Val CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-8 text-slate-800">

    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-slate-700">Properties Val CRUD</h1>
        
        <div class="flex flex-col md:flex-row gap-8">
            <!-- Left Side: Form -->
            <div class="w-full md:w-1/3">
                <div class="bg-white p-6 rounded-lg shadow-md border border-slate-200">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">Property Form</h2>
                    
                    <!-- We will bind our IForm class to this element -->
                    <form id="property-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Key</label>
                            <input type="text" name="key" required
                                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" 
                                placeholder="e.g. api_url">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Type</label>
                            <select name="type" 
                                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="string">String</option>
                                <option value="json">JSON</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Value</label>
                            <textarea name="value" rows="4" required
                                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm" 
                                placeholder="Value here..."></textarea>
                        </div>
                        
                        <div class="flex gap-2 pt-2">
                            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition-colors">
                                Save Property
                            </button>
                            <button type="button" id="btn-reset" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium py-2 px-4 rounded-md transition-colors">
                                Clear
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Right Side: Component Display -->
            <div class="w-full md:w-2/3">
                <div class="bg-white p-6 rounded-lg shadow-md border border-slate-200 h-full">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">Key-Value Component Viewer</h2>
                    
                    <!-- We will bind our IComponent class to this element -->
                    <div id="property-component" class="space-y-3">
                        <p class="text-slate-400 italic text-sm">No properties added yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // INTERFACE IMPLEMENTATIONS
        // ==========================================

        /**
         * IForm Implementation
         */
        class UIForm {
            constructor(elementId, onSubmitCallback) {
                this.formEl = document.getElementById(elementId);
                this.onSubmitCallback = onSubmitCallback;

                // Handle native submit event
                this.formEl.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.on_submit();
                });

                // Extra: handle manual reset button
                document.getElementById('btn-reset').addEventListener('click', () => {
                    this.reset();
                });
            }

            set_values(data) {
                for (let key in data) {
                    if (this.formEl.elements[key]) {
                        this.formEl.elements[key].value = data[key];
                    }
                }
            }

            reset() {
                this.formEl.reset();
                // Ensure key is editable again if it was locked during an update
                this.formEl.elements['key'].readOnly = false;
                this.formEl.elements['key'].classList.remove('bg-slate-100');
            }

            on_submit() {
                const formData = new FormData(this.formEl);
                const data = Object.fromEntries(formData.entries());
                if (this.onSubmitCallback) {
                    this.onSubmitCallback(data);
                }
            }
        }

        /**
         * IComponent Implementation
         */
        class UIComponent {
            constructor(elementId) {
                this.element = document.getElementById(elementId);
            }

            get_element() {
                return this.element;
            }

            // vals: {[string]: any}
            set_props(vals) {
                this.element.innerHTML = '';
                
                const keys = Object.keys(vals);
                if (keys.length === 0) {
                    this.element.innerHTML = '<p class="text-slate-400 italic text-sm">No properties added yet.</p>';
                    return;
                }

                keys.forEach(key => {
                    const value = vals[key];
                    // Format output based on whether it's an object/array or plain string
                    const displayValue = typeof value === 'object' ? JSON.stringify(value, null, 2) : value;
                    
                    const card = document.createElement('div');
                    card.className = "p-4 border border-slate-200 rounded-md bg-slate-50 flex flex-col sm:flex-row gap-4 justify-between items-start hover:shadow-sm transition-shadow";
                    
                    card.innerHTML = `
                        <div class="flex-1 w-full overflow-hidden">
                            <div class="font-bold text-blue-600 mb-1 font-mono text-sm">${key}</div>
                            <pre class="bg-slate-200 p-2 rounded text-sm text-slate-800 overflow-x-auto whitespace-pre-wrap">${displayValue}</pre>
                        </div>
                        <div class="flex sm:flex-col gap-2 shrink-0">
                            <button data-action="edit" data-key="${key}" class="text-xs bg-yellow-100 text-yellow-700 hover:bg-yellow-200 px-3 py-1 rounded font-semibold transition-colors">Edit</button>
                            <button data-action="delete" data-key="${key}" class="text-xs bg-red-100 text-red-700 hover:bg-red-200 px-3 py-1 rounded font-semibold transition-colors">Delete</button>
                        </div>
                    `;
                    this.element.appendChild(card);
                });
            }

            set_event(on_click) {
                this.element.addEventListener('click', on_click);
            }
        }

        /**
         * PropertiesValCrud Implementation
         */
        class PropertiesManager {
            constructor() {
                this.properties =[]; // Array of PropItem: { key: string, type: string, value: any }
                
                // Initialize Form and Component
                this.form = new UIForm('property-form', (formData) => this.handleSave(formData));
                this.comp = new UIComponent('property-component');

                // Attach Event Listener to the Component for Edit/Delete interactions
                this.comp.set_event((e) => {
                    const btn = e.target.closest('button[data-action]');
                    if (!btn) return;

                    const action = btn.getAttribute('data-action');
                    const key = btn.getAttribute('data-key');

                    if (action === 'delete') {
                        this.handleDelete(key);
                    } else if (action === 'edit') {
                        this.handleEdit(key);
                    }
                });
            }

            get_form() {
                return this.form;
            }

            get_comp() {
                return this.comp;
            }

            set_properties(props) {
                this.properties = props;
                
                // Convert PropItem[] to {[string]: any} expected by the component
                const valsDictionary = {};
                this.properties.forEach(prop => {
                    valsDictionary[prop.key] = prop.value;
                });

                // Update the visual component
                this.comp.set_props(valsDictionary);
            }

            // --- Internal Handlers ---

            handleSave(formData) {
                let parsedValue = formData.value;

                // Validate and Parse JSON if necessary
                if (formData.type === 'json') {
                    try {
                        parsedValue = JSON.parse(formData.value);
                    } catch (err) {
                        alert("Invalid JSON format. Please check your value syntax.");
                        return;
                    }
                }

                // Create PropItem
                const newProp = {
                    key: formData.key,
                    type: formData.type,
                    value: parsedValue
                };

                // Create or Update
                const existingIndex = this.properties.findIndex(p => p.key === newProp.key);
                const updatedProps = [...this.properties];
                
                if (existingIndex >= 0) {
                    updatedProps[existingIndex] = newProp; // Update
                } else {
                    updatedProps.push(newProp); // Create
                }

                this.set_properties(updatedProps);
                this.form.reset();
            }

            handleDelete(key) {
                if(confirm(`Are you sure you want to delete property '${key}'?`)) {
                    const updatedProps = this.properties.filter(p => p.key !== key);
                    this.set_properties(updatedProps);
                }
            }

            handleEdit(key) {
                const prop = this.properties.find(p => p.key === key);
                if (prop) {
                    this.form.set_values({
                        key: prop.key,
                        type: prop.type,
                        // Stringify json types so they can be edited in the textarea
                        value: prop.type === 'json' ? JSON.stringify(prop.value, null, 2) : prop.value
                    });
                    
                    // Optional: make key read-only while editing to prevent accidental renaming 
                    // (Renaming creates a new key rather than replacing because of how handleSave works)
                    const keyInput = this.form.formEl.elements['key'];
                    keyInput.readOnly = true;
                    keyInput.classList.add('bg-slate-100');
                }
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            const app = new PropertiesManager();
            
            // Seed with some initial dummy data for demonstration
            app.set_properties([
                { key: "greeting", type: "string", value: "Hello, World!" },
                { key: "app_config", type: "json", value: { theme: "dark", version: 1.2 } }
            ]);
        });
    </script>
</body>
</html>
